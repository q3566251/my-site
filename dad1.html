<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOT Inspection 路检英语</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;600&display=swap');

  :root {
    --page-bg: #f7f1e8;
    --soft-bg: #f2e7d9;
    --card-bg: #fdf9f4;
    --text: #3a3228;
    --text-light: #7a6e5f;
    --accent: #c0785a;
    --accent-hover: #a8623f;
    --border: #e5d9c9;
    --highlight: #fff8ed;
    --playing: #eae0d0;
    --cantonese: #8b6914;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--page-bg);
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
  }

  .header {
    text-align: center;
    padding: 48px 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--soft-bg);
  }

  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }

  .header p {
    color: var(--text-light);
    font-size: 14px;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 20px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: var(--soft-bg);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }

  .btn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    padding: 10px 24px;
    border: 1.5px solid var(--accent);
    border-radius: 24px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card-bg);
    color: var(--accent);
    font-weight: 600;
  }

  .btn:hover { background: var(--accent); color: #fff; }
  .btn.active { background: var(--accent); color: #fff; }
  .btn.stop { border-color: #b44; color: #b44; }
  .btn.stop:hover { background: #b44; color: #fff; }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-light);
  }

  .speed-control input[type="range"] {
    width: 80px;
    accent-color: var(--accent);
  }

  .container { max-width: 720px; margin: 0 auto; padding: 16px 20px 80px; }

  .section { margin-bottom: 32px; }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    padding: 12px 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 12px;
  }

  .item {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .item:hover { background: var(--highlight); }
  .item.playing { background: var(--playing); border-left: 3px solid var(--accent); }

  .item .en {
    font-weight: 600;
    font-size: 16px;
    color: var(--text);
  }

  .item .zh {
    font-size: 14px;
    color: var(--text-light);
  }

  .item .yue {
    font-size: 13px;
    color: var(--cantonese);
    font-style: italic;
    padding-left: 2px;
  }

  .yue-label {
    font-style: normal;
    font-weight: 600;
    color: var(--cantonese);
    opacity: 0.7;
    font-size: 12px;
  }

  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--soft-bg);
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    text-align: center;
    font-size: 13px;
    color: var(--text-light);
    z-index: 100;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🚛 DOT 路检英语速查</h1>
  <p>点击任意句子朗读 · 附粤语谐音帮助记忆</p>
</div>

<div class="controls">
  <button class="btn" id="playAllBtn" onclick="playAll()">▶ 全部朗读</button>
  <button class="btn" id="playEnBtn" onclick="playAll('en')">🔤 只读英文</button>
  <button class="btn stop" id="stopBtn" onclick="stopAll()">⏹ 停止</button>
  <div class="speed-control">
    <span>语速</span>
    <input type="range" id="speedRange" min="0.5" max="1.5" step="0.1" value="0.8">
    <span id="speedLabel">0.8x</span>
  </div>
</div>

<div class="container" id="content"></div>

<div class="status-bar" id="statusBar">就绪 · 点击句子或按「全部朗读」开始</div>

<script>
const DATA = [
  { section: "一、基础证件类（必问）", items: [
    { en: "License please.", zh: "请出示驾照。", yue: "赖森士 扑离士" },
    { en: "Registration.", zh: "车辆注册文件。", yue: "瑞芝士翠深" },
    { en: "Proof of insurance?", zh: "请出示保险证明。", yue: "扑鲁夫 哦夫 因秀润士" },
    { en: "Is this your vehicle?", zh: "这是你的车吗？", yue: "伊士 低士 哟 维克哦" },
    { en: "Is this a company vehicle?", zh: "这是公司车辆吗？", yue: "伊士 低士 呃 康帕尼 维克哦" },
    { en: "Who do you work for?", zh: "你为哪家公司工作？", yue: "胡 读 优 沃克 科" },
  ]},
  { section: "二、行程与用途（常问）", items: [
    { en: "Where are you coming from?", zh: "你从哪里来？", yue: "威呃 啊 优 卡明 风" },
    { en: "Where are you going?", zh: "你要去哪里？", yue: "威呃 啊 优 够英" },
    { en: "What are you hauling?", zh: "你运输的是什么货物？", yue: "沃特 啊 优 荷令" },
    { en: "What is the purpose of this trip?", zh: "这趟行程的目的是什么？", yue: "沃特 伊士 得 帕伯士 哦夫 低士 翠普" },
    { en: "Do you have paperwork for the load?", zh: "有这批货的文件吗？", yue: "读 优 嘿夫 佩帕沃克 科 得 楼德" },
    { en: "Any hazardous materials?", zh: "有危险品吗？", yue: "安尼 嘿泽得士 么踢瑞哦士" },
  ]},
  { section: "三、DOT / 商业运营信息", items: [
    { en: "What is your DOT number?", zh: "你的 DOT 编号是多少？", yue: "沃特 伊士 哟 迪欧踢 南拔" },
    { en: "Who is the carrier?", zh: "承运公司是谁？", yue: "胡 伊士 得 嘅瑞呃" },
  ]},
  { section: "四、安全设备检查（重点）", items: [
    { en: "Do you have a fire extinguisher?", zh: "你有灭火器吗？", yue: "读 优 嘿夫 呃 法呀 伊士丁圭射" },
    { en: "Is it properly mounted?", zh: "它是否固定安装好了？", yue: "伊士 伊特 扑罗帕利 蒙踢得" },
    { en: "Do you have reflective triangles?", zh: "你有反光三角架吗？", yue: "读 优 嘿夫 瑞弗莱踢夫 翠安够士" },
    { en: "How many triangles do you have?", zh: "你有几个三角架？", yue: "豪 曼尼 翠安够士 读 优 嘿夫" },
    { en: "Where are they located?", zh: "它们放在哪里？", yue: "威呃 啊 贴 楼嘅踢得" },
    { en: "Do you have spare fuses?", zh: "你有备用保险丝吗？", yue: "读 优 嘿夫 士佩呃 夫由士" },
    { en: "Any spare bulbs?", zh: "有备用灯泡吗？", yue: "安尼 士佩呃 宝士" },
    { en: "Do you have a flashlight or emergency light?", zh: "你有手电或应急灯吗？", yue: "读 优 嘿夫 呃 弗莱殊赖特 哦 伊莫贞思 赖特" },
  ]},
  { section: "五、现场操作指令（一定会听到）", items: [
    { en: "Turn off the engine.", zh: "把发动机关掉。", yue: "焗 哦夫 得 安贞" },
    { en: "Step out of the vehicle.", zh: "下车。", yue: "士得普 奥特 哦夫 得 维克哦" },
    { en: "Open the cargo area.", zh: "打开货箱。", yue: "欧本 得 卡够 安瑞呃" },
    { en: "Show me the equipment.", zh: "把设备给我看。", yue: "秀 咪 得 伊归普闷" },
    { en: "Stay here.", zh: "在这里等着。", yue: "士得 嘿呃" },
  ]},
  { section: "六、确认与补问（执法人员常用）", items: [
    { en: "Can you show me?", zh: "能给我看看吗？", yue: "肯 优 秀 咪" },
    { en: "Where is it stored?", zh: "它放在哪里？", yue: "威呃 伊士 伊特 士多得" },
    { en: "Is this operational?", zh: "这个能正常使用吗？", yue: "伊士 低士 奥帕瑞深弄" },
  ]},
];

let synth = window.speechSynthesis;
let isPlaying = false;
let mode = 'both';

const speedRange = document.getElementById('speedRange');
const speedLabel = document.getElementById('speedLabel');
speedRange.addEventListener('input', () => {
  speedLabel.textContent = speedRange.value + 'x';
});

function renderContent() {
  const container = document.getElementById('content');
  let globalIdx = 0;
  let html = '';
  DATA.forEach(sec => {
    html += `<div class="section"><div class="section-title">${sec.section}</div>`;
    sec.items.forEach(item => {
      html += `<div class="item" id="item-${globalIdx}" onclick="playSingle(${globalIdx})">
        <span class="en">${item.en}</span>
        <span class="zh">${item.zh}</span>
        <span class="yue"><span class="yue-label">粤语读音：</span>${item.yue}</span>
      </div>`;
      globalIdx++;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function getAllItems() {
  const all = [];
  DATA.forEach(sec => sec.items.forEach(item => all.push(item)));
  return all;
}

function getRate() { return parseFloat(speedRange.value); }

function highlightItem(idx) {
  document.querySelectorAll('.item').forEach(el => el.classList.remove('playing'));
  if (idx >= 0) {
    const el = document.getElementById('item-' + idx);
    if (el) {
      el.classList.add('playing');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

function setStatus(text) {
  document.getElementById('statusBar').textContent = text;
}

function speak(text, lang) {
  return new Promise((resolve) => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.rate = getRate();
    utt.onend = () => resolve();
    utt.onerror = () => resolve();
    synth.speak(utt);
  });
}

async function playSingle(idx) {
  stopAll();
  const items = getAllItems();
  const item = items[idx];
  if (!item) return;
  isPlaying = true;
  highlightItem(idx);
  setStatus(`正在朗读: ${item.en}`);

  await speak(item.en, 'en-US');
  if (isPlaying) {
    await new Promise(r => setTimeout(r, 400));
    if (isPlaying) await speak(item.zh, 'zh-CN');
  }

  if (isPlaying) {
    highlightItem(-1);
    setStatus('就绪');
    isPlaying = false;
  }
}

async function playAll(m) {
  stopAll();
  mode = m || 'both';
  isPlaying = true;
  const items = getAllItems();
  const btn = mode === 'en' ? document.getElementById('playEnBtn') : document.getElementById('playAllBtn');
  btn.classList.add('active');
  setStatus(mode === 'en' ? '英文朗读中…' : '全部朗读中…');

  for (let i = 0; i < items.length; i++) {
    if (!isPlaying) break;
    highlightItem(i);
    setStatus(`${i + 1}/${items.length}  ${items[i].en}`);

    await speak(items[i].en, 'en-US');

    if (!isPlaying) break;
    if (mode === 'both') {
      await new Promise(r => setTimeout(r, 300));
      if (!isPlaying) break;
      await speak(items[i].zh, 'zh-CN');
    }

    if (!isPlaying) break;
    await new Promise(r => setTimeout(r, 500));
  }

  highlightItem(-1);
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  if (isPlaying) setStatus('全部朗读完毕 ✓');
  isPlaying = false;
}

function stopAll() {
  isPlaying = false;
  synth.cancel();
  highlightItem(-1);
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  setStatus('已停止');
}

renderContent();
</script>
</body>
</html>
