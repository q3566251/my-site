    { type: "活动", phone: "(802) 362-4700", name: "Equinox Resort (Falconry)" },
    { type: "紧急", phone: "911", name: "紧急救援" },
    { type: "医疗", phone: "(802) 442-6361", name: "Southwestern VT Medical Center (Bennington, 最近医院约30min)" },
    { type: "道路", phone: "511", name: "VT道路状况" }
  ],
  openSchedule: {
    "5/18 Mon": {
      open: ["Dia:Beacon ✅", "Storm King ✅", "Hildene ✅(唯一机会!)", "Northshire ✅", "Orvis ✅", "Pastime Pinball ✅", "Manchester Hot Glass ✅", "Copper Grouse全天 ✅(live music!)"],
      closed: ["SVAC ❌(周一休)", "curATE ❌(周一休)", "Bennington Monument ❓(可能5/24才开,需确认)"]
    },
    "5/19 Tue": {
      open: ["SVAC ✅", "curATE ✅", "Northshire ✅", "Orvis ✅", "Silver Fork ✅", "Ye Olde Tavern ✅", "Pastime Pinball ✅", "Copper Grouse早+晚 ✅(无午餐)"],
      closed: ["Storm King ❌", "Dia:Beacon ❌", "Hildene ❌", "Manchester Hot Glass ❌"]
    },
    "5/20 Wed": {
      open: ["SVAC ✅", "curATE ✅(晚餐5-7:30)", "Northshire ✅", "Orvis ✅", "Silver Fork ✅", "Hill Farm ✅(4PM起)", "Pastime Pinball ✅"],
      closed: ["Hildene ❌", "Manchester Hot Glass ❌", "Copper Grouse ❌(只有早餐!)", "Skyline Drive ❌(5/23才开)"]
    }
  }
}

const tabDefs = [
  {id:"overview",label:"总览"},
  {id:"stops",label:"沿途停靠"},
  {id:"hotel",label:"酒店活动"},
  {id:"dining",label:"餐饮详情"},
  {id:"activities",label:"体验活动"},
  {id:"itinerary",label:"Day 1-3"},
  {id:"practical",label:"实用信息"}
];

let currentTab = "overview";

function L(url,text){return `<a href="${url}" target="_blank" rel="noopener noreferrer">${text}</a>`}
function tag(t,c){return `<span class="tag ${c||''}">${t}</span>`}
function card(inner){return `<div class="card">${inner}</div>`}
function h3(t){return `<h3>${t}</h3>`}
function warn(t){return `<div class="warn">${t}</div>`}
function menuRow(item,price,note){return `<div class="menu-row"><div><div class="name">${item}</div>${note?`<div class="note">${note}</div>`:''}</div><div class="price">${price}</div></div>`}
function itinRow(time,what,detail){return `<div class="itin-row"><div class="itin-time">${time}</div><div style="flex:1"><div class="itin-what">${what}</div><div class="itin-detail">${detail}</div></div></div>`}

function renderTabs(){
  document.getElementById('tabs').innerHTML = tabDefs.map(t=>
    `<button class="tab-btn ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(id){
  currentTab=id;
  renderTabs();
  renderContent();
}

function renderContent(){
  const el=document.getElementById('content');
  let h='';
  
  if(currentTab==='overview'){
    h+=warn(`<strong>⚠️ 日期关键提醒：</strong> 5/18周一 · 5/19周二 · 5/20周三。Hildene周二三休→<strong>只能5/18去</strong>。Dia:Beacon周二至四休。Storm King周二休。Copper Grouse <strong>周三只有早餐</strong>。Mt. Equinox Skyline Drive 5/23才开放。Bennington Monument可能5/24才开（需确认）。五月中旬Mud Season尾声。`);
    
    h+=card(h3('🗺️ 推荐路线')+`<p class="section-sub">${data.trip.route}</p><p style="font-size:.79rem;color:var(--muted)">${data.trip.routeNote}</p>`);
    
    h+=card(h3('🏨 目的地：'+data.hotel.name)+`<p class="section-sub">
      ${data.hotel.address} · ${L(data.hotel.website,'官网')} · ${L(data.hotel.ihg,'IHG')}<br>
      ${data.hotel.ranking}<br>
      Check-in ${data.hotel.checkIn} · Check-out ${data.hotel.checkOut}<br>
      Resort Fee: ${data.hotel.resortFee}<br>
      ${data.hotel.rooms} · ${data.hotel.roomFeatures}<br>
      宠物：${data.hotel.petPolicy}<br>
      IHG积分：${data.hotel.points}<br>
      其他：${data.hotel.extras}
    </p>`);
    
    let sched='';
    for(const[day,info] of Object.entries(data.openSchedule)){
      sched+=`<div style="margin-bottom:8px"><div style="font-weight:600;font-size:.87rem;margin-bottom:3px">${day}</div>
        <div style="font-size:.77rem;color:var(--green);line-height:1.6">${info.open.join(' · ')}</div>
        <div style="font-size:.77rem;color:var(--red);line-height:1.6">${info.closed.join(' · ')}</div></div>`;
    }
    h+=card(h3('📅 三天开放速查')+sched);
    
    let budget='';
    for(const b of data.budget.items){
      budget+=`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f2e7d9;font-size:.81rem">
        <span style="color:var(--text2)">${tag(b.category)} ${b.item}</span>
        <span style="color:var(--accent);font-weight:600;white-space:nowrap">${b.estimate}</span></div>`;
    }
    budget+=`<div style="margin-top:8px;font-weight:600;font-size:.88rem;color:var(--accent)">${data.budget.total}</div>`;
    h+=card(h3('💰 预算估算（2人）')+budget);
  }
  
  else if(currentTab==='stops'){
    for(const s of data.stops){
      let inner=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span class="stop-num">${s.num}</span>
        <div><div style="font-family:'Noto Serif SC',serif;font-weight:600;font-size:1rem">${s.nameZh}</div>
        <div style="font-size:.74rem;color:var(--muted)">${s.name} · ${s.location}</div></div>
        <div style="margin-left:auto;font-size:.69rem;background:var(--tag-bg);padding:2px 8px;border-radius:8px;color:var(--muted);white-space:nowrap">${s.distance}</div></div>`;
      inner+=s.tags.map(t=>tag(t,t==='购物'?'tag-orange':t==='历史'?'tag-blue':t==='自然'?'tag-green':'')).join('');
      inner+=`<p style="font-size:.84rem;color:var(--text2);line-height:1.8;margin-top:8px">${s.desc}</p>`;
      if(s.luxury)inner+=`<p style="font-size:.77rem;color:var(--muted);margin-top:4px"><strong>奢侈品：</strong>${s.luxury}</p>`;
      if(s.popular)inner+=`<p style="font-size:.77rem;color:var(--muted);margin-top:2px"><strong>流行品牌：</strong>${s.popular}</p>`;
      if(s.food)inner+=`<p style="font-size:.77rem;color:var(--muted);margin-top:2px"><strong>餐饮：</strong>${s.food}</p>`;
      let meta=[];
      if(s.hours)meta.push('⏰ '+s.hours);
      if(s.price)meta.push('💰 '+s.price);
      if(s.rating)meta.push('⭐ '+s.rating);
      if(meta.length)inner+=`<div class="meta">${meta.map(m=>'<span>'+m+'</span>').join('')}</div>`;
      if(s.tips)inner+=`<div class="tip-box">💡 ${s.tips}</div>`;
      inner+=`<div style="margin-top:6px">${L(s.link,'→ 官网/详情')}</div>`;
      h+=card(inner);
    }
  }
  
  else if(currentTab==='hotel'){
    let free='';
    for(const a of data.hotel.dailyFree){
      free+=`<div style="padding:7px 0;border-bottom:1px solid #f2e7d9">
        <div style="font-size:.87rem;font-weight:500">${a.icon} ${a.name}</div>
        <div style="font-size:.79rem;color:var(--text2);margin-top:2px;line-height:1.7">${a.desc}</div></div>`;
    }
    h+=card(h3('🎁 每日免费活动')+free);
    
    let exp='';
    for(const a of data.hotel.bookableExperiences){
      exp+=`<div style="padding:9px 0;border-bottom:1px solid #f2e7d9">
        <div style="font-size:.9rem;font-weight:600">${a.icon} ${a.name}</div>
        <div class="exp-price">${a.price}</div>
        <div style="font-size:.79rem;color:var(--text2);margin-top:3px;line-height:1.7">${a.desc}</div>`;
      if(a.note)exp+=`<div class="exp-note">${a.note}</div>`;
      exp+=`<div style="margin-top:3px;font-size:.77rem">`;
      if(a.phone)exp+=`<span style="color:var(--muted);margin-right:8px">📞 ${a.phone}</span>`;
      if(a.link)exp+=L(a.link,'→ 详情/预约');
      exp+=`</div></div>`;
    }
    h+=card(h3('🎯 可预约特色体验')+exp);
  }
  
  else if(currentTab==='dining'){
    // Copper Grouse
    let cg=h3('🍽️ '+data.copperGrouse.name+'（酒店餐厅）');
    cg+=`<p style="font-size:.81rem;color:var(--text2);margin-bottom:5px">${data.copperGrouse.chef} · ${data.copperGrouse.rating} · ${L(data.copperGrouse.website,'菜单')} · ${L(data.copperGrouse.opentable,'OpenTable')} · 📞${data.copperGrouse.phone}</p>`;
    cg+=`<p style="font-size:.77rem;color:var(--muted);margin-bottom:7px;line-height:1.6">${data.copperGrouse.chefNote}</p>`;
    cg+=warn(`<strong>你的日期营业时间：</strong><br>${data.copperGrouse.yourDates}`);
    
    const sections=[
      ['☀️ 早餐 ($11-16)',data.copperGrouse.breakfast],
      ['🥗 前菜/沙拉',data.copperGrouse.appetizers],
      ['🥩 主菜',data.copperGrouse.entrees],
      ['🥗 配菜',data.copperGrouse.sides],
      ['🍰 甜点',data.copperGrouse.desserts],
      ['🍸 饮品',data.copperGrouse.drinks]
    ];
    for(const[title,items] of sections){
      cg+=`<div style="margin-bottom:7px"><div style="font-weight:600;font-size:.87rem;margin-bottom:3px">${title}</div>`;
      for(const m of items) cg+=menuRow(m.item,m.price,m.note||'');
      cg+=`</div>`;
    }
    cg+=`<div class="tip-box">💡 ${data.copperGrouse.budgetTip}</div>`;
    h+=card(cg);
    
    // Other restaurants
    for(const r of data.restaurants){
      let inner=`<div style="display:flex;justify-content:space-between;align-items:flex-start">${h3(r.emoji+' '+r.name)}${tag(r.price,'tag-orange')}</div>`;
      inner+=`<p style="font-size:.77rem;color:var(--muted);margin-bottom:3px">${r.type} · ${r.hours}</p>`;
      if(r.address)inner+=`<p style="font-size:.77rem;color:var(--muted)">📍 ${r.address}${r.phone?' · 📞 '+r.phone:''}</p>`;
      inner+=`<p style="font-size:.84rem;color:var(--text2);margin-top:5px;line-height:1.8">${r.desc}</p>`;
      inner+=`<div style="margin-top:7px"><div style="font-weight:500;font-size:.84rem;margin-bottom:3px">必点推荐：</div>`;
      for(const m of r.mustOrder) inner+=`<div style="font-size:.81rem;color:var(--text2);padding:2px 0;line-height:1.6">• ${m}</div>`;
      inner+=`</div>`;
      if(r.tips)inner+=`<div class="tip-box">💡 ${r.tips}</div>`;
      if(r.link)inner+=`<div style="margin-top:5px">${L(r.link,'→ 官网')}${r.tripadvisor?' · '+L(r.tripadvisor,'Tripadvisor'):''}</div>`;
      h+=card(inner);
    }
  }
  
  else if(currentTab==='activities'){
    for(const a of data.activities){
      let inner=h3(a.emoji+' '+a.name);
      inner+=`<div class="exp-price">${a.price}</div>`;
      inner+=`<p style="font-size:.84rem;color:var(--text2);line-height:1.8;white-space:pre-line">${a.desc}</p>`;
      if(a.warning)inner+=warn(a.warning);
      if(a.link)inner+=`<div style="margin-top:5px">${L(a.link,'→ 详情')}${a.link2?' · '+L(a.link2,'→ 飞蝇钓博物馆'):''}</div>`;
      h+=card(inner);
    }
  }
  
  else if(currentTab==='itinerary'){
    for(const day of data.itinerary){
      let inner=h3(day.day)+`<p style="font-size:.84rem;color:var(--text2);margin-bottom:7px;font-weight:500">${day.title}</p>`;
      for(const it of day.items) inner+=itinRow(it.time,it.what,it.detail);
      h+=card(inner);
    }
  }
  
  else if(currentTab==='practical'){
    h+=card(h3('🌤️ 五月天气')+`<p class="section-sub">Manchester 5月平均高温18-22°C (64-72°F)，夜间可降至5-8°C (41-46°F)。山区温差大，Mt. Equinox山顶比山下低5-10°C。偶有阵雨。Mud Season尾声，4月-6月初步道泥泞。Lye Brook Falls 5月水量最佳（雪融水）。绿意刚刚爆发，非常清新。</p>`);
    
    let pack='';
    for(const p of data.packing) pack+=`<div style="font-size:.84rem;color:var(--text2);padding:3px 0">☐ ${p}</div>`;
    h+=card(h3('🎒 装箱清单')+pack);
    
    let emerg='';
    for(const e of data.emergencies){
      const tc=e.type==='紧急'||e.type==='医疗'?'tag-red':'';
      emerg+=`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f2e7d9;font-size:.84rem">
        <span style="color:var(--text2)">${tag(e.type,tc)} ${e.name}</span>
        <span style="color:var(--accent);font-weight:600">${e.phone}</span></div>`;
    }
    h+=card(h3('📞 重要电话')+emerg);
    
    h+=card(h3('📱 信号 & 导航')+`<p class="section-sub">进入Vermont南部后手机信号非常不稳定（T-Mobile/AT&T/Verizon都一样）。Route 7A廊桥周边、Lye Brook Falls步道、山区几乎无信号。<strong>必须提前下载Google Maps离线地图</strong>（设置→离线地图→选择VT区域）。也可下载AllTrails离线步道地图。EZPass提前确认余额（I-87有收费站）。</p>`);
    
    const links=[
      ["Kimpton Taconic",data.hotel.website],
      ["Copper Grouse菜单",data.copperGrouse.website],
      ["Copper Grouse预约",data.copperGrouse.opentable],
      ["Silver Fork","https://www.thesilverforkvt.com/"],
      ["Crooked Ram","https://www.thecrookedram.com/"],
      ["Ye Olde Tavern","https://www.yeoldetavern.net/"],
      ["Hill Farm","https://www.hillfarminn.com/dine"],
      ["Mystico 802","https://mystico802.com/"],
      ["curATE Café","https://www.svac.org/curate-cafe/"],
      ["Reluctant Panther","https://www.reluctantpanther.com/dining"],
      ["Northshire Bookstore","https://www.northshire.com/"],
      ["Storm King","https://stormking.org/"],
      ["Dia Beacon","https://www.diaart.org/visit/visit-our-locations-702/dia-beacon-702"],
      ["Hildene","https://hildene.org/"],
      ["Bennington Monument","https://www.benningtonbattlemonument.com/"],
      ["SVAC","https://www.svac.org/"],
      ["Equinox Preserve","https://www.equinoxpreservationtrust.org/"],
      ["Skyline Drive","https://equinoxmountain.com/"],
      ["Land Rover Experience","https://experience.landroverusa.com/vermont/index.html"],
      ["Manchester Hot Glass","https://www.manchesterhotglass.com/classes/"],
      ["Orvis Flagship","https://www.orvis.com/s/manchester-vermont-flagship-store/store-1007"],
      ["AMFF飞蝇钓博物馆","https://www.amff.org/"],
      ["Renu Lounge","https://www.renulounge.com/packages"],
      ["Falconry","https://www.equinoxresort.com/activities/falconry"],
      ["BVO皮划艇","https://www.battenkillvalleyoutdoors.com/"],
      ["Lye Brook Falls","https://www.alltrails.com/trail/us/vermont/lye-brook-falls-trail"],
      ["Bromley Mountain","https://www.bromley.com/"],
      ["Consider Bardwell Farm","https://www.considerbardwellfarm.com/"],
      ["Pastime Pinball","https://www.pastimepinball.com/"],
      ["Woodbury Common","https://www.premiumoutlets.com/outlet/woodbury-common"],
      ["Manchester Outlets","https://www.manchesterdesigneroutlets.com/"],
      ["Manchester VT总览","https://www.manchestervermont.com/"]
    ];
    let linkHtml='<div class="link-grid">';
    for(const[name,url] of links) linkHtml+=`<div>${L(url,name)}</div>`;
    linkHtml+='</div>';
    h+=card(h3('🔗 所有链接汇总')+linkHtml);
  }
  
  el.innerHTML=h;
}

renderTabs();
renderContent();
</script>

</html>
