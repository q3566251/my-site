<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>核动力测评</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB",sans-serif;background:#f7f5f0;min-height:100vh;color:#1a1a1a}
.page{display:none}.page.active{display:block}
.wrap{max-width:660px;margin:0 auto;padding:2rem 1.25rem}

/* Hero */
.hero{background:linear-gradient(145deg,#f5f0e8,#ede4d4,#e8dfd0);border-radius:20px;padding:2.5rem 2rem;text-align:center;margin-bottom:2rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(184,120,24,.07) 0%,transparent 60%),radial-gradient(ellipse at 75% 80%,rgba(42,122,80,.05) 0%,transparent 60%);pointer-events:none}
.hero-badge{display:inline-block;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.1);border-radius:100px;padding:4px 14px;font-size:11px;font-weight:700;color:#7a5c2e;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.1rem}
.hero h1{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;color:#2a1f0e;margin-bottom:.6rem;letter-spacing:.02em}
.hero p{font-size:14.5px;color:#6b5030;line-height:1.75;max-width:380px;margin:0 auto}
.hero-icons{display:flex;justify-content:center;gap:10px;margin-bottom:1.25rem;margin-top:.25rem}
.hero-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid rgba(0,0,0,.1);background:rgba(255,255,255,.45)}

/* Info card */
.info-card{background:#fff;border:1px solid #e8e5de;border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.info-row{display:flex;align-items:flex-start;gap:10px;font-size:13.5px;color:#555;margin-bottom:.65rem;line-height:1.6}
.info-row:last-child{margin-bottom:0}
.info-dot{width:6px;height:6px;border-radius:50%;background:#b87818;flex-shrink:0;margin-top:6px}

/* Progress */
.prog-wrap{margin-bottom:1.75rem}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.prog-label{font-size:13px;font-weight:700;color:#555;font-family:'Noto Serif SC',serif}
.prog-count{font-size:13px;font-weight:700;color:#2a7a50}
.prog-bar{height:5px;background:#e8e5de;border-radius:3px}
.prog-fill{height:100%;background:linear-gradient(90deg,#b87818,#2a7a50);border-radius:3px;transition:width .35s ease}
.prog-hint{font-size:12px;color:#aaa;margin-top:.6rem}

/* Questions */
.qcard{background:#fff;border:1px solid #e8e5de;border-radius:14px;padding:1.35rem 1.5rem;margin-bottom:.85rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.qcard-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:1.1rem}
.qnum{font-size:11px;font-weight:700;color:#ccc;min-width:22px;padding-top:3px;flex-shrink:0}
.qtext{font-size:15px;line-height:1.75;color:#1a1a1a;font-weight:500}
.choice-row{display:flex;gap:10px;align-items:stretch}
.choice-btn{flex:1;background:#f9f8f5;border:1.5px solid #e8e5de;border-radius:10px;padding:.85rem 1rem;cursor:pointer;font-size:13.5px;line-height:1.6;color:#444;transition:all .18s;text-align:center;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB",sans-serif}
.choice-btn:hover{border-color:#b87818;background:#fdf3e0;color:#7a4e08}
.choice-btn.sel{border-color:#b87818;background:#b87818;color:#fff;font-weight:500}
.choice-btn.dim{border-color:#eee;background:#fafaf8;color:#ccc}
.vs-mid{display:flex;align-items:center;justify-content:center;flex-shrink:0;width:32px}
.vs-label{font-size:10px;font-weight:700;color:#ccc;letter-spacing:.06em}

/* Buttons */
.btn-row{display:flex;gap:12px;margin-top:1.75rem;padding-bottom:2.5rem}
.btnP{background:linear-gradient(135deg,#c08820,#2a7a50);color:#fff;border:none;border-radius:10px;padding:.85rem 2rem;font-size:15px;font-weight:500;cursor:pointer;flex:1;transition:filter .15s;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB",sans-serif}
.btnP:hover{filter:brightness(1.1)}
.btnP:disabled{opacity:.35;cursor:not-allowed;filter:none}
.btnS{background:#fff;color:#666;border:1px solid #ddd;border-radius:10px;padding:.8rem 1.5rem;font-size:14px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB",sans-serif}
.btnS:hover{background:#f5f4f0}
.btnFull{width:100%;font-size:16px;padding:1rem}

/* Results */
.rcard{background:#fff;border:1px solid #e8e5de;border-radius:14px;padding:1.4rem 1.5rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-label{font-size:11px;color:#aaa;letter-spacing:.07em;text-transform:uppercase;font-weight:700;margin-bottom:.35rem}
.card-sub{font-size:12px;color:#bbb;margin-bottom:1rem}
.primary-row{display:flex;align-items:center;gap:14px}
.p-icon{width:58px;height:58px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;gap:2px}
.p-name{font-size:21px;font-weight:700;font-family:'Noto Serif SC',serif}
.p-desc{font-size:12.5px;color:#999;margin-top:3px;line-height:1.4}
.p-score{font-size:32px;font-weight:700;margin-left:auto;flex-shrink:0;font-family:'Noto Serif SC',serif}

/* Bars */
.bar-row{margin-bottom:.9rem}
.bar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem}
.bar-track{height:8px;background:#f0eeea;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;width:0%;transition:width 1s cubic-bezier(.4,0,.2,1)}

/* Interpretation */
.interp-block{border-radius:12px;padding:1.15rem 1.25rem;margin-bottom:.75rem;border:1.5px solid transparent}
.interp-head{display:flex;align-items:center;gap:8px;margin-bottom:.6rem}
.interp-body{font-size:14px;line-height:1.85}
.interp-body p{margin-bottom:.6rem}
.interp-body p:last-child{margin-bottom:0}
.interp-section{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin:.9rem 0 .4rem;opacity:.7}
.interp-bullets{list-style:none;padding:0;margin:.4rem 0 .6rem}
.interp-bullets li{display:flex;align-items:flex-start;gap:8px;font-size:13.5px;line-height:1.65;margin-bottom:.3rem}

/* Tags */
.tags-wrap{display:flex;flex-wrap:wrap;gap:8px;margin:1rem 0}
.tag-pill{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:100px;font-size:13px;font-weight:600;line-height:1}
.tag-pill .tag-hash{font-weight:700;opacity:.5;font-size:12px}

/* Figures */
.figures-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.75rem}
.figure-card{display:flex;align-items:flex-start;gap:10px;background:#f9f8f5;border:1px solid #e8e5de;border-radius:10px;padding:.8rem 1rem}
.figure-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:1px}
.figure-name{font-size:13px;font-weight:700;color:#222;line-height:1.3}
.figure-role{font-size:11px;color:#aaa;margin-top:1px}
.figure-why{font-size:11.5px;color:#666;margin-top:5px;line-height:1.55;border-top:1px solid #eee;padding-top:5px}

/* System grid */
.sys-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem}
.sys-item{border-radius:10px;padding:.9rem 1rem}

@media(max-width:480px){
  .wrap{padding:1rem .85rem}
  .choice-btn{font-size:13px;padding:.75rem .7rem}
  .p-score{font-size:26px}
  .sys-grid{grid-template-columns:1fr}
  .figures-row{grid-template-columns:1fr}
}
</style>
</head>

  <div id="questions"></div>
  <div class="btn-row">
    <button class="btnS" onclick="goTo(0)">← 返回</button>
    <button class="btnP" id="qnext" disabled onclick="showResults()">查看结果 →</button>
  </div>
</div>
</div>

<div id="p2" class="page">
<div class="wrap" id="results"></div>
</div>

// Shuffle questions each load
(function(){
  for(var i=QS.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=QS[i];QS[i]=QS[j];QS[j]=tmp;
  }

var ans = {};

function buildQuestions(){
  var c = document.getElementById('questions');
  c.innerHTML = '';
  QS.forEach(function(q, i){
    c.innerHTML += '<div class="qcard">'
      + '<div class="qcard-top"><div class="qnum">' + (i+1) + '</div><div class="qtext">' + q.q + '</div></div>'
      + '<div class="choice-row">'
      + '<button class="choice-btn" id="opt_'+i+'_L" onclick="setAns('+i+',\'L\')">'+q.L.t+'</button>'
      + '<div class="vs-mid"><span class="vs-label">VS</span></div>'
      + '<button class="choice-btn" id="opt_'+i+'_R" onclick="setAns('+i+',\'R\')">'+q.R.t+'</button>'
      + '</div></div>';
  });
}

function setAns(qi, side){
  ans[qi] = side;
  var L = document.getElementById('opt_'+qi+'_L');
  var R = document.getElementById('opt_'+qi+'_R');
  if(side==='L'){L.className='choice-btn sel';R.className='choice-btn dim';}
  else{R.className='choice-btn sel';L.className='choice-btn dim';}
  var done = Object.keys(ans).length;
  document.getElementById('qcount').textContent = done + ' / 25';
  document.getElementById('qbar').style.width = (done/25*100) + '%';
  var btn = document.getElementById('qnext');
  btn.disabled = done < 25;
  btn.textContent = done < 25 ? '还有 '+(25-done)+' 题未选' : '查看结果 →';
}

function goTo(n){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('p'+n).classList.add('active');
  window.scrollTo(0,0);
}

function renderInterpBlock(k, role, score, isStar){
  var s = SYS[k];
  var d = INTERP[k][role];
  var hi = (role === 'primary');
  var bg = hi ? s.bg : '#fafaf8';
  var borderColor = hi ? (s.color+'55') : '#eeebe5';
  var textColor = hi ? s.tc : '#444';

  var bulletsHtml = d.bullets.map(function(b){
    return '<li style="color:'+textColor+'">'
      +'<span style="color:'+s.color+';font-weight:700;flex-shrink:0">·</span>'
      +'<span>'+b+'</span></li>';
  }).join('');

  var weakHtml = '';
  if(d.weaknesses){
    var wItems = d.weaknesses.map(function(b){
      return '<li style="color:'+textColor+'">'
        +'<span style="color:#c0392b;font-weight:700;flex-shrink:0">·</span>'
        +'<span>'+b+'</span></li>';
    }).join('');
    weakHtml = '<div class="interp-section" style="color:'+s.tc+'">'+d.sectionB+'</div>'
      +'<ul class="interp-bullets">'+wItems+'</ul>';
  }

  var suggHtml = '';
  if(d.suggestion){
    suggHtml = '<div style="margin-top:.75rem;padding:.85rem 1rem;border-radius:8px;background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.07)">'
      +'<div style="font-size:10px;font-weight:700;color:'+s.tc+';letter-spacing:.05em;text-transform:uppercase;margin-bottom:.35rem">建议</div>'
      +'<div style="font-size:13.5px;line-height:1.7;color:'+textColor+'">'+d.suggestion+'</div>'
      +'</div>';
  }

  return '<div class="interp-block" style="background:'+bg+';border-color:'+borderColor+'">'
    +'<div class="interp-head">'
    +'<span style="font-size:17px">'+s.icon+'</span>'
    +'<span style="font-size:13.5px;font-weight:700;color:'+s.tc+'">'+s.zh+'</span>'
    +'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:'+(hi?'rgba(255,255,255,.6)':'#eeebe5')+';color:'+s.tc+'">'
    +score+'pt'+(isStar?' ★':'')+'</span>'
    +'</div>'
    +'<div class="interp-body" style="color:'+textColor+'">'
    +'<p>'+d.intro+'</p>'
    +'<div class="interp-section" style="color:'+s.tc+'">'+d.sectionA+'</div>'
    +'<ul class="interp-bullets">'+bulletsHtml+'</ul>'
    +weakHtml
    +suggHtml
    +'</div></div>';
}

function renderTagsAndFigures(pk, isDual, sk){
  var keys = isDual ? [pk, sk] : [pk];
  var html = '';
  keys.forEach(function(k){
    var p = PROFILE[k];
    var s = SYS[k];
    var tagsHtml = p.tags.map(function(t){
      return '<span class="tag-pill" style="background:'+s.bg+';color:'+s.tc+'">'
        +'<span class="tag-hash">#</span>'+t+'</span>';
    }).join('');
    var figuresHtml = p.figures.map(function(f){
      return '<div class="figure-card">'
        +'<div class="figure-avatar" style="background:'+s.bg+'">'+f.emoji+'</div>'
        +'<div style="flex:1">'
        +'<div class="figure-name">'+f.name+'</div>'
        +'<div class="figure-role">'+f.role+'</div>'
        +'<div class="figure-why">'+f.why+'</div>'
        +'</div></div>';
    }).join('');
    html += '<div style="margin-bottom:'+(isDual?'1.75rem':'0')+'">'
      +(isDual?'<div style="font-size:12px;font-weight:700;color:'+s.tc+';margin-bottom:.75rem;display:flex;align-items:center;gap:6px">'+s.icon+' '+s.zh+'</div>':'')
      +'<div class="tags-wrap">'+tagsHtml+'</div>'
      +'<div style="font-size:12px;color:#aaa;margin-bottom:.4rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase">与你相似的人</div>'
      +'<div class="figures-row">'+figuresHtml+'</div>'
      +'</div>';
  });
  return html;
}

function showResults(){
  var scores = {A:0, B:0, C:0, D:0, E:0};
  QS.forEach(function(q, i){
    if(ans[i] !== undefined) scores[q[ans[i]].s]++;
  });

  var sorted = Object.keys(scores).sort(function(a,b){
    return scores[b]-scores[a] || a.localeCompare(b);
  });
  var pk = sorted[0], sk = sorted[1];
  var pv = scores[pk], sv = scores[sk];
  var isDual = (pv - sv) <= 1;
  var structLabel = isDual ? SYS[pk].zh + ' + ' + SYS[sk].zh : SYS[pk].zh;

  var barsHtml = sorted.map(function(k,i){
    var v = scores[k];
    var label = '';
    if(i===0) label = '<span style="font-size:11px;color:#bbb;font-weight:400;margin-left:5px">主导</span>';
    else if(isDual&&i===1) label = '<span style="font-size:11px;color:#bbb;font-weight:400;margin-left:5px">主导</span>';
    else if(!isDual&&i===1) label = '<span style="font-size:11px;color:#bbb;font-weight:400;margin-left:5px">辅助</span>';
    return '<div class="bar-row">'
      +'<div class="bar-head">'
      +'<span style="font-size:13px;font-weight:600;color:'+SYS[k].color+'">'+SYS[k].icon+' '+SYS[k].zh+label+'</span>'
      +'<span style="font-size:13px;color:#999;font-weight:500">'+v+'<span style="font-size:11px;color:#bbb"> / '+MAX+'</span></span>'
      +'</div>'
      +'<div class="bar-track"><div class="bar-fill" data-w="'+Math.round(v/MAX*100)+'" style="background:'+SYS[k].color+'"></div></div>'
      +'</div>';
  }).join('');

  var interpHtml = sorted.map(function(k,i){
    var role, isStar = false;
    if(i===0){role='primary';isStar=true;}
    else if(isDual&&i===1){role='primary';isStar=true;}
    else if(scores[k]<=3){role='low';}
    else if(i===1&&!isDual){role='secondary';}
    else{role='background';}
    return renderInterpBlock(k, role, scores[k], isStar);
  }).join('');

  var chipsHtml = isDual
    ? '<div style="display:flex;gap:7px;flex-wrap:wrap">'
      +'<span style="background:'+SYS[pk].bg+';color:'+SYS[pk].tc+';padding:4px 13px;border-radius:20px;font-size:12px;font-weight:600">'+SYS[pk].icon+' '+SYS[pk].zh+' '+pv+'pt</span>'
      +'<span style="background:'+SYS[sk].bg+';color:'+SYS[sk].tc+';padding:4px 13px;border-radius:20px;font-size:12px;font-weight:600">'+SYS[sk].icon+' '+SYS[sk].zh+' '+sv+'pt</span>'
      +'</div>'
    : '<div style="font-size:13px;color:#888">辅助动力: <strong style="color:'+SYS[sk].tc+'">'+SYS[sk].zh+'</strong> &nbsp;·&nbsp; '+sv+'pt</div>';

  var iconHtml = isDual
    ? '<span>'+SYS[pk].icon+'</span><span>'+SYS[sk].icon+'</span>'
    : SYS[pk].icon;

  var sysGridHtml = Object.entries(SYS).map(function(entry){
    var k=entry[0], s=entry[1];
    var hi = (k===sorted[0])||(isDual&&k===sorted[1]);
    return '<div class="sys-item" style="background:'+s.bg+';'+(hi?'outline:2px solid '+s.color+';outline-offset:1px':'')+'">'
      +'<div style="font-size:13px;font-weight:700;color:'+s.tc+';margin-bottom:3px">'+s.icon+' '+s.zh+(hi?' ★':'')+'</div>'
      +'<div style="font-size:11px;color:'+s.tc+';opacity:.8;line-height:1.4">'+s.desc+'</div>'
      +'</div>';
  }).join('');

  var tagsHtml = renderTagsAndFigures(pk, isDual, sk);

  document.getElementById('results').innerHTML =
    '<div style="border-bottom:1px solid #f0eeea;padding-bottom:1.5rem;margin-bottom:1.5rem">'
    +'<div style="font-size:11px;color:#aaa;letter-spacing:.07em;text-transform:uppercase;font-weight:700;margin-bottom:.35rem">核动力测评 · 结果</div>'
    +'<h2 style="font-size:24px;font-weight:700;margin-bottom:.4rem;font-family:\'Noto Serif SC\',serif">你的核动力图谱</h2>'
    +'<p style="font-size:13px;color:#888">基于 25 组对比选择</p>'
    +'</div>'

    +'<div class="rcard" style="border-left:4px solid '+SYS[pk].color+';background:linear-gradient(135deg,#fdf3e0,#e8f5ee)">'
    +'<div class="card-label" style="color:#a07840">'+(isDual?'Dual Drive · 双核动力':'Primary Drive · 核心动力')+'</div>'
    +'<div class="primary-row">'
    +'<div class="p-icon" style="background:rgba(255,255,255,.7)">'+iconHtml+'</div>'
    +'<div style="flex:1">'
    +'<div class="p-name" style="color:#2a1f0e">'+structLabel+'</div>'
    +'<div class="p-desc" style="color:#8a6a30">'+(isDual?SYS[pk].name+' + '+SYS[sk].name+' · 差距 '+(pv-sv)+' 分，双核判定':SYS[pk].name+' · 领先 '+(pv-sv)+' 分')+'</div>'
    +'</div>'
    +'<div class="p-score" style="color:'+SYS[pk].color+'">'+pv+'<span style="font-size:13px;font-weight:400;color:#bbb">pt</span></div>'
    +'</div>'
    +'<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,.07)">'+chipsHtml+'</div>'
    +'</div>'

    +'<div class="rcard">'
    +'<div class="card-label">五大动力得分</div>'
    +'<div class="card-sub">每个维度最多 10 分，得分越高代表该动力在你的能量结构中激活度越高</div>'
    +barsHtml+'</div>'

    +'<div class="rcard"><div class="card-label">动力解读</div>'+interpHtml+'</div>'

    +'<div class="rcard"><div class="card-label">五大核动力</div>'
    +'<p style="font-size:13px;color:#999;margin-bottom:1rem;line-height:1.6">每个人都同时拥有这五种动力来源，只是主导的强度不同。了解你的动力结构，能帮助你更有意识地选择环境、目标和关系。</p>'
    +'<div class="sys-grid">'+sysGridHtml+'</div></div>'

    +'<div class="rcard"><div class="card-label">你的标签 &amp; 相似的人</div>'+tagsHtml+'</div>'

    +'<div style="text-align:center;margin-top:1.5rem;padding-bottom:2.5rem">'
    +'<button onclick="resetAll()" style="background:#fff;color:#666;border:1px solid #ddd;border-radius:10px;padding:.85rem 2.5rem;font-size:14px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,\'PingFang SC\',\'Hiragino Sans GB\',sans-serif">重新测评</button>'
    +'</div>';

  goTo(2);
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    document.querySelectorAll('.bar-fill[data-w]').forEach(function(b){b.style.width=b.dataset.w+'%';});
  });});
}

function resetAll(){
  Object.keys(ans).forEach(function(k){delete ans[k];});
  buildQuestions();
  document.getElementById('qcount').textContent = '0 / 25';
  document.getElementById('qbar').style.width = '0%';
  document.getElementById('qnext').disabled = true;
  document.getElementById('qnext').textContent = '还有 25 题未选';
  goTo(0);
}

buildQuestions();
</script>
</body>
</html>
