<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人格深处 · 看见名人背后的性格真相</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--page-bg:#fff;--soft-bg:#f6f7f9;--card-bg:#fff;--sidebar-bg:#fafafa;--text:#1d1d1f;--text-mid:#48484a;--text-body:#6e6e73;--text-light:#86868b;--border:#e8e8ed;--border-light:#f0f0f2;--accent:#2d6a4f;--accent-light:#52b788;--glass:rgba(255,255,255,0.78);--shadow-sm:0 1px 3px rgba(0,0,0,0.04);--shadow-md:0 4px 20px rgba(0,0,0,0.06);--r:14px;--r-sm:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--page-bg);color:var(--text);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:var(--glass);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border-light)}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-left{display:flex;align-items:center;gap:14px}
.nav-title{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:500;color:var(--text)}
.menu-btn{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--text-mid)}
.menu-btn svg{display:block}
.nav-right{display:flex;align-items:center;gap:16px}
.theme-dots{display:flex;gap:6px}
.swatch{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;transition:transform .2s}
.swatch:hover{transform:scale(1.15)}
.swatch.active{box-shadow:0 0 0 2px var(--page-bg),0 0 0 3.5px var(--text-light)}
.nav-count{font-size:11px;color:var(--text-light)}

/* LAYOUT */
.app{display:flex;max-width:1100px;margin:0 auto;min-height:calc(100vh - 52px)}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--border-light);background:var(--sidebar-bg);padding:20px 0;overflow-y:auto;position:sticky;top:52px;height:calc(100vh - 52px)}
.sidebar-header{padding:0 20px 16px;border-bottom:1px solid var(--border-light);margin-bottom:8px}
.sidebar-header h2{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.sidebar-header p{font-size:11px;color:var(--text-light)}

/* Folder */
.folder{margin-bottom:2px}
.folder-btn{width:100%;padding:10px 20px;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text-mid);transition:all .2s;text-align:left}
.folder-btn:hover{background:var(--soft-bg);color:var(--text)}
.folder-btn.open{color:var(--accent)}
.folder-arrow{font-size:9px;transition:transform .2s;color:var(--text-light);width:12px;text-align:center}
.folder-btn.open .folder-arrow{transform:rotate(90deg)}
.folder-icon{font-size:14px}
.folder-count{margin-left:auto;font-size:10px;font-weight:400;color:var(--text-light);background:var(--soft-bg);padding:1px 7px;border-radius:10px}

/* Person items */
.folder-items{display:none;padding:2px 0}
.folder-items.open{display:block}
.person-btn{width:100%;padding:7px 20px 7px 44px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;color:var(--text-body);transition:all .15s;text-align:left;display:flex;align-items:center;gap:8px}
.person-btn:hover{background:var(--soft-bg);color:var(--text)}
.person-btn.active{background:var(--accent);color:#fff;border-radius:0}
.person-btn .p-years{font-size:10px;margin-left:auto;opacity:.6}

/* MAIN CONTENT */
.main{flex:1;min-width:0;padding:0 32px 80px}

/* Welcome screen */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px 20px}
.welcome h1{font-family:'Noto Serif SC',serif;font-size:clamp(24px,4vw,36px);font-weight:600;color:var(--text);margin-bottom:12px;line-height:1.3}
.welcome p{font-size:14px;color:var(--text-body);max-width:400px;line-height:1.7}
.welcome .arrow-hint{margin-top:24px;font-size:12px;color:var(--text-light);display:flex;align-items:center;gap:6px}

/* Profile content - same styles as before */
.profile-header{padding:32px 0 28px;border-bottom:1px solid var(--border-light);margin-bottom:40px;opacity:0;transform:translateY(16px);animation:fadeUp .5s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.profile-meta{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.profile-name{font-family:'Playfair Display','Noto Serif SC',serif;font-size:clamp(24px,3.5vw,34px);font-weight:700;color:var(--text)}
.profile-years{font-size:13px;color:var(--text-light);font-weight:300}
.profile-role{font-size:12px;color:var(--accent);font-weight:500;letter-spacing:.05em;margin-bottom:8px}
.profile-tagline{font-family:'Noto Serif SC',serif;font-size:16px;color:var(--text-mid);font-weight:300;font-style:italic;line-height:1.65}
.achievement{margin-top:14px;padding:14px 18px;background:var(--soft-bg);border-radius:var(--r-sm);border:1px solid var(--border)}
.achievement-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.achievement-text{font-size:13.5px;color:var(--text-mid);line-height:1.7}
.quote-block{border-left:3px solid var(--accent-light);padding:16px 20px;margin-bottom:44px;background:var(--soft-bg);border-radius:0 var(--r-sm) var(--r-sm) 0}
.quote-text{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--text);font-style:italic;line-height:1.7}
.sect{margin-bottom:48px;opacity:0;transform:translateY(20px);transition:all .6s ease}
.sect.visible{opacity:1;transform:translateY(0)}
.sect-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.sect-title{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:600;color:var(--text);margin-bottom:18px}
.prose{font-size:14.5px;color:var(--text-body);line-height:1.9}
.keywords{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.kw{font-size:12px;padding:5px 14px;border-radius:100px;background:var(--soft-bg);border:1px solid var(--border);color:var(--text-mid);font-weight:500}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:7px;top:4px;bottom:4px;width:1.5px;background:var(--border)}
.tl-item{position:relative;margin-bottom:28px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-28px;top:6px;width:15px;height:15px;border-radius:50%;background:var(--card-bg);border:2px solid var(--accent-light)}
.tl-item.pain .tl-dot{border-color:#c0392b}.tl-item.turn .tl-dot{border-color:#e67e22}.tl-item.grow .tl-dot{border-color:var(--accent)}.tl-item.loss .tl-dot{border-color:#7b1fa2}
.tl-age{font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:3px;display:flex;align-items:center;gap:8px}
.tl-tag{font-size:10px;padding:1px 8px;border-radius:100px;font-weight:500}
.tl-tag.pain{background:#fdecea;color:#c0392b}.tl-tag.turn{background:#fef3e2;color:#e67e22}.tl-tag.grow{background:#e8f5e9;color:#2d6a4f}.tl-tag.loss{background:#f3e5f5;color:#7b1fa2}
.tl-title{font-family:'Noto Serif SC',serif;font-size:14.5px;font-weight:500;color:var(--text);margin-bottom:4px}
.tl-desc{font-size:13.5px;color:var(--text-body);line-height:1.8}
.think-grid{display:grid;gap:14px}
.think-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm);transition:box-shadow .3s,transform .3s}
.think-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.think-label{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:6px}
.think-body{font-size:13.5px;color:var(--text-body);line-height:1.8}
.contra-card{background:var(--soft-bg);border-radius:var(--r);padding:20px;margin-bottom:14px;border-left:3px solid var(--border)}
.contra-vs{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px}
.contra-body{font-size:13.5px;color:var(--text-body);line-height:1.8}
.insight-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--shadow-sm);transition:box-shadow .3s,transform .3s}
.insight-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.insight-who{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.insight-who::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent-light)}
.insight-msg{font-size:13.5px;color:var(--text-body);line-height:1.85}
.dark-truth{background:var(--soft-bg);border-radius:var(--r);padding:20px 22px;border-left:3px solid var(--text-light)}
.dark-truth p{font-size:13.5px;color:var(--text-light);line-height:1.85}

/* Manifesto welcome */
.manifesto{display:flex;flex-direction:column;justify-content:center;min-height:70vh;padding:48px 24px 60px;max-width:560px;margin:0 auto}
.manifesto-eyebrow{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.manifesto h1{font-family:'Noto Serif SC',serif;font-size:clamp(22px,3.5vw,32px);font-weight:600;color:var(--text);line-height:1.4;margin-bottom:28px}
.manifesto-body{display:flex;flex-direction:column;gap:16px}
.manifesto-body p{font-size:14.5px;color:var(--text-body);line-height:2}
.manifesto-body p.highlight{font-family:'Noto Serif SC',serif;font-size:15.5px;color:var(--text-mid);line-height:1.9;padding:16px 20px;background:var(--soft-bg);border-radius:var(--r-sm);border-left:3px solid var(--accent-light)}
.manifesto-cta{margin-top:32px;padding-top:24px;border-top:1px solid var(--border-light);font-size:12px;color:var(--text-light);display:flex;align-items:center;gap:8px}

.clinical-section{background:var(--soft-bg);border-radius:var(--r);padding:24px;border:1px solid var(--border)}
.clinical-phase{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border-light)}
.clinical-phase:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.cp-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.cp-label.dx{color:#c0392b}.cp-label.dx::before{content:'';width:8px;height:8px;border-radius:50%;background:#c0392b}
.cp-label.window{color:#e67e22}.cp-label.window::before{content:'';width:8px;height:8px;border-radius:50%;background:#e67e22}
.cp-label.plan{color:var(--accent)}.cp-label.plan::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent)}
.cp-label.whatif{color:#7b1fa2}.cp-label.whatif::before{content:'';width:8px;height:8px;border-radius:50%;background:#7b1fa2}
.cp-body{font-size:13.5px;color:var(--text-body);line-height:1.85}
.cp-phases{display:grid;gap:12px;margin-top:12px}
.cp-phase-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px}
.cp-phase-when{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:4px}
.cp-phase-how{font-size:13px;color:var(--text-body);line-height:1.75}
.cp-phase-outcome{font-size:12px;color:var(--text-light);margin-top:6px;font-style:italic}

/* Themes */
body.theme-warm{--page-bg:#f7f1e8;--soft-bg:#f2e7d9;--card-bg:#fdf9f4;--sidebar-bg:#f5ede3;--glass:rgba(247,241,232,0.82)}
body.theme-sage{--page-bg:#edf4ee;--soft-bg:#e3eee5;--card-bg:#f4f8f4;--sidebar-bg:#e8f0e9;--glass:rgba(237,244,238,0.82)}
body.theme-mist{--page-bg:#eef4f8;--soft-bg:#e3edf4;--card-bg:#f6f9fb;--sidebar-bg:#e8f0f5;--glass:rgba(238,244,248,0.82)}
body.theme-blush{--page-bg:#f8eef2;--soft-bg:#f2e3e9;--card-bg:#fcf7f9;--sidebar-bg:#f3e8ed;--glass:rgba(248,238,242,0.82)}

/* Mobile overlay */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:150}
.sidebar-overlay.show{display:block}

@media(max-width:768px){
  .sidebar{position:fixed;left:-280px;top:52px;width:280px;z-index:160;height:calc(100vh - 52px);transition:left .3s ease;box-shadow:none}
  .sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,0.1)}
  .menu-btn{display:block}
  .main{padding:0 16px 60px}
}
</style>
</head>
<body>
<nav><div class="nav-inner"><div class="nav-left">
<button class="menu-btn" id="menuBtn"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="6" x2="17" y2="6"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="14" x2="17" y2="14"/></svg></button>
<div class="nav-title">人格深处</div></div>
<div class="nav-right"><div class="theme-dots"><div class="swatch active" data-theme="default" style="background:#fff"></div><div class="swatch" data-theme="warm" style="background:#f0e4d3"></div><div class="swatch" data-theme="sage" style="background:#d5e8d7"></div><div class="swatch" data-theme="mist" style="background:#d5e3ed"></div><div class="swatch" data-theme="blush" style="background:#ecd5dd"></div></div><div class="nav-count" id="navCount"></div></div></div></nav>

<div class="sidebar-overlay" id="overlay"></div>
<div class="app">
<aside class="sidebar" id="sidebar">
<div class="sidebar-header"><h2>人物目录</h2><p>按领域分类 · 点击展开</p></div>
<div id="folderNav"></div>
</aside>
<main class="main" id="main"></main>
</div>

<script>
// ═══════════════════════════════════════
// CATEGORIES — 加分类只需要加一个对象
// ═══════════════════════════════════════
const CATEGORIES=[
{name:"科学家",icon:"🔬",people:["Albert Einstein","Marie Curie","Isaac Newton","Charles Darwin","Sigmund Freud","Stephen Hawking","Alan Turing"]},
{name:"艺术家",icon:"🎨",people:["Leonardo da Vinci","Ludwig van Beethoven","Vincent van Gogh","Wolfgang Mozart","Michelangelo","Frida Kahlo","Virginia Woolf","Ernest Hemingway","Fyodor Dostoevsky","Charlie Chaplin","Michael Jackson","Kurt Cobain","Sylvia Plath"]},
{name:"政治家与领袖",icon:"⚖️",people:["Abraham Lincoln","Martin Luther King Jr.","Muhammad Ali","Mahatma Gandhi","Nelson Mandela","Winston Churchill","Napoleon Bonaparte","Cleopatra","Che Guevara","Joan of Arc","Malala Yousafzai","Genghis Khan","Julius Caesar"]},
{name:"企业家",icon:"🚀",people:["Steve Jobs","Elon Musk","Henry Ford","Walt Disney","Nikola Tesla","Jeff Bezos","Oprah Winfrey"]},
{name:"哲学家与思想家",icon:"📖",people:["Socrates","Friedrich Nietzsche","Simone de Beauvoir","Karl Marx","Confucius"]},
{name:"探险家与运动员",icon:"🏆",people:["Alexander the Great","Bruce Lee","Serena Williams","Michael Jordan","Amelia Earhart"]}
];

// ═══════════════════════════════════════
// FIGURE DATA — 加人物 = 加一个对象
// ═══════════════════════════════════════
const FIGURES={
"Albert Einstein":{name:"Albert Einstein",years:"1879–1955",role:"理论物理学家",tagline:"他看到了宇宙的方程式，却读不懂身边人的心",achievements:"提出狭义相对论与广义相对论，彻底改写人类对时间、空间和引力的理解。质能方程 E=mc² 成为物理学最著名的公式。1921年诺贝尔物理学奖。他的工作直接奠定了核能、GPS、激光技术的理论基础。",quote:"想象力比知识更重要。知识是有限的，想象力概括世界的一切。",personality:{summary:"Einstein 的核心是一种「局外人」式的认知方式。他不是在现有框架内思考得更快——他是站在所有框架之外，然后问：「如果这个框架本身就是错的呢？」这种思维方式让他16岁就能想象「如果骑着光线跑会看到什么」，也让他在人际关系中始终是个旁观者。他对抽象概念的共情力远超对具体人类的共情力——宇宙的优雅让他落泪，但妻子的痛苦让他困惑。",keywords:["视觉化思维实验","权威反叛者","情感疏离","极端独立","哲学式好奇心"]},timeline:[{age:"4-5岁",type:"turn",title:"指南针事件",desc:"父亲给他一个指南针。那根永远指向北方的针让他震惊——一个看不见的力在控制它。他后来说这个瞬间让他第一次感到「这个世界背后藏着巨大的秘密」。这种惊奇感驱动了他一生。"},{age:"少年",type:"pain",title:"学校里的局外人",desc:"他讨厌德国学校的军事化教育——死记硬背、服从权威、不准提问。老师当着全班说他「永远不会有出息」。他不是成绩差——他是拒绝在他认为愚蠢的体系里表演。"},{age:"16岁",type:"turn",title:"光线思维实验",desc:"他想象自己骑着一束光跑——如果和光同速，光看起来会是什么样？这个看似幼稚的问题，花了他十年才回答。答案是狭义相对论。"},{age:"17-22岁",type:"pain",title:"被学术界拒绝",desc:"毕业后没有大学愿意给他教职。他申请了无数助教职位，全被拒绝。最后在伯尔尼专利局当了一个三级技术审查员。"},{age:"26岁",type:"grow",title:"奇迹年",desc:"1905年，一个专利局小职员在一年内发表了四篇改变物理学的论文：光电效应、布朗运动、狭义相对论、质能等价。物理学界震惊了。"},{age:"36岁",type:"grow",title:"广义相对论发表",desc:"花了八年时间，他把引力重新定义为时空的弯曲。1919年日食观测证实了他的预言，他一夜之间成为全世界最著名的科学家。"},{age:"中年",type:"pain",title:"与家庭的割裂",desc:"他和第一任妻子 Mileva 的婚姻充满了冷漠和控制。他给她写过一份「条件清单」：不准期待亲密、必须在他要求时沉默。小儿子 Eduard 后来患上精神分裂症，Einstein 几乎没有探望过他。"},{age:"54岁",type:"turn",title:"逃离纳粹德国",desc:"作为犹太人，他的书被焚烧，悬赏金挂在他头上。他永远离开了欧洲，定居普林斯顿。他花余生试图完成统一场论——但再也没有成功。"},{age:"76岁",type:"loss",title:"去世",desc:"他拒绝了手术，说：「我想在我想走的时候走。」他死时床头放着未完成的统一场论手稿。"}],thinking:[{label:"思维实验法",body:"Einstein 不是数学天才——他的数学经常需要别人帮忙。他的武器是视觉化思维实验：「如果我追着光跑会怎样？」他用画面而非公式来探索物理学。公式是最后一步——先有画面，再有直觉，最后才是方程。"},{label:"反权威直觉",body:"他对任何「大家都这么认为」的东西有本能的怀疑。牛顿力学统治了200年？那就问它在光速附近还成不成立。这种反叛不是叛逆——是他真的无法接受未经自己验证的结论。"},{label:"孤独作为工具",body:"他最好的工作都是在相对孤立的状态下完成的。他需要大量不被打扰的时间来让想法在脑中「发酵」。社交对他来说是消耗，不是充电。"}],contradictions:[{vs:"改变人类文明 ↔ 无法维持一段健康的亲密关系",body:"他理解时空弯曲，但不理解为什么妻子需要情感回应。同一个能对宇宙之美感动落泪的人，在家里是一块石头。"},{vs:"和平主义者 ↔ 推动了核武器的诞生",body:"他签署了致罗斯福总统的信，建议研发原子弹。战后他说：「如果我知道德国人不会成功制造原子弹，我一根手指都不会动。」"},{vs:"极度自信 ↔ 晚年的执拗和孤立",body:"年轻时的自信让他敢挑战牛顿。但同样的自信在晚年变成了固执——他拒绝接受量子力学的概率性，用三十年和主流物理学对抗。这一次，他是错的。"}],insights:[{who:"在体制内感到窒息的人",msg:"Einstein 被学校讨厌、被学术界拒绝、在专利局坐了七年冷板凳。他的突破恰恰发生在体制之外。但也要注意：他最终还是需要学术社区来验证和传播他的工作。"},{who:"聪明但人际关系总出问题的人",msg:"如果你也有这个倾向，他的人生是一个警示：你可以在事业上登峰造极，但如果你儿子在精神病院而你不去看他，那些方程式不会让你心安。"}],darkTruth:"Einstein 的小儿子 Eduard 崇拜父亲，梦想成为精神科医生。20岁时被诊断为精神分裂症，此后在精神病院度过了大部分人生。Einstein 在移居美国后几乎没有再见过他。Einstein 改变了人类理解宇宙的方式——但他自己的儿子，他理解不了，也接不住。"},

"Marie Curie":{name:"Marie Curie",years:"1867–1934",role:"物理学家 · 化学家",tagline:"她发现了放射性，放射性也杀死了她",achievements:"人类历史上第一位获得诺贝尔奖的女性，唯一一个在两个不同科学领域获得诺贝尔奖的人。发现了钋和镭两种元素。她的研究奠定了放射疗法的基础。一战期间她发明了移动X光车，亲自开到前线。",quote:"生活中没有什么可怕的东西，只有需要被理解的东西。",personality:{summary:"Curie 的核心是一种近乎自虐的专注力。她在零下六度的棚屋里搅拌数吨矿渣提炼镭，双手被辐射灼伤到溃烂，她做笔记。她不是不知道自己在受伤——她是认为受伤不重要。",keywords:["极端专注","忽略身体信号","沉默的坚韧","不屈服于偏见","情感克制"]},timeline:[{age:"少年",type:"pain",title:"在俄国占领下的波兰长大",desc:"学校里不准说波兰语。她在地下学校秘密学习。知识是唯一不能被占领者夺走的东西。"},{age:"17岁",type:"turn",title:"和姐姐的协定",desc:"Marie 先工作供姐姐在巴黎读书，然后姐姐回报她。她做了六年家庭教师，每天晚上自学物理和数学。"},{age:"24岁",type:"turn",title:"到巴黎求学",desc:"住在没有暖气的阁楼，冬天把所有衣服盖在身上睡觉。一天只吃面包和巧克力。班上排名第一。"},{age:"28岁",type:"turn",title:"遇见 Pierre Curie",desc:"他写信给她说：「如果你不爱我，至少可以来当我的实验搭档。」她来了。"},{age:"31岁",type:"grow",title:"发现放射性 → 发现钋和镭",desc:"她和 Pierre 在漏雨的棚屋里处理了数吨矿渣，用最原始的方式提炼出了镭。"},{age:"36岁",type:"grow",title:"第一个诺贝尔奖（物理学）",desc:"第一个获得诺贝尔奖的女性。但诺贝尔委员会最初只想给 Pierre 和另一个男科学家——是 Pierre 坚持要加上 Marie。"},{age:"39岁",type:"pain",title:"Pierre 被马车撞死",desc:"她在日记中写道：「他们让我看了他的头。我亲吻了他的脸。它还是温的。」之后她开始在日记中对 Pierre 说话，好像他还活着。"},{age:"44岁",type:"pain",title:"婚外情丑闻",desc:"法国报纸称她为「波兰荡妇」。暴民在她家门口扔石头。诺贝尔委员会建议她不要来领第二个奖——她回复：「奖是给我的科学成就的，和我的私生活无关。」她去了。"},{age:"44岁",type:"grow",title:"第二个诺贝尔奖（化学）",desc:"在丑闻最猛烈的时候获奖。人类历史上唯一一个在两个不同学科获诺贝尔奖的人。"},{age:"67岁",type:"loss",title:"死于再生障碍性贫血",desc:"长年的辐射暴露摧毁了她的骨髓。她的实验笔记至今仍有放射性，需要穿防护服才能翻阅。"}],thinking:[{label:"沉默的方法论",body:"她的研究方式不是灵感式的——是苦力式的。处理数吨矿渣、做数千次测量、重复再重复。「我从不期待发现。我只是不停地工作。」"},{label:"用工作处理一切",body:"Pierre 死后，她没有停下来哀悼——她接替了他在巴黎大学的教职。她把所有的痛苦都倒进了工作里。工作是她的庇护所，也是她的监狱。"},{label:"对偏见的回应方式",body:"面对性别歧视，她的策略不是抗争——是用成果让对方闭嘴。她不参加游行，不写抗议信。她的回应方式是：再发一篇论文，再拿一个奖。"}],contradictions:[{vs:"拯救了数百万人的生命 ↔ 杀死了自己",body:"她发现的放射性原理催生了放射疗法。但同一种放射性也在缓慢地杀死她。她口袋里常年放着一小瓶镭，因为「它发出的光很美」。"},{vs:"在科学领域的绝对严谨 ↔ 在情感中的无力",body:"她可以在实验室里控制每一个变量，但在 Pierre 死后她完全崩溃了——连续数月写日记和死去的丈夫对话。"},{vs:"沉默内敛 ↔ 不让步的铁骨",body:"她日常是安静的。但当诺贝尔委员会建议她因丑闻不要来领奖时，她的回复冷如手术刀。"}],insights:[{who:"女性在男性主导的行业中挣扎的人",msg:"Curie 的策略是「用成果说话」。有用——但意味着你需要做到比所有男性同行都好两倍才能得到一半的认可。今天的你有更多选择——你可以同时用成果和声音。"},{who:"用工作逃避情感的人",msg:"工作可以是庇护所，但不能是唯一的庇护所。Curie 把工作当作唯一的情感出口——这让她在事业上无可匹敌，但也让她在需要帮助时不知道怎么开口。"}],darkTruth:"Curie 的个人物品至今仍然具有放射性。她的食谱本、家具、衣服——都被放在铅衬里的箱子中保存。想要翻阅她的笔记本需要签署免责声明并穿防护服。她把自己的身体献给了科学——不是比喻，是字面意义上的。"},

"Leonardo da Vinci":{name:"Leonardo da Vinci",years:"1452–1519",role:"全才 · 文艺复兴人",tagline:"他什么都想知道，什么都没做完",achievements:"《蒙娜丽莎》《最后的晚餐》的创作者。同时是解剖学家、工程师、建筑师、发明家。他的手稿包含了飞行器、坦克、太阳能聚焦器的设计——比时代超前数百年。",quote:"学习永远不会耗尽心灵。",personality:{summary:"Da Vinci 的核心是一种无法满足的好奇心——不是「想知道答案」，而是「想理解一切」。他的大脑没有学科边界。这种跨领域的感知力让他成为历史上最接近「什么都懂」的人。但同一种无边际的好奇心也让他极少完成项目——他一生完成的画作不到20幅。",keywords:["无限好奇心","跨领域思维","完成困难","观察力极端","孤独的局外人"]},timeline:[{age:"出生",type:"pain",title:"私生子",desc:"他是公证员父亲和农妇母亲的非婚生子。无法继承父业、无法进入大学、无法加入公会。但也意味着：没有任何预设的人生路径。"},{age:"14岁",type:"turn",title:"进入韦罗基奥工坊",desc:"在那里他学了绘画、雕塑、冶金、木工。传说他画了一个天使局部，好到韦罗基奥从此放下画笔。"},{age:"24岁",type:"pain",title:"被匿名指控鸡奸",desc:"虽然最终撤诉，但这件事留下了深刻的恐惧。他此后对私生活极度保密，笔记使用镜像文字书写。"},{age:"30岁",type:"turn",title:"移居米兰",desc:"他给米兰公爵的自荐信几乎没提绘画——列了军事工程、桥梁设计等技能，最后才说「我也会画画」。"},{age:"43-46岁",type:"grow",title:"《最后的晚餐》",desc:"花三年。他经常几天盯着墙壁不动笔。他回答院长：「最伟大的天才有时候工作最少的时候完成最多。」"},{age:"51岁",type:"grow",title:"《蒙娜丽莎》开始创作",desc:"可能花了超过十年，直到去世时仍带在身边。他在这幅画上实验了「渐隐法」。"},{age:"50+岁",type:"pain",title:"大量项目未完成",desc:"飞行器没造出来。骑马铜像被法国士兵当靶子射毁。运河只建了一部分。他的笔记本里有上万页——几乎都停在「如果能这样…」的阶段。"},{age:"67岁",type:"loss",title:"在法国去世",desc:"法国国王给了他一座庄园，条件只是「陪我聊天」。一个私生子、一个什么都没完成的人，最后被一个国王当作最有趣的头脑来珍藏。"}],thinking:[{label:"观察即思考",body:"他不区分「观察」和「思考」。他可以花一个下午看水流过石头，然后画出流体力学图示。他的7000多页笔记本质上是一个持续运转的「观察-推理」系统。"},{label:"类比跨域",body:"他的大脑自动在不同领域之间建立连接：心脏的瓣膜像河流的漩涡，人体的比例像建筑的结构。这种跨领域的类比能力是他最核心的天赋。"},{label:"拖延的本质",body:"他不是懒——他是永远觉得「还不够好」和「还有更有趣的事」。每个项目进行到一半，他就发现一个新问题，然后追着新问题跑。"}],contradictions:[{vs:"人类最博学的头脑 ↔ 几乎没有完成任何「大项目」",body:"他知道的比任何同代人都多，做完的比大多数人都少。这是关于「广度 vs 深度」的极端案例。"},{vs:"极端的观察力 ↔ 对自己内心的沉默",body:"他能画出人体每一块肌肉的走向，但笔记里几乎没有关于自己情感的记录。"},{vs:"不属于任何群体 ↔ 渴望被接纳",body:"私生子、可能的同性恋者、无学历的自学者——他在每一个社群里都是局外人。但他的自荐信和对赞助人的讨好显示他一直在寻找「接纳他全部的地方」。"}],insights:[{who:"什么都感兴趣但什么都做不完的人",msg:"Da Vinci 就是你——只是他活了500年前。那些未完成的草图里藏着飞行器和坦克的雏形。找到方法把你的碎片连接起来。"},{who:"觉得自己不属于任何「圈子」的人",msg:"他一辈子都不属于任何地方。但他把「不属于任何一个类别」变成了「可以进入所有类别」。"}],darkTruth:"Da Vinci 一生未婚，几乎没有亲密关系的记录。在一个对同性恋处以火刑的时代，他必须把自己最真实的部分藏起来。他可以解剖人体的每一个秘密，但他自己最大的秘密必须带进坟墓。"},

"Ludwig van Beethoven":{name:"Ludwig van Beethoven",years:"1770–1827",role:"作曲家",tagline:"他在无声的世界里创造了人类最响亮的音乐",achievements:"创作了9部交响曲、32首钢琴奏鸣曲、16首弦乐四重奏。《第九交响曲》「欢乐颂」成为人类团结的象征。他完全失聪后创作的晚期作品被认为是音乐史上最深刻的人类表达。",quote:"音乐是比一切智慧和哲学更高的启示。",personality:{summary:"Beethoven 的核心是一种无法被压制的情感能量——当他快乐时能照亮整个管弦乐团；当他愤怒时能把钢琴砸碎。这种过载让他的音乐有一种其他作曲家无法复制的力量感。但同一种过载也让他的日常生活是一场灾难。",keywords:["情感过载","倔强到底","自我毁灭倾向","藐视权威","极端孤傲与极端脆弱"]},timeline:[{age:"幼年",type:"pain",title:"父亲的暴力音乐教育",desc:"父亲是酗酒的宫廷歌手，想把他培养成莫扎特式的神童。他经常在深夜被从床上拖起来练琴，弹错就被打。"},{age:"17岁",type:"pain",title:"母亲去世",desc:"他最爱的人在他17岁时去世。父亲完全沉溺于酒精。17岁的 Beethoven 成为家庭的经济支柱。"},{age:"22岁",type:"turn",title:"移居维也纳",desc:"他拒绝像仆人一样对贵族鞠躬。他说：「贵族有千千万万个，Beethoven 只有一个。」"},{age:"28岁",type:"pain",title:"开始失去听力",desc:"耳朵里永久的嗡鸣声。对一个音乐家来说，这等同于画家开始失明。"},{age:"32岁",type:"pain",title:"海利根施塔特遗书",desc:"他几乎选择了结束一切。但信的最后他写道：「是艺术——只有艺术——把我从死亡边缘拉回来。」"},{age:"33-38岁",type:"grow",title:"英雄时期",desc:"《第三交响曲》《第五交响曲》《热情奏鸣曲》。他把个人的愤怒和抗争直接注入了音乐——这在之前是没有人做过的。"},{age:"45岁",type:"pain",title:"完全失聪",desc:"他指挥首演时看不到乐团的反应，直到一个乐手拉他转身面向观众——全场起立鼓掌，而他什么都听不到。"},{age:"54-56岁",type:"grow",title:"《第九交响曲》与晚期四重奏",desc:"在完全无声的世界里写出了人类音乐史上最深刻的作品。一个聋人写出的关于人类团结的赞歌。"},{age:"56岁",type:"loss",title:"去世",desc:"传说他临终时举起拳头对着天空。2万人参加了他的葬礼。"}],thinking:[{label:"音乐作为搏斗",body:"他的手稿涂改涂改再涂改，同一个乐句可能有十几个版本。他不是在「创作」——他是在和音符摔跤，直到它们屈服。"},{label:"失聪后的内听觉",body:"完全失聪后靠「内听觉」创作。失聪反而让他不再受外部声音的干扰，直接进入了音乐的纯粹结构层面。"},{label:"孤独作为创作条件",body:"搬家超过70次，和房东吵架，公寓里食物腐烂。但这种混乱对他可能是必要的——所有的秩序都在音乐里。"}],contradictions:[{vs:"写出人类最温柔的慢板 ↔ 日常生活中的暴脾气",body:"《月光奏鸣曲》第一乐章可能是音乐史上最温柔的五分钟。但写出它的人曾经把一盘炖肉扔到服务员脸上。"},{vs:"「欢乐颂」↔ 一生无法与任何人建立持久关系",body:"他写了歌颂所有人成为兄弟的合唱——但他自己没有妻子，没有持久的友谊。"},{vs:"聋了 ↔ 写出了最好的音乐",body:"他最伟大的作品恰恰诞生于完全失聪之后。安静让他进入了没有人到过的音乐空间。"}],insights:[{who:"正在失去某种核心能力的人",msg:"也许定义你的不是那个能力本身，而是它背后更深的东西。Beethoven 失去了听力，但音乐没有停。"},{who:"脾气差、人际关系总出问题的人",msg:"Beethoven 的暴脾气和他的创作能量是同源的。但他如果能控制愤怒，音乐不会更差——人生一定会更好。"}],darkTruth:"Beethoven 晚年为争夺侄子 Karl 的监护权打了漫长的官司。但他对 Karl 的控制如此窒息，Karl 在19岁时用手枪对准自己的头开了一枪——他活了下来，但这是他唯一能想到的逃离方式。一个能为人类写出「欢乐颂」的人，把自己最亲的人逼到了绝路。"},

"Vincent van Gogh":{name:"Vincent van Gogh",years:"1853–1890",role:"画家",tagline:"他画出了世界的光，自己却活在黑暗里",achievements:"后印象派最重要的画家之一。10年创作生涯画了超过2100幅作品，包括《星夜》《向日葵》《麦田群鸦》。生前只卖出一幅画。死后作品价值数亿美元。",quote:"如果你心中有一个声音说「你不会画画」——那就画吧，那个声音就会安静下来。",personality:{summary:"Van Gogh 的核心是一种无法被满足的连接渴望——他一生都在试图和人建立深刻的关系，几乎每一次都失败了。他的画里那些旋转的星空、燃烧的向日葵，不是在描绘风景——它们是他内心情感的温度和形状。",keywords:["极度渴望连接","反复被拒绝","情感过载","自我怀疑与使命感并存","以画为呼吸"]},timeline:[{age:"少年-青年",type:"pain",title:"多次职业失败",desc:"先后做过艺术品经销商（被解雇）、教师（不适合）、传教士（因过度狂热被教会解除）。每一次他都全身心投入，每一次都失败。"},{age:"青年",type:"pain",title:"反复被拒绝的爱情",desc:"爱上房东的女儿——被拒绝。爱上表姐——被拒绝。和一个怀孕的妓女同居——家人逼他离开。"},{age:"27岁",type:"turn",title:"决定成为画家",desc:"在所有「正常」的路都走不通之后，他决定画画。画画是唯一能容纳他的表达强度的形式。"},{age:"33岁",type:"turn",title:"来到巴黎",desc:"看到了印象派——他的调色板从荷兰的灰暗突然爆发成法国的色彩。两年内画了200多幅。"},{age:"35岁",type:"pain",title:"阿尔勒 → 与高更决裂 → 割耳",desc:"一次激烈的争吵后割下了自己的耳朵。他因此被送进精神病院。"},{age:"36岁",type:"grow",title:"精神病院中的创作爆发",desc:"在圣雷米精神病院画出了《星夜》。一年画了150多幅画。"},{age:"37岁",type:"loss",title:"开枪自杀",desc:"他走到麦田里射击自己的腹部。Theo 赶来时他说：「悲伤将永远持续。」两天后去世。Theo 六个月后也去世了。"}],thinking:[{label:"色彩即情感",body:"他不是在画风景——他是用颜料表达体温。向日葵的黄色是他感受到的灼烧般的强度。《星夜》的旋涡就是他看星空时的感觉。"},{label:"给 Theo 的信",body:"一生写了超过600封信给弟弟。这些信是他唯一的情感出口，也是他和人类世界之间唯一稳定的连接。"},{label:"失败作为燃料",body:"在世时只卖出一幅画。他没有为此改变风格——他反而画得更凶了。他的动力不来自外部认可——来自「不画就会死」的内在逼迫。"}],contradictions:[{vs:"极度渴望被爱 ↔ 把每一个走近的人吓跑",body:"他对人的投入方式总是太多、太快、太沉重。高更在阿尔勒待了两个月就受不了了。"},{vs:"生前无人认可 ↔ 死后价值数亿",body:"他死后的价格不能弥补他生前的孤独。"},{vs:"画面的温暖 ↔ 内心的冰冷绝望",body:"他的画是一个在深渊边缘的人拼命抓住的美好碎片。"}],insights:[{who:"觉得自己的才华不被看见的人",msg:"不要等死后被发现。找到你的「Theo」——一个愿意看见你的人，哪怕只有一个。"},{who:"对一切感受都太强烈的人",msg:"这种强度不是需要「降低」的东西——但它确实需要一个出口和一个支撑系统。Van Gogh 的支撑系统只有 Theo 一个人——这不够。"}],darkTruth:"Van Gogh 在精神病院里试图吞食颜料。他的「天才」和他的「疯狂」可能是同一个大脑状态的两个表现。今天的精神科可能能帮助他——但我们不知道那样的 Van Gogh 还能不能画出《星夜》。这是一个没有正确答案的问题。"},

"Abraham Lincoln":{name:"Abraham Lincoln",years:"1809–1865",role:"美国第16任总统",tagline:"他用一生的抑郁换来了一个国家的解放",achievements:"领导美国度过内战，颁布《解放黑人奴隶宣言》，废除奴隶制度。被普遍认为是美国历史上最伟大的总统。在国家分裂、战争死亡超过60万人的情况下维持了联邦统一。",quote:"我走得慢，但我从不退后。",personality:{summary:"Lincoln 的核心是一种与终身抑郁症共存的深沉韧性。他的抑郁是他理解人类苦难的窗口，也是他能在战争中做出最艰难决定的基础。他用幽默来对抗黑暗——不是因为他乐观，而是因为笑是他唯一能控制痛苦的方式。",keywords:["终身抑郁","幽默作为盔甲","极端的同理心","战略性耐心","道德固执"]},timeline:[{age:"幼年",type:"pain",title:"边疆贫困家庭",desc:"在印第安纳州的荒野木屋长大。他说自己的童年就是「'穷'的简短无趣编年史」。"},{age:"9岁",type:"pain",title:"母亲去世",desc:"他帮父亲做了棺材。9岁开始经历伴随一生的抑郁。"},{age:"少年-青年",type:"turn",title:"自学成才",desc:"正规教育不到一年。所有知识都来自借书和自学。法律完全自学。"},{age:"26岁",type:"pain",title:"挚友去世 → 第一次严重抑郁发作",desc:"朋友们担心他会自杀，把所有刀子从他身边收走。他说：「如果把我的痛苦平均分给全人类，地球上就不会有一张开心的脸。」"},{age:"32岁",type:"pain",title:"第二次抑郁崩溃",desc:"他缺席了自己的婚礼，卧床不起。朋友说他看起来像「行走的死人」。"},{age:"中年",type:"pain",title:"两个儿子先后死去",desc:"Eddie 4岁时死亡。Willie 11岁时在白宫死去。Lincoln 被人看到独自坐在 Willie 的房间里哭泣。"},{age:"51岁",type:"turn",title:"当选总统",desc:"他当选时南方各州就开始脱离联邦。没有人认为他能处理这个局面。"},{age:"52-56岁",type:"grow",title:"领导内战 → 解放宣言",desc:"他做出了美国历史上最艰难的决定：打一场死亡60万人的内战来维持联邦和废除奴隶制。"},{age:"56岁",type:"loss",title:"在剧院被暗杀",desc:"内战结束仅五天后被射杀。他是第一个被暗杀的美国总统。"}],thinking:[{label:"抑郁现实主义",body:"中度抑郁的人对现实的判断往往比「正常人」更准确。Lincoln 的抑郁可能让他对战争的残酷有一种比同僚更清醒的认知。"},{label:"幽默作为生存策略",body:"他自己说过：「如果我不笑，我就会哭。」他用笑话来调节房间里的情绪压力，也用来调节自己的。"},{label:"战略性耐心",body:"他在废奴的时机选择上等了两年。他写了一封愤怒的信给表现糟糕的将军，然后——没有寄出去。他理解「正确的事情在错误的时间做就变成了错误的事情」。"}],contradictions:[{vs:"终身抑郁 ↔ 带领国家度过最黑暗的时期",body:"他的抑郁是他领导力的组成部分——一个知道绝望是什么感觉的人，在面对国家级的绝望时不会慌张。"},{vs:"极端的同理心 ↔ 下令让数十万人送死",body:"他会为逃兵签特赦令，但也批准了导致大规模死亡的军事行动。这种选择的重量几乎压碎了他。"},{vs:"反对奴隶制 ↔ 早期的种族偏见",body:"他早期说过不赞成黑人和白人平等。他的立场在战争中发生了变化。他是一个在进化中的人，不是一个天生的圣人。"}],insights:[{who:"正在和抑郁共存的人",msg:"Lincoln 没有「战胜」抑郁——他带着它当了总统、打了内战、废了奴隶制。你不需要等到「好了」才开始活。"},{who:"觉得自己「太敏感」不适合领导的人",msg:"Lincoln 为逃兵哭泣、为阵亡士兵的母亲写信。正是这种敏感让他能在最残酷的决定中保持人性。"}],darkTruth:"Lincoln 的妻子 Mary Todd 在他死后精神逐渐崩溃，被自己的儿子送进了精神病院。她的四个儿子中三个在她生前就死了。总统的光环照不到家里那些空了的椅子。"},

"Martin Luther King Jr.":{name:"Martin Luther King Jr.",years:"1929–1968",role:"民权领袖 · 牧师",tagline:"他有一个梦，这个梦让他夜夜失眠",achievements:"美国民权运动最核心的领导者。「我有一个梦」演讲是20世纪最重要的演说之一。1964年诺贝尔和平奖。他的工作直接推动了《民权法案》和《投票权法案》的通过。",quote:"黑暗不能驱逐黑暗，只有光可以。仇恨不能驱逐仇恨，只有爱可以。",personality:{summary:"King 的核心是一种在极端压力下仍然维持道德清晰度的能力。他不是天生的勇士——他是一个在凌晨三点接到死亡威胁电话后坐在厨房桌前颤抖的人。他的勇气不是「不怕」——是「怕了，仍然出门」。",keywords:["道德勇气","恐惧与信仰并存","演说天赋","战略性非暴力","极端压力下的消耗"]},timeline:[{age:"幼年",type:"pain",title:"在种族隔离中长大",desc:"他的白人玩伴的母亲有一天告诉他：「你们不能再一起玩了。」他第一次意识到自己的肤色意味着什么。"},{age:"15岁",type:"turn",title:"跳级进入大学",desc:"最初不想当牧师。是哲学课让他意识到：改变社会不能只靠个人成功。"},{age:"26岁",type:"turn",title:"蒙哥马利公共汽车抵制运动",desc:"他的家被炸弹炸了。他站在废墟前对愤怒的人群说：「我们必须用爱来面对恨。」"},{age:"30岁代",type:"pain",title:"反复入狱、被殴打、被监视",desc:"FBI 视他为「国内最危险的黑人」，进行了长达数年的秘密监控，甚至发匿名信试图逼他自杀。他被逮捕了29次。"},{age:"34岁",type:"grow",title:"「我有一个梦」",desc:"面对25万人，他放下准备好的演讲稿，即兴讲出了改变历史的话。"},{age:"35岁",type:"grow",title:"诺贝尔和平奖",desc:"35岁获奖。他把全部奖金捐给了民权运动。"},{age:"晚期",type:"pain",title:"越来越孤立的最后几年",desc:"当他开始反对越战、倡导经济正义时，连之前的盟友都和他保持距离。"},{age:"39岁",type:"loss",title:"在孟菲斯被暗杀",desc:"他前一天晚上说：「我可能到不了那里…但我们作为一个民族会到达那个应许之地。」他39岁。他知道自己会被杀。他还是去了。"}],thinking:[{label:"非暴力作为战略",body:"他的非暴力是高度主动的——目的是通过自身承受暴力来暴露压迫者的残暴，从而唤醒旁观者的良知。"},{label:"恐惧的管理",body:"他把恐惧纳入信仰框架——恐惧不是退出的理由，是「你在正确道路上的证据」。"},{label:"演说的建筑学",body:"他的演讲是精心建造的。重复、对比、节奏递进。他的声音是一种乐器。"}],contradictions:[{vs:"道德标杆 ↔ 私生活中的不忠",body:"FBI 的监控记录暗示他有多次婚外情。这不改变他的贡献——但它提醒我们不要把任何人当作完美的道德符号。"},{vs:"非暴力信仰 ↔ 他的存在引发了暴力",body:"他去的每一个城市都出现了冲突。这不是他的选择——但这个事实折磨着他。"},{vs:"公众面前的力量 ↔ 私下的崩溃",body:"39岁去世时，尸检报告说他的心脏状况像一个60岁的人。"}],insights:[{who:"想要改变不公正但害怕代价的人",msg:"King 不是不怕——他每天晚上都怕。他的策略不是「克服恐惧」，而是「在恐惧中行动」。"},{who:"在持续压力下濒临崩溃的人",msg:"King 的心脏在39岁时老化到60岁。他没扛过来。他39岁就死了。照顾好自己不是自私——是确保你能走得更远。"}],darkTruth:"King 知道自己会被暗杀。他的四个孩子当时最大的12岁，最小的5岁。他为一个民族的自由付出了自己的生命——也付出了他的孩子拥有一个父亲的权利。"},

"Muhammad Ali":{name:"Muhammad Ali",years:"1942–2016",role:"拳击手 · 社会活动家",tagline:"他拳头硬，嘴更硬，但最硬的是他的原则",achievements:"三次世界重量级拳击冠军。因拒绝参加越战被剥夺拳王头衔。最高法院最终推翻判决。联合国和平使者。他对种族平权的影响远超体育范畴。",quote:"不可能只是小人物嘴里的大词。",personality:{summary:"Ali 的核心是一种精心构建的人格表演——但这个「表演」比大多数人的「真实」更真实。他的大嘴、他的诗、他的赛前挑衅不是虚荣——它们是一个黑人男孩在1960年代的美国为自己创造存在空间的方式。",keywords:["表演型人格","种族意识先驱","原则至上","语言天赋","极端自信与深层不安全感"]},timeline:[{age:"12岁",type:"turn",title:"自行车被偷 → 学拳击",desc:"警察 Joe Martin 碰巧经营拳击馆。「你想揍那个偷车的人？先学会怎么打。」"},{age:"18岁",type:"grow",title:"罗马奥运会金牌",desc:"回到路易斯维尔，戴着金牌走进餐厅——被告知「我们不服务黑人」。"},{age:"22岁",type:"turn",title:"击败 Liston → 改名",desc:"把名字从 Cassius Clay 改为 Muhammad Ali。他说 Clay 是「奴隶的名字」。"},{age:"25岁",type:"pain",title:"拒绝参加越战",desc:"「没有越南人叫过我黑鬼。」他被剥夺拳王头衔、禁赛三年半——运动生涯的巅峰期。"},{age:"32岁",type:"grow",title:"「丛林之战」击败 Foreman",desc:"在扎伊尔发明了「靠绳战术」。全世界十亿人观看了这场比赛。"},{age:"42岁",type:"pain",title:"帕金森综合症",desc:"多年的头部重击导致帕金森。最快的嘴、最快的拳头，开始变得迟缓、颤抖。"},{age:"74岁",type:"loss",title:"去世",desc:"他与帕金森斗争了32年。他曾经是最被恨的人之一，最后成了世界上最被爱的人之一。"}],thinking:[{label:"嘴炮作为战术",body:"他的赛前挑衅不是自大——是精心计算的心理战。当对手带着愤怒上擂台时，已经输了一半。"},{label:"身体作为语言",body:"重量级拳手不应该像蝴蝶一样移动。他用身体打破规则，就像用言语打破社会规则。"},{label:"原则的代价核算",body:"拒绝参加越战时，他清楚知道代价。他不是冲动——他做了计算，然后选择了代价。"}],contradictions:[{vs:"最自信的公众人格 ↔ 来自种族歧视的深层不安全感",body:"「I am the greatest」是一个在种族隔离环境中长大的黑人男孩，用最大的音量告诉世界「我存在，我很重要」。"},{vs:"反暴力和平主义者 ↔ 以打人为生",body:"他拒绝在越南打仗因为不想伤害人。但他的职业就是击倒另一个人。"},{vs:"言语的锋利 ↔ 帕金森后的沉默",body:"世界上嘴最快的人，最终失去了说话的能力。但他在1996年奥运会上用颤抖的手点燃火炬——那一刻比所有垃圾话都更有力量。"}],insights:[{who:"面对不公正但害怕代价的人",msg:"Ali 不会告诉你「勇敢点」。他会告诉你：「先算清楚代价，然后决定你能不能承受。如果能，就做。」"},{who:"觉得自己需要靠「表演」才能被看见的人",msg:"确保你的表演来自你真实相信的东西。当表演和信念一致时，它就不是表演了——它是力量。"}],darkTruth:"Ali 的拳击生涯给了他帕金森综合症。他的后半生在颤抖和缓慢中度过。他的伟大，是用他的大脑换来的。"},

"Steve Jobs":{name:"Steve Jobs",years:"1955–2011",role:"企业家 · Apple 创始人",tagline:"他重新定义了人和技术的关系，却无法定义自己和人的关系",achievements:"共同创立 Apple，推出 Macintosh、iPod、iPhone、iPad。创立 Pixar。iPhone 的发布被认为是21世纪最重要的科技事件之一。他不是发明家——他是把技术变成人类直觉延伸的人。",quote:"活着就是为了改变世界，难道还有其他原因吗？",personality:{summary:"Jobs 的核心是一种极端的审美偏执——他对「完美」的定义不是「没有缺点」，而是「不可能更好」。同一种偏执也让他在人际关系中近乎暴虐——如果你的工作不符合标准，他会当众说「是垃圾」。他不是不知道这样会伤人——他是认为伤害比平庸更可接受。",keywords:["极端完美主义","现实扭曲力场","情感操控","审美至上","控制欲"]},timeline:[{age:"出生",type:"pain",title:"被亲生父母送养",desc:"他后来对同事说过：「我一直觉得被抛弃了。」这种被遗弃感驱动了他一生对控制的需求。"},{age:"少年",type:"turn",title:"在车库里看到电子学",desc:"养父教他：做东西的「内部」和「外部」一样重要。这成了他一生的产品哲学。"},{age:"21岁",type:"grow",title:"在车库创立 Apple",desc:"Woz 是天才工程师，Jobs 是那个说「不够好，重做」的人。"},{age:"23岁",type:"pain",title:"否认自己的女儿 Lisa",desc:"甚至在法庭上宣称自己不育。讽刺的是，他给一款电脑命名为「Lisa」。"},{age:"30岁",type:"pain",title:"被自己创立的公司赶走",desc:"被自己创造的东西抛弃，和被亲生父母抛弃，对他来说是同一种疼痛。"},{age:"30-42岁",type:"grow",title:"NeXT 和 Pixar",desc:"离开 Apple 后的「流放」让他学到：产品的灵魂不是技术参数，是它让人感受到什么。"},{age:"42岁",type:"grow",title:"回归 Apple",desc:"接下来十四年推出 iMac、iPod、iPhone、iPad。把濒临破产的 Apple 变成世界上最有价值的公司。"},{age:"56岁",type:"loss",title:"因胰腺癌去世",desc:"他最初拒绝手术，选择替代医学。等他最终接受手术时，癌症已经扩散。他的控制欲——对产品是天赋，对疾病是灾难。"}],thinking:[{label:"现实扭曲力场",body:"他真心相信不可能的事情是可能的，而且他的确信有传染性——团队会在他的注视下完成他们认为不可能的任务。"},{label:"减法美学",body:"他最核心的哲学不是「加什么」，而是「去掉什么」。他把禅宗的「空」变成了产品设计语言。"},{label:"残酷作为方法",body:"他公开羞辱不达标的人。这种管理方式产出了人类最好的消费电子产品——也让无数人带着心理创伤离开。"}],contradictions:[{vs:"改变了数亿人使用技术的方式 ↔ 否认自己的女儿",body:"他让产品充满「人性化」的设计细节，但否认自己的亲生女儿。他理解的「人性」是抽象的、理想化的——具体的人际关系让他恐惧。"},{vs:"禅修二十年 ↔ 一生都在愤怒",body:"禅宗没有化解他的愤怒——它只是给了他另一种美学语言。"},{vs:"「死亡是生命最好的发明」↔ 用替代医学拖延治疗",body:"控制欲在面对癌细胞时失效了。"}],insights:[{who:"完美主义让你既高产又痛苦的人",msg:"问题不是要不要追求完美，而是你是否允许「完美」的标准也适用于你对待人的方式。"},{who:"觉得自己「被抛弃过」的人",msg:"意识到伤口的存在不会让你失去动力，但会让你少伤害一些人。"}],darkTruth:"Jobs 的女儿 Lisa 在回忆录中写到：他会告诉她「你不会得到任何遗产」，会在她最需要父亲的时候消失。iPhone 改变了人类生活方式。但对于 Lisa 来说，她只是想要一个不否认她存在的父亲。"},

"Elon Musk":{name:"Elon Musk",years:"1971–",role:"企业家 · 工程师",tagline:"他想拯救人类，却不太懂怎么当一个人类",achievements:"创立或推动了 PayPal、SpaceX（第一家火箭回收的私营公司）、Tesla（让电动车变主流）、Neuralink、The Boring Company。SpaceX 的可回收火箭大幅降低太空发射成本。Tesla 直接迫使全球汽车工业转向电动化。",quote:"如果有什么东西足够重要，即使赔率对你不利，你也应该去做。",personality:{summary:"Musk 的核心是一种对人类灭绝的真实恐惧——不是修辞，是驱动他每一个决策的底层焦虑。这种「拯救世界」的紧迫感让他能以不可能的速度推动公司前进——也让他把每一个不同意他的人视为「在阻碍人类存活」。",keywords:["使命感驱动","极端工作狂","共情力有限","风险偏好极高","控制欲","争议制造者"]},timeline:[{age:"幼年-少年",type:"pain",title:"南非的霸凌与父亲的心理虐待",desc:"在学校被严重霸凌——被同学从楼梯上推下去打到住院。他的父亲 Errol Musk 被他描述为「一个可怕的人」。"},{age:"17岁",type:"turn",title:"离开南非",desc:"不是因为机会，是因为逃离。他选择美国因为「那是你能最大限度影响世界的地方」。"},{age:"20多岁",type:"grow",title:"Zip2 和 PayPal",desc:"在大多数人会退休享乐的时候，他把几乎所有钱投进了两家「不可能成功」的公司。"},{age:"30多岁",type:"pain",title:"SpaceX 前三次发射全部失败",desc:"他的钱快花完了。如果第四次失败，SpaceX 和 Tesla 会同时破产。第四次成功了——勉强。"},{age:"37岁",type:"pain",title:"2008年：同时面临破产、离婚、公司濒死",desc:"他把最后的钱分给了两家公司。他后来说他在浴室里哭着打了最后几个融资电话。"},{age:"40+岁",type:"grow",title:"SpaceX 和 Tesla 的突破",desc:"SpaceX 成功回收火箭。Tesla Model 3 成为全球最畅销的电动车。"},{age:"50+岁",type:"pain",title:"Twitter/X 收购与争议",desc:"他的公众形象从「科技愿景家」转变为高度争议的政治人物。这是一个正在实时展开的故事，我们无法给出定论。"}],thinking:[{label:"第一性原理",body:"不从类比出发，从最基本的物理定律出发。火箭为什么贵？不是因为材料贵——是因为你每次都扔掉它。那就回收它。"},{label:"极端时间压力",body:"他用不可能的 deadline 作为管理工具。有时他是对的，有时他是错的。代价是大量的人员消耗和信任损失。"},{label:"睡在工厂地板上",body:"在 Tesla 产能危机期间字面意义上睡在工厂。这种「我必须控制一切」的信念让他能在危机中做出极快的决策，也让他成为几乎不可能为之工作的老板。"}],contradictions:[{vs:"想拯救全人类 ↔ 无法维持稳定的人际关系",body:"他想让人类成为多行星物种，但他的前妻写道：他在他们儿子夭折后要求她「不要再哭了，这让他很难工作」。"},{vs:"改变世界的执行力 ↔ 在社交媒体上像青少年",body:"同一个推动可回收火箭的人，会在凌晨三点发推文嘲笑对手、传播阴谋论。"},{vs:"极端的风险承受力 ↔ 可能来自创伤的驱动力",body:"考虑到他的成长经历，这种极端的风险行为也可能部分来自「不计代价地证明自己价值」的深层需求。"}],insights:[{who:"有宏大目标但被人说「不现实」的人",msg:"他的经验不是「相信自己就能成功」——而是「计算一下你能不能承受失败的后果，然后决定要不要赌」。这是幸存者偏差——用同样策略失败的人不会出现在故事里。"},{who:"工作狂、停不下来的人",msg:"问问自己是使命在驱动你，还是恐惧——害怕停下来就不够好、不够重要、不够被需要。"}],darkTruth:"Musk 是一个正在进行中的故事。他的第一个儿子在婴儿时期因SIDS去世。他和跨性别女儿 Vivian 的关系完全破裂，Vivian 公开放弃了他的姓氏。他可以让火箭降落在海上的驳船上——但让自己的孩子感到被爱，他做不到。这是同一个人。"}
