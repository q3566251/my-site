<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--bg2:#11111e;--gold:#c9a84c;--gold2:#f0d080;--text:#e8e0d0;--dim:#706860;--border:#252535}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif SC',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--bg2);border-bottom:1px solid var(--border)}
.topbar a{color:var(--dim);text-decoration:none;font-size:.88rem}.topbar a:hover{color:var(--gold)}
.topbar h1{font-size:1.1rem;color:var(--gold);letter-spacing:.2em}
.ri{font-size:.78rem;color:var(--dim)}
#wait{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:24px;padding:40px}
.wbox{background:var(--bg2);border:2px solid var(--gold);border-radius:16px;padding:24px 40px;text-align:center}
.wbox .code{font-size:3rem;font-weight:900;letter-spacing:.4em;color:var(--gold)}
.wbox p{color:var(--dim);font-size:.85rem;margin-top:8px}
.spin{animation:spin 1.2s linear infinite;display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}
#game{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px;gap:16px}
.status{font-size:1rem;letter-spacing:.1em;text-align:center;min-height:28px}
canvas{border:2px solid var(--border);border-radius:8px;cursor:crosshair;touch-action:none}
#result{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);align-items:center;justify-content:center;z-index:50}
#result.show{display:flex}
.rb{background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:48px 52px;text-align:center}
.rb h2{font-size:2rem;color:var(--gold);margin-bottom:16px}.rb p{color:var(--dim);margin-bottom:28px}
.btn{padding:13px 36px;border:none;border-radius:10px;font-size:1rem;font-family:inherit;cursor:pointer;font-weight:700;transition:all .2s}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0e00}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.35)}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← 返回大厅</a><h1>五子棋</h1>
  <span class="ri" id="ri"></span>
</div>
<div id="wait">
  <div class="wbox"><div class="code" id="wcode">…</div><p>分享此码给朋友</p></div>
  <div style="color:var(--dim);font-size:.9rem"><span class="spin">⟳</span> 等待对方加入…</div>
</div>
<div id="game">
  <div class="status" id="status"></div>
  <canvas id="cv"></canvas>
</div>
<div id="result">
  <div class="rb"><h2 id="rt"></h2><p id="rs"></p>
    <button class="btn btn-g" onclick="location.href='index.html'">返回大厅</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6bEgCKXGrDA1c1lcsUT_JyK4cUXorTL0",
  authDomain: "chess-361a6.firebaseapp.com",
  databaseURL: "https://chess-361a6-default-rtdb.firebaseio.com",
  projectId: "chess-361a6",
  storageBucket: "chess-361a6.firebasestorage.app",
  messagingSenderId: "508387564049",
  appId: "1:508387564049:web:673daab5203d2bbb46afb0"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const P=new URLSearchParams(location.search);
const roomId=P.get('room')||'';
const seat=parseInt(P.get('seat')||0);
const myName=decodeURIComponent(P.get('name')||'玩家'+(seat+1));
document.getElementById('ri').textContent='房间：'+roomId;
document.getElementById('wcode').textContent=roomId;

const N=15;
const CELL=Math.min(34,Math.floor((Math.min(window.innerWidth,window.innerHeight)-80)/N));
const STONE=CELL*0.43;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
cv.width=cv.height=CELL*(N-1)+CELL;

const myColor=seat===0?'black':'white';
let gameOver=false,gameStarted=false;

const gameRef=ref(db,`rooms/${roomId}/gomoku`);
const playersRef=ref(db,`rooms/${roomId}/players`);

onValue(playersRef,snap=>{
  const count=Object.keys(snap.val()||{}).length;
  if(count>=2&&!gameStarted){
    gameStarted=true;
    document.getElementById('wait').style.display='none';
    document.getElementById('game').style.display='flex';
    if(seat===0) set(gameRef,{board:Array(N*N).fill(null),turn:0});
  }
});

onValue(gameRef,snap=>{
  if(!snap.exists()) return;
  const s=snap.val();
  if(!s.board) return;
  const board2d=to2d(s.board);
  drawBoard(board2d);
  const w=checkWin(board2d);
  if(w){
    gameOver=true;
    const winColor=board2d[w[0][0]][w[0][1]];
    if(winColor===myColor) showResult('🎉 你赢了！','五子连珠，胜利！');
    else showResult('💀 你输了','对方五子连珠');
    return;
  }
  if(s.turn===seat) setStatus(`${myColor==='black'?'●':'○'} 你的回合`);
  else setStatus(`等待对方落子…`);
});

function to2d(flat){
  const b=Array.from({length:N},()=>Array(N).fill(null));
  flat.forEach((v,i)=>{if(v) b[Math.floor(i/N)][i%N]=v;});
  return b;
}
function to1d(b2d){
  const flat=[];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) flat.push(b2d[r][c]||null);
  return flat;
}

function drawBoard(board){
  ctx.fillStyle='#1e1a14';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='#3a342a';ctx.lineWidth=1;
  for(let i=0;i<N;i++){
    ctx.beginPath();ctx.moveTo(CELL/2,CELL/2+i*CELL);ctx.lineTo(cv.width-CELL/2,CELL/2+i*CELL);ctx.stroke();
    ctx.beginPath();ctx.moveTo(CELL/2+i*CELL,CELL/2);ctx.lineTo(CELL/2+i*CELL,cv.height-CELL/2);ctx.stroke();
  }
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(board[r][c]) drawStone(r,c,board[r][c]);
}

function drawStone(r,c,color){
  const x=CELL/2+c*CELL,y=CELL/2+r*CELL;
  const g=ctx.createRadialGradient(x-STONE*.3,y-STONE*.3,STONE*.05,x,y,STONE);
  if(color==='black'){g.addColorStop(0,'#666');g.addColorStop(1,'#111');}
  else{g.addColorStop(0,'#fff');g.addColorStop(1,'#ccc');}
  ctx.beginPath();ctx.arc(x,y,STONE,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function rc(evt){
  const rect=cv.getBoundingClientRect();
  const ex=evt.clientX,ey=evt.clientY;
  return{r:Math.round((ey-rect.top-CELL/2)/CELL),c:Math.round((ex-rect.left-CELL/2)/CELL)};
}

cv.addEventListener('click',async e=>{
  if(gameOver) return;
  const snap=await new Promise(res=>onValue(gameRef,res,{onlyOnce:true}));
  const s=snap.val();
  if(!s||s.turn!==seat) return;
  const{r,c}=rc(e);
  if(r<0||r>=N||c<0||c>=N) return;
  const board=to2d(s.board);
  if(board[r][c]) return;
  board[r][c]=myColor;
  update(gameRef,{board:to1d(board),turn:1-seat});
});

function checkWin(b){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(b[r][c]){
    for(const[dr,dc]of dirs){
      let cnt=1,cells=[[r,c]];
      for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr<0||nr>=N||nc<0||nc>=N||b[nr][nc]!==b[r][c])break;cnt++;cells.push([nr,nc]);}
      if(cnt>=5) return cells;
    }
  }
  return null;
}

function setStatus(s){document.getElementById('status').textContent=s;}
function showResult(t,s){document.getElementById('rt').textContent=t;document.getElementById('rs').textContent=s;document.getElementById('result').classList.add('show');}
</script>
</body>
</html>
