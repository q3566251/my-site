<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏大厅</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f2f4f7;font-family:'Nunito',system-ui,sans-serif;min-height:100vh;color:#1a1a2e}
header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:36px 24px 28px;text-align:center;border-radius:0 0 28px 28px;box-shadow:0 8px 32px rgba(102,126,234,.3)}
header h1{font-size:2rem;font-weight:900}
header p{opacity:.85;font-size:.9rem;font-weight:600;margin-top:4px}

.container{max-width:700px;margin:0 auto;padding:20px 16px 80px}

/* Create button */
.create-btn{width:100%;padding:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:16px;font-size:1rem;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 4px 16px rgba(102,126,234,.35);transition:all .2s;margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:8px}
.create-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(102,126,234,.5)}
.create-btn:active{transform:scale(.98)}

/* Section label */
.sec-label{font-size:.78rem;font-weight:800;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;padding-left:4px}

/* Room list */
#room-list{display:flex;flex-direction:column;gap:10px}
.room-card{background:#fff;border-radius:18px;padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);transition:all .2s}
.room-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-1px)}
.room-ico{font-size:2.2rem;flex-shrink:0;width:52px;height:52px;background:#f2f4f7;border-radius:14px;display:flex;align-items:center;justify-content:center}
.room-info{flex:1;min-width:0}
.room-info h3{font-size:1rem;font-weight:800;color:#1a1a2e}
.room-info p{font-size:.78rem;color:#aaa;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:.65rem;font-weight:800;padding:3px 9px;border-radius:20px}
.tag.game{background:#ede9ff;color:#7c3aed}
.tag.diff-easy{background:#e8f8e8;color:#2d9e3f}
.tag.diff-mid{background:#fff8e0;color:#b38000}
.tag.diff-hard{background:#ffe8e8;color:#cc2222}
.tag.waiting{background:#e8f0ff;color:#3a56cc}
.join-btn{flex-shrink:0;padding:10px 18px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:.88rem;font-weight:800;font-family:inherit;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(102,126,234,.3)}
.join-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(102,126,234,.45)}
.my-room{border:2px solid #667eea}
.my-room .join-btn{background:linear-gradient(135deg,#43e97b,#38f9d7);box-shadow:0 3px 10px rgba(67,233,123,.3)}

.empty-state{text-align:center;padding:48px 24px;color:#bbb}
.empty-state .ico{font-size:3.5rem;margin-bottom:12px}
.empty-state p{font-weight:700;font-size:.95rem}
.empty-state small{font-size:.82rem;margin-top:6px;display:block}

/* Loading */
.loading{text-align:center;padding:32px;color:#ccc;font-weight:700}

/* Create modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center;z-index:100}
.overlay.show{display:flex}
.sheet{background:#fff;border-radius:28px 28px 0 0;padding:24px 22px 36px;width:100%;max-width:520px;animation:slideup .28s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:36px;height:4px;background:#e0e0e0;border-radius:4px;margin:0 auto 20px}
.sheet h2{font-size:1.3rem;font-weight:900;text-align:center;color:#1a1a2e;margin-bottom:20px}

/* Game picker */
.game-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:18px}
.gp{border:2px solid #f0f0f0;border-radius:14px;padding:10px 4px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa}
.gp:hover,.gp.on{border-color:#667eea;background:#f0f2ff}
.gp .gi{font-size:1.6rem}
.gp .gn{font-size:.62rem;font-weight:800;color:#555;margin-top:4px}

/* DDZ extras */
#ddz-extras{display:none}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mode{border:2px solid #f0f0f0;border-radius:13px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa}
.mode:hover,.mode.on{border-color:#667eea;background:#f0f2ff}
.mode .mi{font-size:1.3rem}.mode h4{font-size:.78rem;font-weight:800;color:#1a1a2e;margin-top:4px}
.diff-row{display:flex;gap:8px;margin-bottom:16px}
.db{flex:1;padding:9px;border:2px solid #f0f0f0;border-radius:11px;background:#fafafa;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:800;transition:all .2s}
.db.on.e{border-color:#6bcb77;background:#f0fff4;color:#2d9e3f}
.db.on.m{border-color:#ffd93d;background:#fffdf0;color:#b38000}
.db.on.h{border-color:#ff6b6b;background:#fff5f5;color:#cc2222}

.lbl{font-size:.75rem;font-weight:800;color:#aaa;letter-spacing:.05em;display:block;margin-bottom:7px}
input[type=text]{width:100%;background:#f2f4f7;border:2px solid transparent;border-radius:12px;padding:12px 14px;color:#1a1a2e;font-size:.95rem;font-family:inherit;outline:none;font-weight:700;transition:border-color .2s;margin-bottom:14px}
input[type=text]:focus{border-color:#667eea;background:#fff}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:1rem;font-family:inherit;cursor:pointer;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 4px 16px rgba(102,126,234,.35);transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(102,126,234,.5)}
.btn-cancel{background:#f2f4f7;color:#999;box-shadow:none;margin-top:8px}
.btn-cancel:hover{background:#e8eaed;transform:none;box-shadow:none}
</style>
</head>
<body>
<header>
  <h1>🎮 游戏大厅</h1>
  <p>点击加入，马上开战！</p>
</header>

<div class="container">
  <button class="create-btn" onclick="openCreate()">＋ 创建新房间</button>
  <div class="sec-label">等待中的房间</div>
  <div id="room-list"><div class="loading">加载中…</div></div>
</div>


<div class="overlay" id="ov" onclick="bgClose(event)">
<div class="sheet">
  <div class="handle"></div>
  <h2>创建房间</h2>

  <label class="lbl">选择游戏</label>
  <div class="game-grid">
    <div class="gp on" data-g="tictactoe" onclick="pickGame(this)"><div class="gi">❌</div><div class="gn">井字棋</div></div>
    <div class="gp" data-g="gomoku" onclick="pickGame(this)"><div class="gi">⚫</div><div class="gn">五子棋</div></div>
    <div class="gp" data-g="chess" onclick="pickGame(this)"><div class="gi">♟</div><div class="gn">象棋</div></div>
    <div class="gp" data-g="checkers" onclick="pickGame(this)"><div class="gi">🔴</div><div class="gn">跳棋</div></div>
    <div class="gp" data-g="doudizhu" onclick="pickGame(this)"><div class="gi">🃏</div><div class="gn">斗地主</div></div>
  </div>

  <div id="ddz-extras">
    <label class="lbl">游戏模式</label>
    <div class="mode-row">
      <div class="mode on" id="m2h" onclick="setMode('2h')"><div class="mi">👥🤖</div><h4>2人+机器人</h4></div>
      <div class="mode" id="m1h" onclick="setMode('1h')"><div class="mi">👤🤖🤖</div><h4>1人+2机器人</h4></div>
    </div>
    <label class="lbl">AI 难度</label>
    <div class="diff-row">
      <button class="db on e" onclick="setDiff('easy',this)">🟢 简单</button>
      <button class="db m" onclick="setDiff('mid',this)">🟡 中等</button>
      <button class="db h" onclick="setDiff('hard',this)">🔴 困难</button>
    </div>
  </div>

  <label class="lbl">你的昵称</label>
  <input type="text" id="cname" placeholder="玩家1" maxlength="12">
  <button class="btn" onclick="doCreate()">创建并等待对手 →</button>
  <button class="btn btn-cancel" onclick="closeCreate()">取消</button>
</div>
</div>


<!-- Join name sheet -->
<div class="overlay" id="join-sheet" onclick="if(event.target.id==='join-sheet')closeJoin()">
<div class="sheet">
  <div class="handle"></div>
  <h2>加入游戏</h2>
  <label class="lbl">你的昵称</label>
  <input type="text" id="jname-input" placeholder="玩家2" maxlength="12">
  <button class="btn" onclick="confirmJoin()">加入 →</button>
  <button class="btn btn-cancel" onclick="closeJoin()">取消</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, remove, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyA6bEgCKXGrDA1c1lcsUT_JyK4cUXorTL0",
  authDomain:"chess-361a6.firebaseapp.com",
  databaseURL:"https://chess-361a6-default-rtdb.firebaseio.com",
  projectId:"chess-361a6",
  storageBucket:"chess-361a6.firebasestorage.app",
  messagingSenderId:"508387564049",
  appId:"1:508387564049:web:673daab5203d2bbb46afb0"
});
const db = getDatabase(app);
const PAGES={tictactoe:'tictactoe.html',gomoku:'gomoku.html',chess:'chess.html',checkers:'checkers.html',doudizhu:'doudizhu.html'};
const NAMES={tictactoe:'井字棋',gomoku:'五子棋',chess:'国际象棋',checkers:'跳棋',doudizhu:'斗地主'};
const ICOS={tictactoe:'❌',gomoku:'⚫',chess:'♟',checkers:'🔴',doudizhu:'🃏'};

let CG='tictactoe', MODE='2h', DIFF='easy';
let myRoomId = sessionStorage.getItem('myRoom')||null;
let mySeat = parseInt(sessionStorage.getItem('mySeat')||'0');
let myName = sessionStorage.getItem('myName')||'玩家1';

// ── Room list ──
onValue(ref(db,'rooms'), snap=>{
  const el = document.getElementById('room-list');
  const rooms = snap.val()||{};
  const waiting = Object.entries(rooms)
    .filter(([id,r])=>r.state==='waiting')
    .sort((a,b)=>(a[1].created||0)-(b[1].created||0));

  if(!waiting.length){
    el.innerHTML=`<div class="empty-state"><div class="ico">🎯</div><p>暂时没有等待中的房间</p><small>创建一个，等朋友加入</small></div>`;
    return;
  }

  // Hide solo AI rooms (humanCount=1) from public list — they're private
  const joinable = waiting.filter(([id,r])=> r.humanCount !== 1 || id === myRoomId);

  if(!joinable.length){
    el.innerHTML=`<div class="empty-state"><div class="ico">🎯</div><p>暂时没有等待中的房间</p><small>创建一个，等朋友加入</small></div>`;
    return;
  }

  el.innerHTML = joinable.map(([id,r])=>{
    const isMe = id===myRoomId;
    const diffTag = r.diff?`<span class="tag diff-${r.diff}">${{easy:'🟢简单',mid:'🟡中等',hard:'🔴困难'}[r.diff]||''}</span>`:'';
    const modeTag = r.game==='doudizhu'?`<span class="tag waiting">2人+1AI</span>`:'';
    return `
    <div class="room-card ${isMe?'my-room':''}" id="rc-${id}">
      <div class="room-ico">${ICOS[r.game]||'🎮'}</div>
      <div class="room-info">
        <h3>${NAMES[r.game]||r.game}</h3>
        <p>${r.p0?.name||'玩家1'} 正在等待对手</p>
        <div class="room-tags">
          <span class="tag game">${NAMES[r.game]}</span>
          ${diffTag}${modeTag}
        </div>
      </div>
      <button class="join-btn" onclick="window.doJoin('${id}','${r.game}',${r.humanCount||2})">
        ${isMe?'进入游戏 →':'加入 →'}
      </button>
    </div>`;
  }).join('');
});

// ── Create ──
window.openCreate = ()=>document.getElementById('ov').classList.add('show');
window.closeCreate = ()=>document.getElementById('ov').classList.remove('show');
window.bgClose = e=>{if(e.target.id==='ov')window.closeCreate();};

window.pickGame = el=>{
  document.querySelectorAll('.gp').forEach(g=>g.classList.remove('on'));
  el.classList.add('on'); CG=el.dataset.g;
  document.getElementById('ddz-extras').style.display=CG==='doudizhu'?'block':'none';
};
window.setMode = m=>{MODE=m;
  document.getElementById('m2h').classList.toggle('on',m==='2h');
  document.getElementById('m1h').classList.toggle('on',m==='1h');};
window.setDiff = (d,el)=>{DIFF=d;
  document.querySelectorAll('.db').forEach(b=>{b.classList.remove('on');});
  el.classList.add('on');};

window.doCreate = async()=>{
  const name=document.getElementById('cname').value.trim()||'玩家1';
  const hc=CG==='doudizhu'&&MODE==='1h'?1:2;
  const id=Math.random().toString(36).slice(2,8).toUpperCase();
  myName=name; mySeat=0; myRoomId=id;
  sessionStorage.setItem('myRoom',id);
  sessionStorage.setItem('mySeat','0');
  sessionStorage.setItem('myName',name);
  // Solo AI room starts immediately (no second human needed)
  const initialState = hc===1 ? 'started' : 'waiting';
  await set(ref(db,`rooms/${id}`),{
    game:CG,humanCount:hc,diff:DIFF,state:initialState,
    p0:{name,seat:0},created:Date.now()
  });
  // Auto-delete old rooms (>2hrs)
  cleanup();
  window.closeCreate();
  location.href=`${PAGES[CG]}?room=${id}&seat=0&name=${encodeURIComponent(name)}`;
};

window.doJoin = async(id,game,hc)=>{
  // Rejoin own room
  if(id===myRoomId){
    location.href=`${PAGES[game]}?room=${id}&seat=${mySeat}&name=${encodeURIComponent(myName)}`;
    return;
  }
  // Check room still open
  const snap=await get(ref(db,`rooms/${id}`));
  if(!snap.exists()||snap.val().state!=='waiting'){alert('房间已被加入或不存在，请刷新');return;}

  showJoinSheet(id,game);
};

let _joinId='',_joinGame='';
function showJoinSheet(id,game){
  _joinId=id;_joinGame=game;
  document.getElementById('join-sheet').classList.add('show');
  setTimeout(()=>document.getElementById('jname-input').focus(),100);
}
window.closeJoin=()=>document.getElementById('join-sheet').classList.remove('show');
window.confirmJoin=async()=>{
  const name=document.getElementById('jname-input').value.trim()||'玩家2';
  document.getElementById('join-sheet').classList.remove('show');
  const snap=await get(ref(db,`rooms/${_joinId}`));
  if(!snap.exists()||snap.val().state!=='waiting'){alert('房间已被加入，请刷新');return;}
  myName=name;mySeat=1;myRoomId=_joinId;
  sessionStorage.setItem('myRoom',_joinId);
  sessionStorage.setItem('mySeat','1');
  sessionStorage.setItem('myName',name);
  // Mark room as started so no one else can join
  await update(ref(db,`rooms/${_joinId}`),{p1:{name,seat:1},state:'started'});
  location.href=`${PAGES[_joinGame]}?room=${_joinId}&seat=1&name=${encodeURIComponent(name)}`;
};

async function cleanup(){
  const snap=await get(ref(db,'rooms'));
  const rooms=snap.val()||{};
  const cutoff=Date.now()-20*60*1000;
  Object.entries(rooms).forEach(([id,r])=>{
    if(r.state==='waiting'&&r.created&&r.created<cutoff)
      remove(ref(db,`rooms/${id}`));
  });
}
cleanup();
window.addEventListener('beforeunload',()=>{
  if(myRoomId){
    get(ref(db,`rooms/${myRoomId}`)).then(snap=>{
      if(snap.exists()&&snap.val().state==='waiting')
        remove(ref(db,`rooms/${myRoomId}`));
    });
  }
});
</script>
</body>
</html>
