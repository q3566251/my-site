<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井字棋</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f2f4f7;font-family:'Nunito',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#fff;box-shadow:0 1px 0 #eee}
.topbar a{color:#667eea;text-decoration:none;font-size:.9rem;font-weight:700}
.topbar h1{font-size:1.1rem;font-weight:900;color:#1a1a2e}
.ri{font-size:.75rem;color:#aaa;font-weight:600}
#wait{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;padding:40px;text-align:center}
.wcard{background:#fff;border-radius:24px;padding:28px 36px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.wcard h3{font-size:1.1rem;font-weight:900;color:#1a1a2e;margin-bottom:6px}
.wcard p{font-size:.85rem;color:#aaa;font-weight:600}
.loader{display:flex;gap:6px;align-items:center}
.da{width:10px;height:10px;border-radius:50%;background:#667eea;animation:bo .8s infinite}
.da:nth-child(2){animation-delay:.15s}.da:nth-child(3){animation-delay:.3s}
@keyframes bo{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
#game{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:30px 20px;gap:24px}
.pill{background:#fff;border-radius:50px;padding:10px 24px;font-size:1rem;font-weight:800;box-shadow:0 2px 12px rgba(0,0,0,.08);color:#1a1a2e;text-align:center;min-width:200px}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.cell{width:clamp(88px,22vw,108px);height:clamp(88px,22vw,108px);background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:3rem;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 10px rgba(0,0,0,.07);user-select:none}
.cell:hover:not(.taken){transform:scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.cell.x{color:#ff6b6b}.cell.o{color:#4d96ff}
.cell.win-cell{box-shadow:0 0 0 3px #ffd93d,0 4px 16px rgba(255,217,61,.4)}
.cell.taken{cursor:default}
#result{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);align-items:center;justify-content:center;z-index:50}
#result.show{display:flex}
.rb{background:#fff;border-radius:28px;padding:36px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:300px;width:90vw}
.rb .emo{font-size:4rem;margin-bottom:10px}
.rb h2{font-size:1.7rem;font-weight:900;color:#1a1a2e;margin-bottom:6px}
.rb p{color:#aaa;margin-bottom:22px;font-weight:600}
.btn{padding:13px 28px;border:none;border-radius:14px;font-size:1rem;font-family:inherit;cursor:pointer;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 4px 14px rgba(102,126,234,.4);width:100%}
.vs{display:flex;gap:12px;align-items:center;font-weight:700;color:#aaa;font-size:.88rem}
.pchip{background:#fff;border-radius:50px;padding:8px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-weight:800;font-size:.88rem;color:#1a1a2e;display:flex;align-items:center;gap:6px}
.pchip.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← 大厅</a>
  <h1>井字棋 ❌</h1>
  <span class="ri" id="ri"></span>
</div>
<div id="wait">
  <div class="wcard"><h3>等待对手…</h3><p>对方从大厅加入后自动开始</p></div>
  <div class="loader"><div class="da"></div><div class="da"></div><div class="da"></div></div>
</div>
<div id="game">
  <div class="vs">
    <div class="pchip" id="p0chip">✕ 玩家1</div>
    <span>vs</span>
    <div class="pchip" id="p1chip">○ 玩家2</div>
  </div>
  <div class="pill" id="status">准备中…</div>
  <div class="board" id="board"></div>
</div>
<div id="result">
  <div class="rb">
    <div class="emo" id="re"></div>
    <h2 id="rt"></h2><p id="rs"></p>
    <button class="btn" onclick="location.href='index.html'">返回大厅</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const app=initializeApp({apiKey:"AIzaSyA6bEgCKXGrDA1c1lcsUT_JyK4cUXorTL0",authDomain:"chess-361a6.firebaseapp.com",databaseURL:"https://chess-361a6-default-rtdb.firebaseio.com",projectId:"chess-361a6",storageBucket:"chess-361a6.firebasestorage.app",messagingSenderId:"508387564049",appId:"1:508387564049:web:673daab5203d2bbb46afb0"});
const db=getDatabase(app);
const Q=new URLSearchParams(location.search);
const roomId=Q.get('room')||'',seat=+Q.get('seat'),myName=decodeURIComponent(Q.get('name')||'玩家'+(seat+1));
document.getElementById('ri').textContent=myName;

const MY='✕○'[seat],OP='✕○'[1-seat];
let board=Array(9).fill(''),turn=0,gameOver=false,started=false;

const roomRef=ref(db,`rooms/${roomId}`);
const gRef=ref(db,`rooms/${roomId}/ttt`);

onValue(roomRef,snap=>{
  const r=snap.val();if(!r)return;
  if(r.p0&&r.p1&&!started){
    started=true;
    document.getElementById('p0chip').textContent=`✕ ${r.p0.name}`;
    document.getElementById('p1chip').textContent=`○ ${r.p1.name}`;
    document.getElementById('wait').style.display='none';
    document.getElementById('game').style.display='flex';
    if(seat===0)set(gRef,{b:Array(9).fill(''),t:0});
  }
});

onValue(gRef,snap=>{
  if(!snap.exists()||!started||gameOver)return;
  const s=snap.val();
  board=[...s.b];turn=s.t;
  render();
  const w=checkWin();
  if(w){highlight(w);showR(board[w[0]]===MY?'🎉':'😅',board[w[0]]===MY?'你赢了！':'你输了',board[w[0]]===MY?'完美落子！':'下次加油');return;}
  if(board.every(v=>v)){showR('🤝','平局','势均力敌！');return;}
  updChips();
  setS(turn===seat?`${MY} 该你落子`:`等待对方落子…`);
});

function render(){
  const el=document.getElementById('board');el.innerHTML='';
  board.forEach((v,i)=>{
    const c=document.createElement('div');
    c.className='cell'+(v?` taken ${v==='✕'?'x':'o'}`:'');
    c.textContent=v;
    if(!v&&turn===seat&&!gameOver)c.onclick=()=>move(i);
    el.appendChild(c);
  });
}
function move(i){
  if(gameOver||board[i]||turn!==seat)return;
  const nb=[...board];nb[i]=MY;
  update(gRef,{b:nb,t:1-seat});
}
function checkWin(){
  const L=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(const l of L)if(board[l[0]]&&board[l[0]]===board[l[1]]&&board[l[0]]===board[l[2]])return l;
  return null;
}
function highlight(c){gameOver=true;const els=document.querySelectorAll('.cell');c.forEach(i=>els[i].classList.add('win-cell'));}
function setS(s){document.getElementById('status').textContent=s;}
function updChips(){
  document.getElementById('p0chip').classList.toggle('active',turn===0);
  document.getElementById('p1chip').classList.toggle('active',turn===1);
}
function showR(e,t,s){gameOver=true;document.getElementById('re').textContent=e;document.getElementById('rt').textContent=t;document.getElementById('rs').textContent=s;document.getElementById('result').classList.add('show');}
</script>
</body>
</html>
