<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跳棋</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f2f4f7;font-family:'Nunito',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#fff;box-shadow:0 1px 0 #eee}
.topbar a{color:#667eea;text-decoration:none;font-size:.9rem;font-weight:700}
.topbar h1{font-size:1.1rem;font-weight:900;color:#1a1a2e}
.ri{font-size:.75rem;color:#aaa;font-weight:600}
#wait{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;padding:40px;text-align:center}
.wcard{background:#fff;border-radius:24px;padding:28px 36px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.wcard h3{font-size:1.1rem;font-weight:900;color:#1a1a2e;margin-bottom:6px}
.wcard p{font-size:.85rem;color:#aaa;font-weight:600}
.loader{display:flex;gap:6px}
.da{width:10px;height:10px;border-radius:50%;background:#667eea;animation:bo .8s infinite}
.da:nth-child(2){animation-delay:.15s}.da:nth-child(3){animation-delay:.3s}
@keyframes bo{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
#game{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:14px;gap:10px}
.pill{background:#fff;border-radius:50px;padding:10px 24px;font-size:.95rem;font-weight:800;box-shadow:0 2px 12px rgba(0,0,0,.08);color:#1a1a2e;text-align:center}
.bwrap{border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.board{display:grid;grid-template-columns:repeat(8,1fr)}
.sq{display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;user-select:none}
.sq.light{background:#f0d9b5}.sq.dark{background:#8b6914}
.sq.sel{outline:3px solid #667eea;outline-offset:-3px;z-index:1}
.sq.vm::after{content:'';position:absolute;width:40%;height:40%;background:rgba(102,126,234,.5);border-radius:50%;pointer-events:none}
.pc{border-radius:50%;position:absolute;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.pc.red{background:radial-gradient(circle at 35% 35%,#ff9090,#e53935)}
.pc.blk{background:radial-gradient(circle at 35% 35%,#888,#222)}
.pc.king::after{content:'♛';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.75em;color:gold}
.hint{font-size:.72rem;color:#aaa;text-align:center;font-weight:600}
#result{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);align-items:center;justify-content:center;z-index:50}
#result.show{display:flex}
.rb{background:#fff;border-radius:28px;padding:36px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:300px;width:90vw}
.rb .emo{font-size:4rem;margin-bottom:10px}.rb h2{font-size:1.7rem;font-weight:900;color:#1a1a2e;margin-bottom:6px}
.rb p{color:#aaa;margin-bottom:22px;font-weight:600}
.btn{padding:13px 28px;border:none;border-radius:14px;font-size:1rem;font-family:inherit;cursor:pointer;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;width:100%}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← 大厅</a><h1>跳棋 🔴</h1>
  <span class="ri" id="ri"></span>
</div>
<div id="wait">
  <div class="wcard"><h3>等待对手…</h3><p>对方从大厅加入后自动开始</p></div>
  <div class="loader"><div class="da"></div><div class="da"></div><div class="da"></div></div>
</div>
<div id="game">
  <div class="pill" id="status">准备中…</div>
  <div class="bwrap"><div class="board" id="board"></div></div>
  <div class="hint" id="hint"></div>
</div>
<div id="result">
  <div class="rb"><div class="emo" id="re"></div><h2 id="rt"></h2><p id="rs"></p>
    <button class="btn" onclick="location.href='index.html'">返回大厅</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const app=initializeApp({apiKey:"AIzaSyBOXbDmr63jmpzkE9n2l219Gzm-7EEAGXc",authDomain:"chess-fbf5e.firebaseapp.com",databaseURL:"https://chess-fbf5e-default-rtdb.firebaseio.com",projectId:"chess-fbf5e",storageBucket:"chess-fbf5e.firebasestorage.app",messagingSenderId:"745745076663",appId:"1:745745076663:web:7ab63fd505ff109535d832"});
const db=getDatabase(app);
const Q=new URLSearchParams(location.search);
const roomId=Q.get('room')||'',seat=+Q.get('seat');
const myName=decodeURIComponent(Q.get('name')||'玩家'+(seat+1));
document.getElementById('ri').textContent=myName;

const myCol=seat===0?'red':'blk';
const SQ=Math.min(58,Math.floor((Math.min(window.innerWidth,window.innerHeight)-130)/8));

// Local state
let localB=null,localTurn=0,sel=null,vms=[],chain=null,gameOver=false,started=false;

const roomRef=ref(db,`rooms/${roomId}`);
const gRef=ref(db,`rooms/${roomId}/checkers`);

function initB(){
  const B=Array.from({length:8},()=>Array(8).fill(null));
  for(let r=0;r<3;r++)for(let c=0;c<8;c++)if((r+c)%2===1)B[r][c]={c:'blk',k:false};
  for(let r=5;r<8;r++)for(let c=0;c<8;c++)if((r+c)%2===1)B[r][c]={c:'red',k:false};
  return B;
}

onValue(roomRef,snap=>{
  const r=snap.val();if(!r)return;
  if(r.p0&&r.p1&&!started){
    started=true;
    document.getElementById('wait').style.display='none';
    document.getElementById('game').style.display='flex';
    document.getElementById('hint').textContent=`你执${myCol==='red'?'🔴红棋':'⚫黑棋'} · 吃光对方棋子获胜`;
    if(seat===0)set(gRef,{b:JSON.stringify(initB()),t:0});
  }
});

onValue(gRef,snap=>{
  if(!snap.exists()||!started||gameOver)return;
  const s=snap.val();if(!s.b)return;
  // Only update local state if it's NOT our chain-capture turn
  // (we're mid-chain, so ignore Firebase until we commit)
  if(!chain){localB=JSON.parse(s.b);localTurn=s.t;}
  render();
  if(!chain){
    checkWin(localB);
    if(!gameOver)setS(s.t===seat?`${myCol==='red'?'🔴':'⚫'} 你的回合`:'等待对方落子…');
  }
});

function getCaps(B,r,c){
  const p=B[r][c];if(!p)return[];
  const dirs=p.k?[[-1,-1],[-1,1],[1,-1],[1,1]]:(p.c==='red'?[[-1,-1],[-1,1]]:[[1,-1],[1,1]]);
  return dirs.reduce((a,[dr,dc])=>{
    const mr=r+dr,mc=c+dc,lr=r+2*dr,lc=c+2*dc;
    if(lr>=0&&lr<8&&lc>=0&&lc<8&&B[mr]?.[mc]?.c&&B[mr][mc].c!==p.c&&!B[lr][lc])a.push({r:lr,c:lc,cap:{r:mr,c:mc}});
    return a;
  },[]);
}
function getMvs(B,r,c){
  const caps=getCaps(B,r,c);if(caps.length)return caps;
  const p=B[r][c];if(!p)return[];
  const dirs=p.k?[[-1,-1],[-1,1],[1,-1],[1,1]]:(p.c==='red'?[[-1,-1],[-1,1]]:[[1,-1],[1,1]]);
  return dirs.reduce((a,[dr,dc])=>{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<8&&nc>=0&&nc<8&&!B[nr][nc])a.push({r:nr,c:nc});return a;},[]);
}
function hasAnyCap(B,col){for(let r=0;r<8;r++)for(let c=0;c<8;c++)if(B[r][c]?.c===col&&getCaps(B,r,c).length)return true;return false;}

function render(){
  const el=document.getElementById('board');
  el.style.gridTemplateColumns=`repeat(8,${SQ}px)`;el.innerHTML='';
  if(!localB)return;
  const rows=seat===1?[...Array(8).keys()].reverse():[...Array(8).keys()];
  const cols=seat===1?[...Array(8).keys()].reverse():[...Array(8).keys()];
  for(const r of rows)for(const c of cols){
    const sq=document.createElement('div');
    sq.className=`sq ${(r+c)%2===0?'light':'dark'}`;sq.style.width=sq.style.height=SQ+'px';
    const p=localB[r][c];
    if(p){const d=document.createElement('div');d.className=`pc ${p.c}${p.k?' king':''}`;d.style.width=d.style.height=(SQ*.76)+'px';sq.appendChild(d);}
    if(sel?.r===r&&sel?.c===c)sq.classList.add('sel');
    if(vms.find(m=>m.r===r&&m.c===c))sq.classList.add('vm');
    const canClick=!gameOver&&(localTurn===seat||chain);
    if(canClick)sq.addEventListener('click',()=>onClick(r,c));
    el.appendChild(sq);
  }
}

function onClick(r,c){
  if(gameOver||!localB)return;
  // Chain capture in progress
  if(chain){
    const vm=vms.find(m=>m.r===r&&m.c===c);
    if(vm)doMove(chain,vm);
    return;
  }
  if(localTurn!==seat)return;
  const vm=sel&&vms.find(m=>m.r===r&&m.c===c);
  if(vm){doMove(sel,vm);return;}
  const p=localB[r][c];
  if(p&&p.c===myCol){
    if(hasAnyCap(localB,myCol)&&!getCaps(localB,r,c).length){sel=null;vms=[];render();return;}
    sel={r,c};vms=getMvs(localB,r,c);
  }else{sel=null;vms=[];}
  render();
}

function doMove(from,mv){
  const B=JSON.parse(JSON.stringify(localB));
  const p=B[from.r][from.c];
  B[mv.r][mv.c]=p;B[from.r][from.c]=null;
  if(mv.cap)B[mv.cap.r][mv.cap.c]=null;
  if(p.c==='red'&&mv.r===0)p.k=true;
  if(p.c==='blk'&&mv.r===7)p.k=true;
  localB=B; // update local immediately for chain
  const nextCaps=mv.cap?getCaps(B,mv.r,mv.c):[];
  if(nextCaps.length){
    // Continue chain: don't commit turn change yet
    chain={r:mv.r,c:mv.c};sel=chain;vms=nextCaps;
    // Partial update (board only, same turn)
    update(gRef,{b:JSON.stringify(B)});
    render();return;
  }
  chain=null;sel=null;vms=[];
  update(gRef,{b:JSON.stringify(B),t:1-seat});
}

function checkWin(B){
  let red=0,blk=0;
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){if(B[r][c]?.c==='red')red++;if(B[r][c]?.c==='blk')blk++;}
  if(!red){gameOver=true;showR(myCol==='blk'?'🎉':'😅',myCol==='blk'?'你赢了！':'你输了','红方全军覆没');}
  if(!blk){gameOver=true;showR(myCol==='red'?'🎉':'😅',myCol==='red'?'你赢了！':'你输了','黑方全军覆没');}
}
function setS(s){document.getElementById('status').textContent=s;}
function showR(e,t,s){document.getElementById('re').textContent=e;document.getElementById('rt').textContent=t;document.getElementById('rs').textContent=s;document.getElementById('result').classList.add('show');}
</script>
</body>
</html>
