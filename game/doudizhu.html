<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>斗地主</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#1a6b3a;font-family:'Nunito',system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden;user-select:none}

.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(0,0,0,.25);flex-shrink:0;z-index:10}
.topbar a{color:rgba(255,255,255,.7);text-decoration:none;font-size:.82rem;font-weight:700}
.topbar h1{font-size:.95rem;font-weight:900;color:#fff}
.scoreboard{display:flex;gap:6px}
.sc-chip{background:rgba(0,0,0,.3);border-radius:16px;padding:4px 10px;font-size:.68rem;font-weight:800;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:4px}
.sc-chip .n{color:#ffd93d;font-size:.85rem;font-weight:900}

#wait{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;text-align:center;padding:40px}
.wcard{background:#fff;border-radius:24px;padding:24px 32px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.wcard h3{font-size:1.1rem;font-weight:900;color:#1a1a2e;margin-bottom:6px}
.wcard p{font-size:.85rem;color:#aaa;font-weight:600}
.loader{display:flex;gap:6px}
.da{width:10px;height:10px;border-radius:50%;background:#ffd93d;animation:bo .8s infinite}
.da:nth-child(2){animation-delay:.15s}.da:nth-child(3){animation-delay:.3s}
@keyframes bo{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

#table{display:none;width:100%;flex:1;position:relative;overflow:hidden}

.pa{position:absolute;display:flex;flex-direction:column;align-items:center;gap:5px;z-index:5}
#pt{top:8px;left:50%;transform:translateX(-50%)}
#pl{left:6px;top:42%;transform:translateY(-50%)}
#pm{bottom:0;left:0;right:0;align-items:center;padding:4px 0 6px}

.ptag{background:rgba(0,0,0,.45);backdrop-filter:blur(6px);border:2px solid rgba(255,255,255,.2);border-radius:22px;padding:5px 14px;font-size:.75rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .25s}
.ptag.ll{border-color:#ffd93d;background:rgba(160,110,0,.6);color:#ffd93d}
.ptag.act{box-shadow:0 0 0 3px rgba(255,217,61,.9);transform:scale(1.06)}
.ll-b{background:#ffd93d;color:#1a0e00;font-size:.58rem;font-weight:900;padding:1px 6px;border-radius:8px}
.diff-b{font-size:.58rem;background:rgba(255,255,255,.2);padding:1px 5px;border-radius:8px}
.think{font-size:.6rem;color:rgba(255,255,255,.55);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}

.backs{display:flex}
.cb{width:20px;height:30px;background:linear-gradient(135deg,#1a70d8,#0d4aaa);border:1.5px solid #4a9aee;border-radius:4px;margin-right:-7px;box-shadow:0 2px 5px rgba(0,0,0,.3)}

.played-area{min-height:50px;display:flex;align-items:center;justify-content:center;gap:2px}

#ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:3}
.blabel{font-size:.6rem;color:rgba(255,255,255,.5);font-weight:700;margin-bottom:4px;letter-spacing:.1em;text-transform:uppercase}
.bcards{display:flex;gap:3px;justify-content:center}

/* Big, readable cards for played/bottom/backs */
.mc{width:32px;height:48px;background:#fff;border:1.5px solid #ddd;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;margin-right:-5px;box-shadow:0 2px 5px rgba(0,0,0,.18);flex-shrink:0}
.mc:last-child{margin-right:0}
.mc.rc{color:#e53935}.mc.bc{color:#111}
.mc.jk{background:linear-gradient(160deg,#fff8d0,#ffe04a);color:#c47a00}
.mc.jkb{background:linear-gradient(160deg,#ffd0e8,#ff6aaa);color:#c0006a}

#bidp{position:absolute;bottom:128px;left:50%;transform:translateX(-50%);display:none;
  background:rgba(255,255,255,.97);backdrop-filter:blur(18px);border-radius:22px;
  padding:16px 22px;box-shadow:0 12px 40px rgba(0,0,0,.3);z-index:20;min-width:290px;text-align:center}
#bidp h4{font-size:.9rem;font-weight:900;color:#1a1a2e;margin-bottom:2px}
#bidp .sub{font-size:.75rem;color:#999;font-weight:600;margin-bottom:12px}
.brow{display:flex;gap:8px;justify-content:center}
.bb{padding:10px 16px;border:2px solid #eee;border-radius:12px;background:#fff;font-family:inherit;font-size:.85rem;font-weight:800;cursor:pointer;transition:all .2s;color:#555;min-width:58px}
.bb:hover{border-color:#667eea;color:#667eea;transform:translateY(-1px)}
.bb.go{background:linear-gradient(135deg,#ff9f43,#ee5a24);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(238,90,36,.4)}
.bb.go:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(238,90,36,.55)}

#playp{display:none;position:absolute;bottom:114px;left:0;right:0;z-index:20;flex-direction:row;gap:10px;align-items:center;justify-content:center}
.pb{padding:12px 30px;border:none;border-radius:14px;font-family:inherit;font-size:.9rem;cursor:pointer;font-weight:800;transition:all .2s}
.pb.play{background:linear-gradient(135deg,#ffd93d,#ff9f43);color:#1a0e00;box-shadow:0 4px 16px rgba(255,159,67,.5)}
.pb.play:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,159,67,.65)}
.pb.play:active{transform:scale(.97)}
.pb.pass{background:rgba(0,0,0,.3);color:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.2)}
.pb.pass:disabled{opacity:.35;cursor:not-allowed}

/* ── MY HAND: large, comfortable cards ── */
#mycards{display:flex;justify-content:center;align-items:flex-end;min-height:108px;padding:0 8px;overflow-x:auto;touch-action:manipulation}
.card{width:56px;height:84px;background:#fff;border:2px solid #e8e8e8;border-radius:10px;
  display:flex;flex-direction:column;justify-content:space-between;padding:4px 5px;
  cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1);
  margin-right:-18px;flex-shrink:0;position:relative;
  box-shadow:0 4px 10px rgba(0,0,0,.22)}
.card:last-child{margin-right:0}
.card.on{transform:translateY(-20px);border-color:#ffd93d;box-shadow:0 6px 16px rgba(255,217,61,.5)}
.card .top{font-size:.75rem;font-weight:900;line-height:1.1}
.card .bot{font-size:.75rem;font-weight:900;transform:rotate(180deg);align-self:flex-end;line-height:1.1}
.card .suit{font-size:1.3rem;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.card.rc .top,.card.rc .bot,.card.rc .suit{color:#e53935}
.card.bc .top,.card.bc .bot,.card.bc .suit{color:#1a1a1a}
.card.jk{background:linear-gradient(160deg,#fff9e0,#ffe566);border-color:#ffd93d}
.card.jk .top,.card.jk .suit{color:#c47a00;font-size:.65rem}
.card.jkb{background:linear-gradient(160deg,#fff0f6,#ffb3d4);border-color:#ff6aaa}
.card.jkb .top,.card.jkb .suit{color:#c0006a;font-size:.65rem}

#msgs{position:absolute;top:52px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;z-index:15;pointer-events:none}
.mb{background:rgba(0,0,0,.65);backdrop-filter:blur(8px);border-radius:20px;padding:5px 16px;font-size:.78rem;font-weight:700;color:#fff;animation:fu 2.5s forwards;white-space:nowrap}
@keyframes fu{0%{opacity:0;transform:translateY(8px)}15%{opacity:1;transform:none}80%{opacity:1}100%{opacity:0}}

#tbar{position:absolute;top:52px;right:10px;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);border-radius:12px;padding:6px 12px;font-size:.72rem;font-weight:800;color:#fff;display:none;border:1px solid rgba(255,255,255,.12)}

#hint-toast{position:absolute;bottom:200px;left:50%;transform:translateX(-50%);
  background:rgba(220,50,50,.92);color:#fff;font-weight:800;font-size:.85rem;
  padding:10px 22px;border-radius:14px;display:none;z-index:30;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.3)}

#result{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(14px);align-items:center;justify-content:center;z-index:100}
#result.show{display:flex}
.rb{background:#fff;border-radius:28px;padding:28px 32px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.3);max-width:380px;width:92vw;max-height:90vh;overflow-y:auto}
.rb .emo{font-size:3.5rem;margin-bottom:8px}
.rb h2{font-size:1.6rem;font-weight:900;color:#1a1a2e;margin-bottom:5px}
.rb .sub{color:#888;font-weight:600;margin-bottom:14px;font-size:.88rem}
.score-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.sc-card{background:#f8f9ff;border-radius:12px;padding:8px 14px;font-size:.8rem;font-weight:800;color:#1a1a2e;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:70px}
.sc-card .pts{font-size:1.2rem;color:#667eea;font-weight:900}
.hands{display:flex;flex-direction:column;gap:7px;margin:10px 0 16px;text-align:left}
.hg{background:#f8f9ff;border-radius:12px;padding:10px 14px}
.hg h5{font-size:.74rem;font-weight:800;color:#667eea;margin-bottom:5px}
.hg .cl{font-size:.72rem;color:#555;line-height:1.9;font-weight:600}
.rb-btns{display:flex;gap:8px}
.btn{flex:1;padding:13px;border:none;border-radius:13px;font-size:.95rem;font-family:inherit;cursor:pointer;font-weight:800;transition:all .2s}
.btn-p{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 4px 14px rgba(102,126,234,.4)}
.btn-p:hover{transform:translateY(-1px)}
.btn-s{background:#f2f4f7;color:#666}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html">← 大厅</a>
  <h1>斗地主 🃏</h1>
  <div class="scoreboard" id="scoreboard"></div>
</div>

<div id="wait">
  <div class="wcard"><h3>等待玩家…</h3><p>对方从大厅加入后自动开始</p></div>
  <div class="loader"><div class="da"></div><div class="da"></div><div class="da"></div></div>
</div>

<div id="table">
  <div id="tbar"></div>
  <div id="msgs"></div>
  <div id="hint-toast"></div>
  <div class="pa" id="pt">
    <div class="ptag" id="tagt"></div>
    <div class="backs" id="bt"></div>
    <div class="played-area" id="ppt"></div>
  </div>
  <div class="pa" id="pl">
    <div class="ptag" id="tagl"></div>
    <div class="backs" id="bl"></div>
    <div class="played-area" id="ppl"></div>
  </div>
  <div id="ctr">
    <div class="blabel">底 牌</div>
    <div class="bcards" id="botc"></div>
  </div>
  <div class="pa" id="pm">
    <div class="played-area" id="ppm"></div>
    <div class="ptag" id="tagm"></div>
    <div id="mycards"></div>
  </div>
  <div id="bidp">
    <h4>是否叫地主？</h4>
    <div class="sub" id="binfo">当前最高：不叫</div>
    <div class="brow">
      <button class="bb" onclick="doBid(0)">不叫</button>
      <button class="bb" onclick="doBid(1)">1分</button>
      <button class="bb" onclick="doBid(2)">2分</button>
      <button class="bb go" onclick="doBid(3)">抢地主！</button>
    </div>
  </div>
  <div id="playp">
    <button class="pb pass" id="passbtn" onclick="doPass()">不出</button>
    <button class="pb play" onclick="doPlay()">出 牌 ▶</button>
  </div>
</div>

<div id="result">
  <div class="rb">
    <div class="emo" id="re"></div>
    <h2 id="rt"></h2>
    <p class="sub" id="rs"></p>
    <div class="score-row" id="score-row"></div>
    <div class="hands" id="rhands"></div>
    <div class="rb-btns">
      <button class="btn btn-s" onclick="location.href='index.html'">返回大厅</button>
      <button class="btn btn-p" onclick="playAgain()">再来一局 ↺</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const app=initializeApp({apiKey:"AIzaSyA6bEgCKXGrDA1c1lcsUT_JyK4cUXorTL0",authDomain:"chess-361a6.firebaseapp.com",databaseURL:"https://chess-361a6-default-rtdb.firebaseio.com",projectId:"chess-361a6",storageBucket:"chess-361a6.firebasestorage.app",messagingSenderId:"508387564049",appId:"1:508387564049:web:673daab5203d2bbb46afb0"});
const db=getDatabase(app);
const Q=new URLSearchParams(location.search);
const roomId=Q.get('room')||'',seat=+Q.get('seat');
const myName=decodeURIComponent(Q.get('name')||'玩家'+(seat+1));

const SUITS={S:'♠',H:'♥',D:'♦',C:'♣'};
const VL={3:'3',4:'4',5:'5',6:'6',7:'7',8:'8',9:'9',10:'10',11:'J',12:'Q',13:'K',14:'A',15:'2',16:'小',17:'大'};

function mkDeck(){const d=[];for(const s of['S','H','D','C'])for(let v=3;v<=15;v++)d.push({s,v});d.push({s:'J1',v:16},{s:'J2',v:17});return d;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function cLabel(c){return c.s==='J1'?'小王':c.s==='J2'?'大王':VL[c.v]+(SUITS[c.s]||'');}
function cNum(c){return c.s==='J1'?'小王':c.s==='J2'?'大王':VL[c.v];}
function cSuit(c){return c.s==='J1'?'🃏':c.s==='J2'?'🎴':SUITS[c.s];}
function cCls(c){if(c.s==='J1')return'jk';if(c.s==='J2')return'jkb';return(c.s==='H'||c.s==='D')?'rc':'bc';}

// ── Card type detection (4+2single, 4+2pair included) ──
function getCT(cards){
  if(!cards?.length)return null;
  const n=cards.length,vs=cards.map(c=>c.v).sort((a,b)=>a-b);
  const cnt={};vs.forEach(v=>cnt[v]=(cnt[v]||0)+1);
  const uv=Object.keys(cnt).map(Number).sort((a,b)=>a-b);
  const cts=[...Object.values(cnt)].sort((a,b)=>b-a);
  if(n===1)return{t:'1',v:vs[0]};
  if(n===2&&vs[0]===16&&vs[1]===17)return{t:'rkt',v:17};
  if(n===2&&cts[0]===2)return{t:'2',v:uv[0]};
  if(n===3&&cts[0]===3)return{t:'3',v:uv[0]};
  if(n===4&&cts[0]===4)return{t:'bomb',v:uv[0]};
  // 4+2 singles
  if(n===6&&cts[0]===4){const bv=uv.find(v=>cnt[v]===4);if(bv!==undefined)return{t:'42s',v:bv};}
  // 4+2 pairs
  if(n===8&&cts[0]===4&&cts[1]===2&&cts[2]===2){const bv=uv.find(v=>cnt[v]===4);if(bv!==undefined)return{t:'42p',v:bv};}
  if(n===4&&cts[0]===3)return{t:'31',v:uv.find(v=>cnt[v]===3)};
  if(n===5&&cts[0]===3&&cts[1]===2)return{t:'32',v:uv.find(v=>cnt[v]===3)};
  if(n>=5&&cts[0]===1&&vs[vs.length-1]<=14){let ok=true;for(let i=1;i<vs.length;i++)if(vs[i]!==vs[i-1]+1){ok=false;break;}if(ok)return{t:'seq',v:vs[vs.length-1],n};}
  if(n>=6&&n%2===0&&cts.every(c=>c===2)&&uv[uv.length-1]<=14){let ok=true;for(let i=1;i<uv.length;i++)if(uv[i]!==uv[i-1]+1){ok=false;break;}if(ok&&uv.length>=3)return{t:'2seq',v:uv[uv.length-1],n:uv.length};}
  const tv=uv.filter(v=>cnt[v]===3);
  if(tv.length>=2&&tv[tv.length-1]<=14){let ok=true;for(let i=1;i<tv.length;i++)if(tv[i]!==tv[i-1]+1){ok=false;break;}
    if(ok){const ex=n-tv.length*3;
      if(ex===0)return{t:'plane',v:tv[tv.length-1],n:tv.length};
      if(ex===tv.length)return{t:'plane1',v:tv[tv.length-1],n:tv.length};
      if(ex===tv.length*2){const exv=vs.filter(v=>cnt[v]!==3);const ec={};exv.forEach(v=>ec[v]=(ec[v]||0)+1);if(Object.values(ec).every(c=>c===2))return{t:'plane2',v:tv[tv.length-1],n:tv.length};}
    }
  }
  return null;
}

function canBeat(p,l){
  if(!l)return true;if(p.t==='rkt')return true;if(l.t==='rkt')return false;
  if(p.t==='bomb'&&l.t!=='bomb')return true;if(l.t==='bomb'&&p.t!=='bomb')return false;
  if(p.t!==l.t)return false;
  if(['seq','2seq','plane','plane1','plane2'].includes(p.t)&&p.n!==l.n)return false;
  return p.v>l.v;
}

// ── AI (3 levels + teammate logic) ──
function botBid(hand,maxBid,diff){
  const cnt={};hand.forEach(c=>cnt[c.v]=(cnt[c.v]||0)+1);
  const sc=Object.values(cnt).filter(c=>c>=4).length*3+(cnt[15]||0)*1.5+(hand.some(c=>c.v===17)?2:0)+(cnt[14]||0)*.5;
  if(diff==='easy')return maxBid<1&&sc>=3?1:0;
  if(diff==='mid'){if(sc>=6&&maxBid<3)return 3;if(sc>=3&&maxBid<2)return 2;if(sc>=1.5&&maxBid<1)return 1;return 0;}
  if(sc>=5&&maxBid<3)return 3;if(sc>=2.5&&maxBid<2)return 2;if(maxBid<1)return 1;return 0;
}

function botPlay(hand,last,botSeat,ll,diff){
  const isLL=+botSeat===+ll;
  const cnt=buildCnt(hand);
  // Teammate logic: if teammate (not landlord) last played, let it ride if strong
  if(last&&!isLL){
    const lastSeat=last._seat!==undefined?+last._seat:-1;
    const lastIsTeammate=lastSeat!==-1&&lastSeat!==+ll&&lastSeat!==+botSeat;
    if(lastIsTeammate&&diff!=='easy'){
      if(last.v>=9)return null; // teammate played strong, pass
      // else try to top with minimal
    }
  }
  if(!last)return botLead(hand,cnt,isLL,diff);
  return botFollow(hand,cnt,last,isLL,diff);
}

function buildCnt(hand){const cnt={};hand.forEach(c=>cnt[c.v]=(cnt[c.v]||[]).concat(c));return cnt;}

function botLead(hand,cnt,isLL,diff){
  const sorted=hand.slice().sort((a,b)=>a.v-b.v);
  if(diff==='easy')return[sorted[0]];
  if(diff==='hard'&&isLL){
    const trips=Object.values(cnt).filter(g=>g.length>=3&&g[0].v<=13).sort((a,b)=>a[0].v-b[0].v);
    if(trips.length)return trips[0].slice(0,3);
  }
  // lead pairs if available and not too high
  const pairs=Object.values(cnt).filter(g=>g.length>=2&&g[0].v<=11).sort((a,b)=>a[0].v-b[0].v);
  if(pairs.length&&diff!=='easy')return pairs[0].slice(0,2);
  // lead lowest single
  const low=sorted.filter(c=>c.v<=11);
  return[low.length?low[0]:sorted[0]];
}

function botFollow(hand,cnt,last,isLL,diff){
  if(diff==='easy'&&Math.random()<.55)return null;
  if(last.t==='1'){const b=hand.filter(c=>c.v>last.v).sort((a,b)=>a.v-b.v);if(b.length)return[b[0]];}
  if(last.t==='2'){const p=Object.values(cnt).filter(g=>g.length>=2&&g[0].v>last.v).sort((a,b)=>a[0].v-b[0].v);if(p.length)return p[0].slice(0,2);}
  if(last.t==='3'){const p=Object.values(cnt).filter(g=>g.length>=3&&g[0].v>last.v).sort((a,b)=>a[0].v-b[0].v);if(p.length)return p[0].slice(0,3);}
  if(last.t==='31'){const p=Object.values(cnt).filter(g=>g.length>=3&&g[0].v>last.v).sort((a,b)=>a[0].v-b[0].v);
    if(p.length){const trip=p[0].slice(0,3);const ext=hand.filter(c=>c.v!==trip[0].v).sort((a,b)=>a.v-b.v);if(ext.length)return[...trip,ext[0]];}}
  if(last.t==='32'){const p=Object.values(cnt).filter(g=>g.length>=3&&g[0].v>last.v).sort((a,b)=>a[0].v-b[0].v);
    if(p.length){const trip=p[0].slice(0,3);const pairs=Object.values(cnt).filter(g=>g.length>=2&&g[0].v!==trip[0].v).sort((a,b)=>a[0].v-b[0].v);if(pairs.length)return[...trip,...pairs[0].slice(0,2)];}}
  // Bomb
  const bombs=Object.values(cnt).filter(g=>g.length>=4&&(last.t!=='bomb'||g[0].v>last.v)).sort((a,b)=>a[0].v-b[0].v);
  if(bombs.length&&(diff==='hard'||(diff==='mid'&&isLL)))return bombs[0].slice(0,4);
  // Rocket
  const j=hand.filter(c=>c.v>=16);if(j.length===2&&last.t!=='rkt'&&diff==='hard'&&isLL)return j;
  return null;
}

// ── State ──
let myHand=[],players={},landlord=-1,diff='easy',started=false,gameOverShown=false;
let lastState=null;
const scores={};
let roundMult=1;

const roomRef=ref(db,`rooms/${roomId}`);
const gRef=ref(db,`rooms/${roomId}/ddz`);

// ── UI ──
function mkMini(cards,el){
  el.innerHTML='';if(!cards?.length)return;
  const row=document.createElement('div');row.style.cssText='display:flex;align-items:flex-end';
  cards.forEach(c=>{const d=document.createElement('div');d.className=`mc ${cCls(c)}`;d.textContent=cNum(c);row.appendChild(d);});
  el.appendChild(row);
}
function mkBacks(n,el){el.innerHTML='';const m=Math.min(n,14);for(let i=0;i<m;i++){const d=document.createElement('div');d.className='cb';el.appendChild(d);}}

function renderHand(){
  const el=document.getElementById('mycards');el.innerHTML='';
  [...myHand].sort((a,b)=>a.v-b.v).forEach(c=>{
    const d=document.createElement('div');
    d.className=`card ${cCls(c)}${c._s?' on':''}`;
    const isJ=c.s==='J1'||c.s==='J2';
    if(isJ){
      d.innerHTML=`<div class="top">${c.v===16?'小王':'大王'}</div><div class="suit">${cSuit(c)}</div>`;
    }else{
      const su=SUITS[c.s],nu=VL[c.v];
      d.innerHTML=`<div class="top">${nu}<br>${su}</div><div class="suit">${su}</div><div class="bot">${nu}<br>${su}</div>`;
    }
    // Click select
    d.addEventListener('click',()=>{c._s=!c._s;renderHand();});
    // Long press select (mobile)
    let pt;
    d.addEventListener('touchstart',e=>{e.preventDefault();pt=setTimeout(()=>{c._s=!c._s;renderHand();},280);},{passive:false});
    d.addEventListener('touchend',()=>clearTimeout(pt));
    d.addEventListener('touchmove',()=>clearTimeout(pt));
    el.appendChild(d);
  });
}

function addMsg(t){const a=document.getElementById('msgs');const b=document.createElement('div');b.className='mb';b.textContent=t;a.appendChild(b);setTimeout(()=>b.remove(),2400);}
function showHint(t){const el=document.getElementById('hint-toast');el.textContent=t;el.style.display='block';setTimeout(()=>{el.style.display='none';},1500);}

function sp(s){return['me','left','top'][((+s-seat)+3)%3];}
function tagEl(s){return document.getElementById({me:'tagm',left:'tagl',top:'tagt'}[sp(+s)]);}
function backsEl(s){return document.getElementById({me:null,left:'bl',top:'bt'}[sp(+s)]);}
function playEl(s){return document.getElementById({me:'ppm',left:'ppl',top:'ppt'}[sp(+s)]);}

function updTags(act=-1){
  [0,1,2].forEach(s=>{
    const p=players[s];if(!p)return;
    const el=tagEl(s);if(!el)return;
    const isLL=+s===+landlord,isAct=+s===+act;
    el.className='ptag'+(isLL?' ll':'')+(isAct?' act':'');
    const thinker=isAct&&p.bot?'<span class="think"> 思考中…</span>':'';
    el.innerHTML=`<span>${p.name}${p.bot?'🤖':''}</span>${isLL?'<span class="ll-b">地主</span>':''}${p.bot?`<span class="diff-b">${{easy:'简',mid:'中',hard:'难'}[diff]}</span>`:''}${thinker}`;
  });
}

function updScoreboard(){
  const sb=document.getElementById('scoreboard');sb.innerHTML='';
  [0,1,2].forEach(s=>{
    if(!players[s])return;
    const d=document.createElement('div');d.className='sc-chip';
    d.innerHTML=`${players[s].name.slice(0,3)} <span class="n">${scores[s]||0}</span>`;
    sb.appendChild(d);
  });
}

// ── Room watcher ──
onValue(roomRef,snap=>{
  const r=snap.val();if(!r)return;
  diff=r.diff||'easy';
  const hc=r.humanCount||2;
  if(r.p0)players[0]={...r.p0,bot:false};
  if(r.p1)players[1]={...r.p1,bot:false};
  if(Object.keys(players).length>=hc&&!started){
    started=true;
    document.getElementById('wait').style.display='none';
    document.getElementById('table').style.display='block';
    if(seat===0)initGame(hc);
  }
});

function initGame(hc){
  gameOverShown=false;roundMult=1;
  for(let i=hc;i<3;i++)players[i]={name:`AI${i+1}`,bot:true,seat:i};
  const deck=shuffle(mkDeck());
  const h=[deck.slice(0,17),deck.slice(17,34),deck.slice(34,51)];
  const bot=deck.slice(51);
  set(gRef,{h:JSON.stringify(h),bot:JSON.stringify(bot),
    phase:'bid',bi:0,mb:0,ms:-1,
    t:-1,ll:-1,lp:null,ls:-1,pc:0,
    played:JSON.stringify([[],[],[]])});
}

// ── Main game watcher ──
onValue(gRef,snap=>{
  if(!snap.exists()||!started||gameOverShown)return;
  const s=snap.val();if(!s.h)return;
  lastState=s;
  const hands=JSON.parse(s.h),bottom=JSON.parse(s.bot),played=JSON.parse(s.played||'[[],[],[]]');
  landlord=s.ll;

  // Sync my hand (preserve selections)
  const newH=hands[seat];
  if(JSON.stringify(newH)!==JSON.stringify(myHand.map(({_s,...c})=>c))){
    myHand=newH.map(c=>({...c,_s:false}));
    renderHand();
  }

  // Opponent backs
  for(let i=0;i<3;i++)if(i!==seat){const be=backsEl(i);if(be)mkBacks(hands[i].length,be);}
  // Played areas
  for(let i=0;i<3;i++)mkMini(played[i],playEl(i));

  // Bottom cards (show after landlord set)
  if(s.ll>=0){
    const bc=document.getElementById('botc');bc.innerHTML='';
    bottom.forEach(c=>{const d=document.createElement('div');d.className=`mc ${cCls(c)}`;d.textContent=cNum(c);bc.appendChild(d);});
  }

  updTags(s.phase==='bid'?s.bi:s.t);
  updScoreboard();

  // ── BID ──
  if(s.phase==='bid'){
    document.getElementById('bidp').style.display=+s.bi===seat?'block':'none';
    document.getElementById('playp').style.display='none';
    document.getElementById('binfo').textContent=`当前最高：${s.mb===0?'不叫':s.mb+'分'}`;
    document.getElementById('tbar').style.display='block';
    document.getElementById('tbar').textContent=+s.bi===seat?'💡 叫地主':`等待 ${players[s.bi]?.name||'?'} 叫地主…`;
    if(players[+s.bi]?.bot&&seat===0){
      const bi=+s.bi;
      setTimeout(async()=>{
        const gs=await get(gRef);const gv=gs.val();
        if(!gv||gv.phase!=='bid'||+gv.bi!==bi)return;
        processBid(bi,botBid(JSON.parse(gv.h)[bi],gv.mb,diff),gv,JSON.parse(gv.h),JSON.parse(gv.bot));
      },900+~~(Math.random()*500));
    }
  }

  // ── PLAY ──
  if(s.phase==='play'){
    document.getElementById('bidp').style.display='none';
    const isMe=+s.t===seat;
    document.getElementById('playp').style.display=isMe?'flex':'none';
    if(isMe){document.getElementById('passbtn').disabled=!s.lp||+s.ls===seat;}
    document.getElementById('tbar').style.display='block';
    document.getElementById('tbar').textContent=isMe?'💡 你的回合':`等待 ${players[+s.t]?.name||'?'}…`;
    if(players[+s.t]?.bot&&seat===0){
      const bt=+s.t;
      setTimeout(async()=>{
        const gs=await get(gRef);const gv=gs.val();
        if(!gv||gv.phase!=='play'||+gv.t!==bt)return;
        const bh=JSON.parse(gv.h);
        const canP=gv.lp&&+gv.ls!==bt;
        const lastPlus=gv.lp?{...gv.lp,_seat:+gv.ls}:null;
        const cards=botPlay(bh[bt],lastPlus,bt,gv.ll,diff);
        if(cards&&cards.length)processPlay(bt,cards,gv,bh);
        else if(canP)processPass(bt,gv,bh);
        else processPlay(bt,[bh[bt].sort((a,b)=>a.v-b.v)[0]],gv,bh);
      },900+~~(Math.random()*600));
    }
  }

  if(s.phase==='over')handleOver(s,hands);
});

// ── Game logic ──
function processBid(bi,bid,s,hands,bottom){
  addMsg(`${players[bi]?.name||'?'}：${bid===0?'不叫':bid+'分'}`);
  const nm=bid>s.mb?bid:s.mb,ns=bid>s.mb?+bi:+s.ms,ni=+s.bi+1;
  if(bid===3||ni>=3){
    if(ns===-1){addMsg('无人叫地主，重新发牌');setTimeout(()=>{if(seat===0)initGame(Object.values(players).filter(p=>!p.bot).length);},2000);return;}
    const nh=[...hands];nh[ns]=[...nh[ns],...bottom];
    roundMult=nm||1;
    addMsg(`🎉 地主：${players[ns]?.name||'?'}`);
    update(gRef,{h:JSON.stringify(nh),ll:ns,phase:'play',t:ns,mb:nm,ms:ns});
  }else{update(gRef,{bi:ni,mb:nm,ms:ns});}
}

function processPlay(ps,cards,s,hands){
  const ct=getCT(cards);
  if(!ct){if(+ps===seat)showHint('不是有效牌型');return;}
  if(s.lp&&+s.ls!==+ps&&!canBeat(ct,s.lp)){if(+ps===seat)showHint('打不过上家');return;}
  const h=[...hands[ps]];
  cards.forEach(c=>{const i=h.findIndex(x=>x.s===c.s&&x.v===c.v);if(i>=0)h.splice(i,1);});
  h.sort((a,b)=>a.v-b.v); // sort remaining
  const nh=[...hands];nh[ps]=h;
  const np=JSON.parse(s.played||'[[],[],[]]');np[ps]=cards;
  addMsg(`${players[ps]?.name||'?'} 出 ${cards.length}张`);
  if(!h.length){
    const isLL=+ps===+s.ll;
    update(gRef,{h:JSON.stringify(nh),played:JSON.stringify(np),phase:'over',winner:+ps,wn:players[ps]?.name||'?',side:isLL?'地主':'农民',mult:roundMult});
    return;
  }
  update(gRef,{h:JSON.stringify(nh),played:JSON.stringify(np),lp:ct,ls:+ps,pc:0,t:(+ps+1)%3});
}

function processPass(ps,s,hands){
  addMsg(`${players[ps]?.name||'?'} 不出`);
  const np=JSON.parse(s.played||'[[],[],[]]');np[ps]=[];
  const nc=(s.pc||0)+1;
  if(nc>=2)update(gRef,{played:JSON.stringify(np),lp:null,pc:0,t:+s.ls});
  else update(gRef,{played:JSON.stringify(np),pc:nc,t:(+ps+1)%3});
}

function handleOver(s,hands){
  if(gameOverShown)return;
  gameOverShown=true;
  const mult=s.mult||1;
  // Update scores
  if(+s.winner===+s.ll){scores[+s.ll]=(scores[+s.ll]||0)+2*mult;}
  else{[0,1,2].filter(i=>i!==+s.ll).forEach(i=>{scores[i]=(scores[i]||0)+mult;});}

  const win=+s.winner===seat;
  document.getElementById('re').textContent=win?'🎉':'😮';
  document.getElementById('rt').textContent=win?'你赢了！':'你输了';
  document.getElementById('rs').textContent=`${s.wn||'?'} 获胜（${s.side}）· ×${mult}倍`;

  // Score chips
  const sr=document.getElementById('score-row');sr.innerHTML='';
  [0,1,2].forEach(i=>{
    if(!players[i])return;
    const d=document.createElement('div');d.className='sc-card';
    d.innerHTML=`${players[i].name.slice(0,4)}<span class="pts">${scores[i]||0}</span>`;
    sr.appendChild(d);
  });

  // Reveal all hands
  const rh=document.getElementById('rhands');rh.innerHTML='';
  hands.forEach((h,i)=>{
    if(!players[i])return;
    const g=document.createElement('div');g.className='hg';
    g.innerHTML=`<h5>${players[i].name}${+i===+s.ll?' 👑地主':' 农民'}</h5><div class="cl">${[...h].sort((a,b)=>a.v-b.v).map(c=>cLabel(c)).join('  ')}</div>`;
    rh.appendChild(g);
  });
  document.getElementById('result').classList.add('show');
}

// ── Actions ──
window.doBid=async bid=>{
  document.getElementById('bidp').style.display='none';
  if(!lastState||lastState.phase!=='bid'||+lastState.bi!==seat)return;
  processBid(seat,bid,lastState,JSON.parse(lastState.h),JSON.parse(lastState.bot));
};

window.doPlay=async()=>{
  const sel=myHand.filter(c=>c._s);
  if(!sel.length){showHint('请先选牌');return;}
  if(!lastState||lastState.phase!=='play'||+lastState.t!==seat)return;
  processPlay(seat,sel.map(({_s,...c})=>c),lastState,JSON.parse(lastState.h));
  myHand.forEach(c=>c._s=false);renderHand();
};

window.doPass=async()=>{
  if(!lastState||lastState.phase!=='play'||+lastState.t!==seat||!lastState.lp||+lastState.ls===seat)return;
  processPass(seat,lastState,JSON.parse(lastState.h));
};

window.playAgain=()=>{
  gameOverShown=false;
  document.getElementById('result').classList.remove('show');
  if(seat===0){
    const hc=Object.values(players).filter(p=>!p.bot).length;
    initGame(hc);
  } else {
    addMsg('等待房主开始下一局…');
  }
};
</script>
