<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美式轮盘</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --bg:#111;--card:#1a1a1a;--border:rgba(255,255,255,.08);
  --gold:#d4a847;--golddim:rgba(212,168,71,.13);
  --felt:#0b3318;
  --red:#c0392b;--green:#155724;
  --text:#f0f0f0;--t2:rgba(240,240,240,.55);--t3:rgba(240,240,240,.22);
  --cell-h:40px;/* single number cell height - all cells use this */
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:13px;overflow-x:hidden}
.hidden{display:none!important}
a{text-decoration:none}

/* ── SETUP ── */
.pg-center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-box{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px}
.s-title{font-size:1.7rem;font-weight:700;letter-spacing:-.03em;text-align:center;margin-bottom:4px}
.s-sub{font-size:.7rem;color:var(--t3);text-align:center;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.s-lbl{font-size:.66rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
.s-inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:.88rem;outline:none;font-family:inherit;transition:border .13s}
.s-inp:focus{border-color:rgba(255,255,255,.2)}.s-inp::placeholder{color:var(--t3)}
.s-btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .13s}
.s-btn.pri{background:var(--text);color:#111}.s-btn.pri:hover{background:#ddd}
.s-btn.sec{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t2)}.s-btn.sec:hover{background:rgba(255,255,255,.1);color:var(--text)}
.s-sep{display:flex;align-items:center;gap:8px;color:var(--t3);font-size:.63rem;text-transform:uppercase;letter-spacing:.09em;margin:2px 0}
.s-sep::before,.s-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.s-err{font-size:.7rem;color:#f87171;text-align:center;min-height:14px}
/* Lobby */
.lob-code{font-size:2.6rem;font-weight:700;color:var(--gold);letter-spacing:.25em;text-align:center;background:var(--golddim);border-radius:8px;padding:13px;margin-bottom:6px}
.lob-hint{font-size:.68rem;color:var(--t3);text-align:center;margin-bottom:12px}
.lob-list{background:rgba(0,0,0,.2);border-radius:7px;min-height:36px;max-height:100px;overflow-y:auto;margin-bottom:11px;padding:3px 0}
.ll{display:flex;align-items:center;gap:7px;padding:5px 11px;font-size:.77rem}
.ll-name{flex:1;font-weight:500}.ll-tag{font-size:.56rem;background:var(--golddim);color:var(--gold);border-radius:3px;padding:1px 5px}
.ai-hdr{display:flex;align-items:center;margin-bottom:7px}
.ai-lbl{font-size:.66rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.09em}
.ai-all{margin-left:auto;font-size:.63rem;color:var(--gold);cursor:pointer;opacity:.7}.ai-all:hover{opacity:1}
.ai-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:11px;max-height:120px;overflow-y:auto}
.ai-tag{padding:4px 9px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;font-size:.64rem;cursor:pointer;color:var(--t2);transition:all .12s;user-select:none}
.ai-tag.on{background:var(--golddim);border-color:rgba(212,168,71,.32);color:var(--text)}

/* ── GAME ── */
#game{display:block}
.topbar{height:44px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);background:rgba(17,17,17,.97);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.tb-back{color:var(--t2);font-size:.77rem;font-weight:500;transition:color .12s}.tb-back:hover{color:var(--text)}
.tb-title{flex:1;text-align:center;font-size:.82rem;font-weight:600;color:var(--t2)}
.tb-round{font-size:.7rem;color:var(--t3)}

/* Top section: wheel left, table right */
.game-top{display:flex;align-items:flex-start;gap:14px;padding:12px 16px 0}

/* Wheel column */
.wheel-col{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px}
.wheel-resize{position:relative;user-select:none}
.wheel-resize canvas{display:block;border-radius:50%;cursor:default}
.resize-handle{position:absolute;bottom:-4px;right:-4px;width:14px;height:14px;background:var(--gold);border-radius:50%;cursor:se-resize;opacity:.7;transition:opacity .13s;border:2px solid #111}
.resize-handle:hover{opacity:1}
.res-box{text-align:center}
.res-num{font-size:2rem;font-weight:700;letter-spacing:-.04em;line-height:1}
.res-num.r{color:#ef4444}.res-num.b{color:var(--t2)}.res-num.g{color:#22c55e}
.res-sub{font-size:.57rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/* Felt */
.felt-wrap{flex:1;overflow-x:auto;min-width:0}
.felt{background:var(--felt);border-radius:8px;border:1px solid rgba(255,255,255,.1);position:relative;overflow:visible;min-width:500px}
.rt{border-collapse:collapse;width:100%;table-layout:fixed}
.rt td{padding:0;border:1px solid rgba(255,255,255,.1)}

/* Number cells - all same height */
.nc{
  position:relative;cursor:pointer;text-align:center;vertical-align:middle;
  font-size:.75rem;font-weight:600;height:var(--cell-h);color:#fff;
  transition:filter .07s;user-select:none;width:auto
}
.nc:hover{filter:brightness(1.7)}
.nc.nr{background:var(--red)}.nc.nb{background:#1e1e1e}

/* Zero column - contains flex children */
.zc-col{
  width:44px;vertical-align:top;padding:0;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1)
}
.zc-inner{display:flex;flex-direction:column;height:calc(var(--cell-h)*3 + 4px)}
.zc{
  display:flex;align-items:center;justify-content:center;
  background:var(--green);color:#fff;font-weight:700;font-size:.8rem;
  flex:1;cursor:pointer;transition:filter .07s;position:relative;user-select:none;
  border-bottom:2px solid rgba(0,0,0,.3)
}
.zc:last-child{border-bottom:none}
.zc:hover{filter:brightness(1.6)}

/* 2:1 column */
.nc21{
  background:rgba(212,168,71,.08);color:rgba(212,168,71,.8);
  font-size:.6rem;font-weight:600;text-align:center;vertical-align:middle;
  cursor:pointer;width:36px;height:var(--cell-h);
  border:1px solid rgba(255,255,255,.07);user-select:none;letter-spacing:.03em
}
.nc21:hover{background:var(--golddim)!important}

/* Dozen / outside rows */
.ncdz{
  background:rgba(255,255,255,.04);color:var(--t2);font-size:.64rem;
  text-align:center;vertical-align:middle;height:26px;cursor:pointer;font-weight:500;user-select:none
}
.ncdz:hover{background:rgba(255,255,255,.09)!important}
.ncout{
  background:rgba(255,255,255,.03);color:var(--t2);font-size:.65rem;
  text-align:center;vertical-align:middle;height:28px;cursor:pointer;font-weight:500;user-select:none
}
.ncout:hover{background:rgba(255,255,255,.08)!important}
.ncout.otr{background:rgba(192,57,43,.35);color:#fca5a5}.ncout.otr:hover{background:rgba(192,57,43,.55)!important}
.ncout.otb{background:rgba(15,15,15,.7)}

/* Preview */
.pv{outline:2px solid rgba(212,168,71,.8)!important;filter:brightness(1.75)!important;z-index:4}
.zc.pv{outline:2px solid rgba(212,168,71,.8)!important;filter:brightness(1.75)!important}
/* Win */
.wh{animation:wfl .4s ease infinite alternate}
@keyframes wfl{from{filter:brightness(1.2)}to{filter:brightness(2.3);box-shadow:0 0 18px rgba(255,255,255,.6)}}

/* Floating chips on table */
.fc{
  position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.44rem;font-weight:700;color:#fff;pointer-events:none;z-index:10;
  border:2px solid rgba(255,255,255,.45);transform:translate(-50%,-50%);
  box-shadow:0 2px 6px rgba(0,0,0,.7);width:20px;height:20px
}
.fc.v10{background:#1d4ed8}.fc.v25{background:#15803d}.fc.v50{background:#991b1b}
.fc.v100{background:#6b21a8}.fc.v500{background:#92400e}.fc.v1k{background:#27272a}
/* Tooltip */
.tip{position:fixed;background:rgba(8,8,10,.96);border:1px solid rgba(212,168,71,.25);border-radius:5px;padding:3px 9px;font-size:.6rem;color:var(--gold);pointer-events:none;z-index:999;white-space:nowrap;display:none}

/* Bet pills row */
.bpills-row{padding:6px 16px 0;display:flex;flex-wrap:wrap;gap:3px;min-height:10px}
.bp{padding:3px 8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;font-size:.61rem;cursor:pointer;color:var(--t2);white-space:nowrap;transition:all .1s}
.bp:hover{background:rgba(255,255,255,.09);color:var(--text)}.bp.hot{border-color:rgba(248,113,113,.4);color:#fca5a5}.bp.cold{border-color:rgba(96,165,250,.35);color:#93c5fd}

/* Controls bar - sticky */
.ctrl-zone{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:8px 16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  background:rgba(17,17,17,.97);backdrop-filter:blur(12px);
  position:sticky;bottom:0;z-index:50;margin-top:8px
}
.chip-row{display:flex;gap:5px;align-items:center}
.chip{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:700;cursor:pointer;border:2px solid transparent;user-select:none;transition:all .13s;flex-shrink:0}
.chip:hover{transform:scale(1.09)}.chip.active{border-color:#fff!important;transform:scale(1.15);box-shadow:0 0 0 1px rgba(255,255,255,.1)}
.chip.v10{background:#1d4ed8}.chip.v25{background:#15803d}.chip.v50{background:#991b1b}
.chip.v100{background:#6b21a8}.chip.v500{background:#92400e}.chip.v1k{background:#27272a;border-color:#555!important}
.sep-v{width:1px;height:26px;background:var(--border);flex-shrink:0}
.clr-btn{padding:5px 10px;background:none;border:1px solid var(--border);border-radius:7px;color:var(--t3);font-size:.63rem;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.clr-btn:hover:not(:disabled){border-color:#f87171;color:#f87171}.clr-btn:disabled{opacity:.2;cursor:default}
.act-btn{padding:5px 11px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:7px;color:var(--t2);font-size:.63rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.act-btn:hover:not(:disabled){background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:var(--text)}
.act-btn:disabled{opacity:.2;cursor:default}
.act-btn.hi:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.act-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.bet-lbl{font-size:.65rem;color:var(--t3);white-space:nowrap}
.bld-sel{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:7px;padding:5px 9px;color:var(--text);font-size:.72rem;outline:none;cursor:pointer;font-family:inherit;appearance:none}
.bld-sel option{background:#1a1a1a}
.ctrl-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.phase-lbl{font-size:.75rem;color:var(--t2);font-weight:500;white-space:nowrap}
.btn-spin{padding:10px 28px;background:var(--gold);border:none;border-radius:8px;font-size:.88rem;font-weight:600;color:#0c0800;cursor:pointer;font-family:inherit;transition:all .14s;white-space:nowrap}
.btn-spin:hover:not(:disabled){background:#e0b84f;box-shadow:0 4px 16px rgba(212,168,71,.3)}
.btn-spin:disabled{opacity:.26;cursor:default}
.btn-next{padding:10px 20px;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.25);border-radius:8px;font-size:.82rem;font-weight:600;color:#4ade80;cursor:pointer;font-family:inherit;transition:all .14s;white-space:nowrap}
.btn-next:hover{background:rgba(34,197,94,.22)}

/* ── BOTTOM INFO (scrollable, natural flow) ── */
.game-bottom{padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:0}
@media(max-width:800px){.game-bottom{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.game-bottom{grid-template-columns:1fr}}

.info-card{background:var(--card);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.ic-hdr{padding:8px 12px;font-size:.6rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border)}
/* Player rows */
.plrow{display:flex;align-items:center;gap:6px;padding:5px 12px;border-bottom:1px solid rgba(255,255,255,.025)}
.plrow:last-child{border:none}.plrow.me{background:rgba(255,255,255,.025)}
.pl-em{font-size:.85rem;flex-shrink:0}.pl-name{flex:1;font-size:.66rem;font-weight:500;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-bal{font-size:.63rem;color:var(--gold);font-weight:600}.pl-bet{font-size:.54rem;color:var(--t3);margin-left:3px}
.bust{font-size:.5rem;background:rgba(248,113,113,.12);color:#f87171;border-radius:3px;padding:1px 4px;margin-left:2px}
/* Hot/cold + pct */
.hcw{padding:5px 12px}
.hc-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px}
.hc-lbl{font-size:.58rem;font-weight:700;width:30px;flex-shrink:0;padding-top:2px}
.hcw.hot .hc-lbl{color:#f87171}.hcw.cold .hc-lbl{color:#60a5fa}
.hc-pills{display:flex;flex-wrap:wrap;gap:3px}
.hcp{font-size:.57rem;font-weight:600;padding:2px 6px;border-radius:9px}
.hcw.hot .hcp{background:rgba(248,113,113,.12);color:#fca5a5;border:1px solid rgba(248,113,113,.2)}
.hcw.cold .hcp{background:rgba(96,165,250,.1);color:#93c5fd;border:1px solid rgba(96,165,250,.18)}
.hc-note{font-size:.54rem;color:var(--t3);padding:0 12px 6px;line-height:1.5}
/* Probability grid */
.prob-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:6px 12px 8px}
.prob-row{display:flex;align-items:center;justify-content:space-between;padding:3px 8px;background:rgba(255,255,255,.03);border-radius:4px;font-size:.6rem}
.prob-lbl{color:var(--t2)}.prob-pct{color:var(--gold);font-weight:600}
.prob-bar-wrap{width:100%;padding:0 12px 8px}
.prob-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:.58rem}
.prob-bar-lbl{color:var(--t3);width:40px;text-align:right;flex-shrink:0}
.prob-bar-bg{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.prob-bar-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .3s}
.prob-bar-val{color:var(--gold);font-weight:600;width:36px;text-align:right;flex-shrink:0}
/* History */
.hist-wrap{display:flex;flex-wrap:wrap;gap:3px;padding:7px 12px 9px}
.hd{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.48rem;font-weight:700;border:1px solid rgba(255,255,255,.07)}
.hd.r{background:var(--red)}.hd.b{background:#1e1e1e;color:#777}.hd.g{background:var(--green)}
/* Stats */
.st-row{display:flex;justify-content:space-between;padding:3px 12px;border-top:1px solid rgba(255,255,255,.025)}
.st-l{font-size:.59rem;color:var(--t3)}.st-v{font-size:.59rem;color:var(--gold);font-weight:600}
/* Payout table */
.po-row{display:flex;justify-content:space-between;align-items:center;padding:4px 12px;border-top:1px solid rgba(255,255,255,.025);gap:4px}
.po-t{font-size:.59rem;color:var(--t2);flex:1;line-height:1.4}.po-c{font-size:.53rem;color:var(--t3);margin-left:4px}.po-p{font-size:.62rem;color:var(--gold);font-weight:600;white-space:nowrap}

/* ── OVERLAY ── */
#ovr{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(18px);align-items:center;justify-content:center;z-index:200}
#ovr.show{display:flex}
.ov{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 18px;max-width:310px;width:94vw}
.ov-n{text-align:center;font-size:4.8rem;font-weight:700;line-height:1;letter-spacing:-.04em}
.ov-n.r{color:#ef4444}.ov-n.b{color:var(--t2)}.ov-n.g{color:#22c55e}
.ov-l{text-align:center;font-size:.62rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.ov-list{background:rgba(0,0,0,.22);border-radius:8px;padding:5px;max-height:155px;overflow-y:auto;margin-bottom:11px;display:flex;flex-direction:column;gap:2px}
.or{display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:4px;font-size:.72rem}
.or.win{background:rgba(34,197,94,.08)}
.ore{font-size:.85rem;width:14px;text-align:center}.orn{flex:1;font-weight:500;color:var(--t2)}.orb{font-weight:700;color:var(--gold);white-space:nowrap}
.orc{font-size:.6rem;white-space:nowrap;font-weight:600}.orc.pos{color:#4ade80}.orc.neg{color:#f87171}.orc.z{color:var(--t3)}
.ov-btn{width:100%;padding:11px;background:var(--gold);border:none;border-radius:8px;font-size:.86rem;font-weight:600;color:#0c0800;cursor:pointer;font-family:inherit}
.ov-btn:hover{background:#e0b84f}
.ov-guest{text-align:center;font-size:.6rem;color:var(--t3);margin-top:7px}
</style>
</head>
<body>

<!-- SETUP -->
<div id="pg-s" class="pg-center">
  <div class="setup-box">
    <div class="s-title">美式轮盘</div>
    <div class="s-sub">American Roulette · 0 &amp; 00</div>
    <div><label class="s-lbl">昵称</label><input class="s-inp" id="inp-name" placeholder="输入昵称" maxlength="12"></div>
    <button class="s-btn pri" onclick="doSolo()">🎮 单人游戏</button>
    <div class="s-sep">联机</div>
    <button class="s-btn sec" onclick="doCreate()">创建房间</button>
    <div><label class="s-lbl">房间代码</label><input class="s-inp" id="inp-code" placeholder="输入代码" maxlength="6" style="text-transform:uppercase;letter-spacing:.15em"></div>
    <button class="s-btn sec" onclick="doJoin()">加入房间</button>
    <div class="s-err" id="err-s"></div>
  </div>
</div>

<!-- LOBBY -->
<div id="pg-l" class="pg-center hidden">
  <div class="setup-box">
    <div class="s-title" style="font-size:1.25rem">等待玩家加入</div>
    <div class="s-sub" style="margin-bottom:10px">分享代码邀请朋友</div>
    <div class="lob-code" id="lob-code">——</div>
    <div class="lob-hint">朋友在首页输入此代码加入</div>
    <div class="lob-list" id="lob-list"></div>
    <div id="ai-sec">
      <div class="ai-hdr"><span class="ai-lbl">AI 对手</span><span class="ai-all" onclick="toggleAllAI()">全选 / 取消</span></div>
      <div class="ai-wrap" id="ai-wrap"></div>
    </div>
    <button class="s-btn pri" onclick="hostStart()">开始游戏</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div class="topbar">
    <a href="index.html" class="tb-back">← 大厅</a>
    <span class="tb-title">美式轮盘</span>
    <span class="tb-round" id="rl">第 1 局</span>
  </div>

  <!-- Wheel + Table -->
  <div class="game-top">
    <div class="wheel-col">
      <div class="wheel-resize" id="wheel-resize">
        <canvas id="wc" width="280" height="280"></canvas>
        <div class="resize-handle" id="resize-handle" title="拖动调整大小"></div>
      </div>
      <div class="res-box" style="width:100%;text-align:center;margin-top:4px">
        <div class="res-num g" id="rn">—</div>
        <div class="res-sub" id="rs">等待开奖</div>
      </div>
    </div>
    <div class="felt-wrap">
      <div class="felt" id="felt"><div id="tbl-wrap"></div></div>
    </div>
  </div>

  <!-- Bet pills -->
  <div class="bpills-row" id="bpills"></div>

  <!-- Controls: sticky bottom -->
  <div class="ctrl-zone">
    <div class="chip-row">
      <div class="chip v10 active" onclick="selChip(10,this)">$10</div>
      <div class="chip v25" onclick="selChip(25,this)">$25</div>
      <div class="chip v50" onclick="selChip(50,this)">$50</div>
      <div class="chip v100" onclick="selChip(100,this)">$100</div>

function initWheel(){const cv=document.getElementById('wc');WR=~~(cv.width/2);drawWheel();}
function ease(t){return 1-Math.pow(1-t,4);}
function drawWheel(){
  const cv=document.getElementById('wc');if(!cv)return;
  const ctx=cv.getContext('2d'),cx=WR,cy=WR,OR=WR-2,IR=OR*.46;
  ctx.clearRect(0,0,WR*2,WR*2);
  ctx.beginPath();ctx.arc(cx,cy,WR-1,0,Math.PI*2);ctx.fillStyle='#100c06';ctx.fill();
  WHL.forEach((num,i)=>{
    const sa=wa+i*SEG-Math.PI/2,ea=sa+SEG;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,OR,sa,ea);ctx.closePath();
    ctx.fillStyle=String(num)==='0'||String(num)==='00'?'#1a5530':RED.has(+num)?'#7f1d1d':'#181818';
    ctx.fill();ctx.strokeStyle='rgba(212,168,71,.38)';ctx.lineWidth=.5;ctx.stroke();
    const ma=sa+SEG/2,tr=(OR+IR)/2;
    ctx.save();ctx.translate(cx+Math.cos(ma)*tr,cy+Math.sin(ma)*tr);ctx.rotate(ma+Math.PI/2);
    ctx.fillStyle='rgba(255,255,255,.88)';ctx.font=`600 ${~~(OR*.1)}px Inter,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(String(num),0,0);ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,IR,0,Math.PI*2);ctx.fillStyle='#0e0a06';ctx.fill();ctx.strokeStyle='#d4a847';ctx.lineWidth=1.2;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,IR*.28,0,Math.PI*2);ctx.fillStyle='#d4a847';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,OR,0,Math.PI*2);ctx.strokeStyle='rgba(212,168,71,.5)';ctx.lineWidth=1.2;ctx.stroke();
  const bg=ctx.createRadialGradient(cx,cy-OR+4,1,cx,cy-OR+4,4.5);bg.addColorStop(0,'#fff');bg.addColorStop(1,'#ccc');
  ctx.beginPath();ctx.arc(cx,cy-OR+4,4.5,0,Math.PI*2);ctx.fillStyle=bg;ctx.shadowColor='rgba(255,255,255,.45)';ctx.shadowBlur=5;ctx.fill();ctx.shadowBlur=0;
}
function spinTo(result,cb){
  const idx=WHL.findIndex(n=>String(n)===String(result));
  const target=-(idx+0.5)*SEG;
  const turns=Math.ceil((wa+Math.PI*10-target)/(Math.PI*2));
  sp_s=wa;sp_e=target+turns*Math.PI*2+(Math.random()-.5)*SEG*.18;
  sp_d=4200+Math.random()*2000;sp_t=null;
  const anim=ts=>{if(!sp_t)sp_t=ts;const p=Math.min((ts-sp_t)/sp_d,1);wa=sp_s+(sp_e-sp_s)*ease(p);drawWheel();if(p<1){raf=requestAnimationFrame(anim);}else{wa=sp_e;drawWheel();cb&&cb();}};
  raf=requestAnimationFrame(anim);
}

function recalcCC(){

  // Number cells: id='tc_N' → CC['tc_N']
  document.querySelectorAll('.nc[id]').forEach(el=>{
    const r=el.getBoundingClientRect();
    CC[el.id]={x:(r.left+r.right)/2-fr.left,y:(r.top+r.bottom)/2-fr.top};
  });
  // Zero cells: id='tc_0','tc_00' → CC['tc_0'], CC['tc_00']
  document.querySelectorAll('.zc[id]').forEach(el=>{
    const r=el.getBoundingClientRect();
    CC[el.id]={x:(r.left+r.right)/2-fr.left,y:(r.top+r.bottom)/2-fr.top};
  });
  // Outside/dozen cells: id='tc_red','tc_dz_1',etc → CC['red'],CC['dz_1'],etc
  document.querySelectorAll('.ncdz[id],.ncout[id]').forEach(el=>{
    const r=el.getBoundingClientRect();
    const k=el.id.replace('tc_','');
    CC[k]={x:(r.left+r.right)/2-fr.left,y:(r.top+r.bottom)/2-fr.top};
  });
  // 2:1 column cells: id='nc21_1','nc21_2','nc21_3' → CC['col_1'],CC['col_2'],CC['col_3']
  document.querySelectorAll('.nc21[id]').forEach(el=>{
    const r=el.getBoundingClientRect();

  document.querySelectorAll('.fc').forEach(dot=>{
    const pos=getPos(dot.dataset.k);

  });
}

function clrPv(){document.querySelectorAll('.pv').forEach(e=>e.classList.remove('pv'));const t=document.getElementById('tip');if(t)t.style.display='none';_hk=null;}
function showPv(nums,key,e){
  clrPv();_hk=key;
  nums.forEach(n=>{const el=document.getElementById('tc_'+n);if(el)el.classList.add('pv');});
  const t=document.getElementById('tip');

}
function numHov(e,row,col){
  if(phase!=='betting')return;
  const rc=e.currentTarget.getBoundingClientRect();
  const x=e.clientX-rc.left,y=e.clientY-rc.top,w=rc.width,h=rc.height,T=0.27;
  const nL2=x<w*T,nR=x>w*(1-T),nT=y<h*T,nB=y>h*(1-T);
  const hL=col>0,hR=col<11,hT=row>0,hB=row<2;
  let nums,key;
  const cK=ns=>{const s=ns.map(Number).sort((a,b)=>a-b);return`co_${Math.floor((s[0]-1)/3)}_${(s[0]-1)%3}`;};
  const sK=(a,b2)=>`sp_${[a,b2].sort((x,y)=>(+x||99)-(+y||99)||x.localeCompare(y)).join('_')}`;
  if(nT&&nL2&&hT&&hL){nums=[nAt(row-1,col-1),nAt(row-1,col),nAt(row,col-1),nAt(row,col)].map(String);key=cK(nums);}
  else if(nT&&nR&&hT&&hR){nums=[nAt(row-1,col),nAt(row-1,col+1),nAt(row,col),nAt(row,col+1)].map(String);key=cK(nums);}
  else if(nB&&nL2&&hB&&hL){nums=[nAt(row,col-1),nAt(row,col),nAt(row+1,col-1),nAt(row+1,col)].map(String);key=cK(nums);}
  else if(nB&&nR&&hB&&hR){nums=[nAt(row,col),nAt(row,col+1),nAt(row+1,col),nAt(row+1,col+1)].map(String);key=cK(nums);}
  else if(nT&&hT){nums=[nAt(row-1,col),nAt(row,col)].map(String);key=sK(nums[0],nums[1]);}
  else if(nB&&hB){nums=[nAt(row,col),nAt(row+1,col)].map(String);key=sK(nums[0],nums[1]);}
  else if(nL2&&hL){nums=[nAt(row,col-1),nAt(row,col)].map(String);key=sK(nums[0],nums[1]);}
  else if(nR&&hR){nums=[nAt(row,col),nAt(row,col+1)].map(String);key=sK(nums[0],nums[1]);}
  else{nums=[String(nAt(row,col))];key='s_'+nAt(row,col);}
  showPv(nums,key,e);
}

function vCls(v){if(v>=1000)return'v1k';if(v>=500)return'v500';if(v>=100)return'v100';if(v>=50)return'v50';if(v>=25)return'v25';return'v10';}

// ── Bet action functions ──
function updActBtns(){
  const hasBets=Object.keys(LB).length>0;
  const hasLast=Object.keys(lastBets).length>0;
  const hasSaved=Object.keys(savedBets).length>0;
  const e=document.getElementById.bind(document);
  if(e('btn-repeat'))e('btn-repeat').disabled=!hasLast||phase!=='betting';
  if(e('btn-double'))e('btn-double').disabled=!hasBets||phase!=='betting';
  if(e('btn-half'))e('btn-half').disabled=!hasBets||phase!=='betting';
  if(e('btn-undo'))e('btn-undo').disabled=undoStack.length===0||phase!=='betting';
  if(e('btn-save'))e('btn-save').disabled=!hasBets;
  if(e('btn-load'))e('btn-load').disabled=!hasSaved||phase!=='betting';
}
// Repeat: re-place last round's bets
window.betRepeat=()=>{
  if(!Object.keys(lastBets).length||phase!=='betting')return;
  // Clear current first
  myBal+=Object.values(LB).reduce((s,v)=>s+v,0);LB={};undoStack=[];rmDots();
  // Place last bets
  let failed=false;
  Object.entries(lastBets).forEach(([k,a])=>{
    if(!B[k])return;
    if(myBal<a){failed=true;return;}
    LB[k]=(LB[k]||0)+a;myBal-=a;undoStack.push({key:k,amt:a});drawDot(k);
  });
  if(failed)chat2('系统','部分下注因筹码不足跳过','s');
  updTot();pushBets();updActBtns();
};
// Double: multiply all current bets × 2
window.betDouble=()=>{
  if(!Object.keys(LB).length||phase!=='betting')return;
  const extra={};
  const needed=Object.values(LB).reduce((s,v)=>s+v,0);
  if(myBal<needed){chat2('系统','筹码不足，无法翻倍','s');return;}
  Object.entries(LB).forEach(([k,a])=>{extra[k]=a;});
  Object.entries(extra).forEach(([k,a])=>{
    LB[k]=(LB[k]||0)+a;myBal-=a;undoStack.push({key:k,amt:a});drawDot(k);
  });
  updTot();pushBets();updActBtns();
  chat2('系统','所有下注翻倍 ×2','g');
};
// Half: reduce all current bets by half (round down to chip unit)
window.betHalf=()=>{
  if(!Object.keys(LB).length||phase!=='betting')return;
  let refundTotal=0;
  const newLB={};
  Object.entries(LB).forEach(([k,a])=>{
    const half=Math.max(0,Math.floor((a/2)/5)*5);// floor to nearest $5; bet < $10 becomes 0 (full refund)
    newLB[k]=half;refundTotal+=a-half;
  });
  // remove zero bets
  Object.keys(newLB).forEach(k=>{if(newLB[k]<=0)delete newLB[k];});
  myBal+=refundTotal;LB={...newLB};undoStack=[];
  rmDots();Object.keys(LB).forEach(k=>drawDot(k));
  updTot();pushBets();updActBtns();
  chat2('系统','所有下注减半','g');
};
// Undo: remove last placed bet action
window.betUndo=()=>{
  if(!undoStack.length||phase!=='betting')return;
  const last=undoStack.pop();
  if(LB[last.key]){
    LB[last.key]-=last.amt;myBal+=last.amt;
    if(LB[last.key]<=0){
      delete LB[last.key];
      const felt=document.getElementById('felt');
      const dot=felt&&felt.querySelector(`.fc[data-k="${last.key}"]`);if(dot)dot.remove();
    } else drawDot(last.key);
  }
  updTot();pushBets();updActBtns();
};
// Save: store current bet layout as template
window.betSave=()=>{
  if(!Object.keys(LB).length)return;
  savedBets={...LB};
  const e=document.getElementById('btn-save');if(e){e.textContent='📌 已存';setTimeout(()=>{e.textContent='📌 存方案';},1200);}
  updActBtns();chat2('系统',`方案已保存 (${Object.keys(savedBets).length}注)` ,'g');
};
// Load saved bet template
window.betLoad=()=>{
  if(!Object.keys(savedBets).length||phase!=='betting')return;
  myBal+=Object.values(LB).reduce((s,v)=>s+v,0);LB={};undoStack=[];rmDots();
  let failed=false;
  Object.entries(savedBets).forEach(([k,a])=>{
    if(!B[k])return;if(myBal<a){failed=true;return;}
    LB[k]=(LB[k]||0)+a;myBal-=a;undoStack.push({key:k,amt:a});drawDot(k);
  });
  if(failed)chat2('系统','部分下注因筹码不足跳过','s');
  updTot();pushBets();updActBtns();
  chat2('系统','已载入方案','g');
};

function showGame(rd){
  document.getElementById('pg-s').classList.add('hidden');document.getElementById('pg-l').classList.add('hidden');document.getElementById('game').classList.remove('hidden');
  phase='betting';window._rd=rd;myBal=(rd.players?.[myId]?.balance)||5000;
  setTimeout(initWheel,50);buildTable();buildPtbl();buildProbBars();initHC();updStats(rd.history||[]);renderP(rd);
  document.getElementById('btn-spin').disabled=!isHost;document.getElementById('rl').textContent=`第 ${rd.round||1} 局`;
  chat2('系统',`${isSolo?'单人模式':'房间 '+roomCode} · 欢迎！`,'s');
  updActBtns();
  if(!isSolo)attachL();
}
function attachL(){
  if(unsub)unsub();
  unsub=onValue(roomRef,snap=>{
    const rd=snap.val();if(!rd)return;window._rd=rd;
    document.getElementById('rl').textContent=`第 ${rd.round||1} 局`;renderP(rd);updStats(rd.history||[]);
    if(phase==='betting'&&rd.players?.[myId])myBal=rd.players[myId].balance;
    if(!isHost){
      if(rd.status==='betting'&&(phase==='result'||phase==='spinning')){phase='betting';document.getElementById('ovr').classList.remove('show');document.getElementById('btn-spin').style.display='';document.getElementById('btn-next').classList.add('hidden');rmDots();document.querySelectorAll('.wh').forEach(e=>e.classList.remove('wh'));LB={};undoStack=[];updTot();document.getElementById('phase-txt').textContent='🎯 下注阶段';updActBtns();}
      if(rd.status==='spinning'&&phase==='betting'){phase='spinning';document.getElementById('phase-txt').textContent='🎡 旋转中…';document.getElementById('btn-clr').disabled=true;}
      if(rd.status==='result'&&rd.result&&phase==='spinning'){phase='result';landWheel(rd.result);const rows=[];Object.entries(rd.players||{}).forEach(([pid,p])=>rows.push({em:p.em||'👤',name:p.name||pid,bal:p.balance||0,chg:0,isMe:pid===myId}));ROSTER.filter(ai=>(rd.aiEnabled||{})[ai.id]).forEach(ai=>{const p=rd.aiState?.[ai.id]||{};rows.push({em:ai.em,name:ai.name,bal:p.balance||0,chg:0,isMe:false});});showOvr(rd.result,rows);}
    }
  });
}

const EMOS=['🎮','🎲','🃏','🎯','🌊','⚡','🦋','🌸'];
function genCode(){return Math.random().toString(36).slice(2,8).toUpperCase();}
window._solo=name=>{
  myName=name||'玩家';isHost=true;isSolo=true;
  const ae={};ROSTER.forEach(ai=>{ae[ai.id]=true;});const as={};ROSTER.forEach(ai=>{as[ai.id]={balance:5000,bets:{}};});
  window._rd={host:myId,status:'betting',round:1,result:null,history:[],aiEnabled:ae,aiState:as,players:{[myId]:{name:myName,em:'🎮',balance:5000,bets:{}}}};
  myBal=5000;showGame(window._rd);
};
window._rdy=true;if(window._pn!==null){window._solo(window._pn);window._pn=null;}
window.doCreate=async()=>{
  const name=document.getElementById('inp-name').value.trim();if(!name){document.getElementById('err-s').textContent='请输入昵称';return;}
  myName=name;isHost=true;const code=genCode();roomCode=code;
  roomRef=ref(db,`roulette_rooms/${code}`);
  const ae={};ROSTER.forEach(ai=>{ae[ai.id]=true;});const as={};ROSTER.forEach(ai=>{as[ai.id]={balance:5000,bets:{}};});
  await set(roomRef,{host:myId,status:'lobby',round:1,result:null,history:[],aiEnabled:ae,aiState:as,players:{[myId]:{name,em:'👑',balance:5000,bets:{}}}});
  if(unsub)unsub();unsub=onValue(roomRef,snap=>{const rd=snap.val();if(!rd)return;window._rd=rd;renderLob(rd);if(rd.status==='betting'){if(unsub)unsub();unsub=null;showGame(rd);}});
  document.getElementById('pg-s').classList.add('hidden');document.getElementById('pg-l').classList.remove('hidden');
  document.getElementById('lob-code').textContent=code;buildAiWrap(ae);
};
window.doJoin=async()=>{
  const name=document.getElementById('inp-name').value.trim()||'玩家';
  const code=document.getElementById('inp-code').value.trim().toUpperCase();
  if(code.length<4){document.getElementById('err-s').textContent='请输入有效代码';return;}
  myName=name;isHost=false;roomCode=code;roomRef=ref(db,`roulette_rooms/${code}`);
  const snap=await get(roomRef);if(!snap.exists()){document.getElementById('err-s').textContent='房间不存在';return;}
  const rd=snap.val();const em=EMOS[Object.keys(rd.players||{}).length%EMOS.length];
  await update(roomRef,{[`players/${myId}`]:{name,em,balance:5000,bets:{}}});
  if(rd.status==='lobby'){
    document.getElementById('pg-s').classList.add('hidden');document.getElementById('pg-l').classList.remove('hidden');
    document.getElementById('lob-code').textContent=code;document.getElementById('ai-sec').classList.add('hidden');
    document.querySelector('#pg-l .s-btn').classList.add('hidden');
    renderLob(rd);
    if(unsub)unsub();unsub=onValue(roomRef,snap2=>{const rd2=snap2.val();if(!rd2)return;window._rd=rd2;renderLob(rd2);if(rd2.status==='betting'){if(unsub)unsub();unsub=null;showGame(rd2);}});
  } else showGame(rd);
};
function buildAiWrap(em2){const g=document.getElementById('ai-wrap');g.innerHTML='';ROSTER.forEach(ai=>{const d=document.createElement('div');d.className=`ai-tag${em2[ai.id]!==false?' on':''}`;d.dataset.id=ai.id;d.textContent=`${ai.em} ${ai.name}`;d.onclick=()=>{d.classList.toggle('on');syncAI();};g.appendChild(d);});}
function syncAI(){if(!isHost||!roomRef)return;const m={};document.querySelectorAll('.ai-tag').forEach(d=>{m[d.dataset.id]=d.classList.contains('on');});update(roomRef,{aiEnabled:m});}
window.toggleAllAI=()=>{const all=[...document.querySelectorAll('.ai-tag')];const allOn=all.every(d=>d.classList.contains('on'));all.forEach(d=>d.classList.toggle('on',!allOn));syncAI();};
window.hostStart=async()=>{if(!isHost)return;await update(roomRef,{status:'betting'});};
function renderLob(rd){const el=document.getElementById('lob-list');if(!el)return;el.innerHTML='';Object.entries(rd.players||{}).forEach(([pid,p])=>{const d=document.createElement('div');d.className='ll';d.innerHTML=`<span>${p.em||'👤'}</span><span class="ll-name">${p.name||pid}</span>${pid===rd.host?'<span class="ll-tag">房主</span>':''}`;el.appendChild(d);});}

// Chat overlay (small floating)
(function(){const cw=document.createElement('div');cw.style.cssText='position:fixed;bottom:58px;left:10px;width:200px;z-index:30;pointer-events:none';cw.innerHTML='<div id="chat" style="max-height:64px;overflow:hidden;display:flex;flex-direction:column;gap:1px"></div>';document.body.appendChild(cw);})();

(()=>{const q=new URLSearchParams(location.search);const rc=q.get('room');if(rc)document.getElementById('inp-code').value=rc;})();
</script>
</body>
