<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSM-5 Mnemonics 朗读记忆</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --page-bg:#f7f1e8;--soft-bg:#f2e7d9;--card-bg:#fdf9f4;
    --text:#3a3228;--text-light:#7a6e5f;--accent:#c0785a;--border:#e5d9c9;
    --highlight:#fff8ed;--playing:#eae0d0;--mono:'DM Mono',monospace;
    --mood-ac:#c94f28;--mood-bg:#fff3ee;--mood-bd:#f0b89e;
    --anx-ac:#3068d4;--anx-bg:#eef4ff;--anx-bd:#a0bcee;
    --trm-ac:#6b5bd4;--trm-bg:#f0eeff;--trm-bd:#b4aaec;
    --psy-ac:#bf3a7a;--psy-bg:#fff0f5;--psy-bd:#f0a8c8;
    --nro-ac:#1a9470;--nro-bg:#eefaf4;--nro-bd:#7ed4b4;
    --beh-ac:#d43a3a;--beh-bg:#fff0f0;--beh-bd:#f0a0a0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans SC',sans-serif;background:var(--page-bg);color:var(--text);line-height:1.8;min-height:100vh;}
  .header{text-align:center;padding:44px 20px 28px;border-bottom:1px solid var(--border);background:var(--soft-bg);}
  .header h1{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:700;margin-bottom:6px;}
  .header p{color:var(--text-light);font-size:13px;}
  .controls{display:flex;justify-content:center;gap:10px;padding:16px 20px;flex-wrap:wrap;position:sticky;top:0;background:var(--soft-bg);border-bottom:1px solid var(--border);z-index:100;}
  .btn{font-family:'Noto Sans SC',sans-serif;font-size:13px;padding:8px 20px;border:1.5px solid var(--accent);border-radius:24px;cursor:pointer;transition:all .2s;background:var(--card-bg);color:var(--accent);font-weight:600;}
  .btn:hover{background:var(--accent);color:#fff;}.btn.active{background:var(--accent);color:#fff;}
  .btn.stop{border-color:#b44;color:#b44;}.btn.stop:hover{background:#b44;color:#fff;}
  .mode-btns{display:flex;justify-content:center;gap:6px;padding:10px 20px 6px;background:var(--soft-bg);flex-wrap:wrap;}
  .mbtn{font-family:'Noto Sans SC',sans-serif;font-size:12px;padding:5px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:var(--card-bg);color:var(--text-light);transition:all .15s;}
  .mbtn:hover{border-color:var(--accent);color:var(--accent);}.mbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .speed-control{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-light);}
  .speed-control input[type="range"]{width:70px;accent-color:var(--accent);}
  .container{max-width:720px;margin:0 auto;padding:12px 20px 80px;}
  .section{margin-bottom:28px;}
  .section-title{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;padding:10px 0;border-bottom:2px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:10px;}
  .section-title .cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .disorder-block{margin-bottom:16px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--card-bg);}
  .disorder-header{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s;}
  .disorder-header:hover{background:var(--highlight);}.disorder-header.playing{background:var(--playing);}
  .dh-bar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;}
  .dh-info{flex:1;}
  .dh-name{font-family:var(--mono);font-size:14px;font-weight:500;}
  .dh-full{font-size:12px;color:var(--text-light);}
  .dh-mn{font-family:var(--mono);font-weight:500;font-size:16px;letter-spacing:2px;flex-shrink:0;}
  .dh-meta{font-size:11px;color:var(--text-light);margin-top:2px;}
  .letter-items{padding:0 16px 12px;}
  .letter-item{padding:8px 12px;border-radius:6px;margin-bottom:3px;cursor:pointer;transition:background .15s;display:flex;gap:10px;align-items:baseline;}
  .letter-item:hover{background:var(--highlight);}.letter-item.playing{background:var(--playing);border-left:3px solid var(--accent);}
  .li-letter{font-family:var(--mono);font-size:13px;font-weight:500;width:36px;flex-shrink:0;text-align:right;}
  .li-meaning{font-size:13px;color:var(--text);line-height:1.6;}
  .note-block{margin:4px 16px 12px;padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.6;cursor:pointer;transition:background .15s;}
  .note-block:hover{opacity:.85;}.note-block.playing{outline:2px solid var(--accent);}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin:0 16px 8px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:2px;transition:width .3s;width:0%;}
  .status-bar{position:fixed;bottom:0;left:0;right:0;background:var(--soft-bg);border-top:1px solid var(--border);padding:10px 20px;text-align:center;font-size:12px;color:var(--text-light);z-index:100;}
</style>
</head>
<body>
<div class="header">
  <h1>🧠 DSM-5 Mnemonics 朗读</h1>
  <p>17 个 Disorder · 点击朗读 · 自动播放全部记忆法</p>
</div>
<div class="controls">
  <button class="btn" id="playAllBtn" onclick="playAll()">▶ 全部朗读</button>
  <button class="btn" id="playLettersBtn" onclick="playAll('letters')">🔤 只读字母+含义</button>
  <button class="btn stop" id="stopBtn" onclick="stopAll()">⏹ 停止</button>
  <div class="speed-control">
    <span>语速</span>
    <input type="range" id="speedRange" min="0.5" max="1.5" step="0.1" value="0.8">
    <span id="speedLabel">0.8x</span>
  </div>
</div>
<div class="mode-btns">
  <button class="mbtn active" onclick="setFilter('all',this)">全部</button>
  <button class="mbtn" onclick="setFilter('psychotic',this)">Psychotic</button>
  <button class="mbtn" onclick="setFilter('anxiety',this)">Anxiety</button>
  <button class="mbtn" onclick="setFilter('mood',this)">Mood</button>
  <button class="mbtn" onclick="setFilter('trauma',this)">Trauma</button>
  <button class="mbtn" onclick="setFilter('neuro',this)">Neuro</button>
  <button class="mbtn" onclick="setFilter('behavior',this)">Behavior</button>
</div>
<div class="container" id="content"></div>
<div class="status-bar" id="statusBar">就绪 · 点击任意条目或按「全部朗读」开始</div>

const CAT_ORDER = ['psychotic','anxiety','mood','trauma','neuro','behavior'];
let synth = window.speechSynthesis;
let isPlaying = false;
let currentFilter = 'all';

document.getElementById('speedRange').addEventListener('input', function() {
  document.getElementById('speedLabel').textContent = this.value + 'x';
});

function getRate() { return parseFloat(document.getElementById('speedRange').value); }
function setStatus(t) { document.getElementById('statusBar').textContent = t; }
function filtered() { return currentFilter === 'all' ? DISORDERS : DISORDERS.filter(d => d.cat === currentFilter); }
function setFilter(f, el) { currentFilter = f; document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('active')); if (el) el.classList.add('active'); renderContent(); }
function clearHL() { document.querySelectorAll('.playing').forEach(el => el.classList.remove('playing')); }

function say(text) {
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = getRate();
    u.onend = () => resolve();
    u.onerror = () => resolve();
    synth.speak(u);
  });
}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// Clean letter for TTS: "+M" → "M", "R1" → "R", etc.
function letterForTTS(l) { return l.replace(/[+]/g,'').replace(/[0-9₁₂₃₄¹²]/g,'').trim(); }

// Read an array of phrases, 0.5s between each
async function sayPhrases(arr) {
  for (let i = 0; i < arr.length; i++) {
    if (!isPlaying) break;
    await say(arr[i]);
    if (i < arr.length - 1 && isPlaying) await wait(500);
  }
}

function renderContent() {
  const ds = filtered();
  const grouped = {};
  ds.forEach(d => { if (!grouped[d.cat]) grouped[d.cat] = []; grouped[d.cat].push(d); });
  let html = '';
  CAT_ORDER.filter(k => grouped[k]).forEach(ck => {
    const cat = CATS[ck];
    html += `<div class="section"><div class="section-title"><span class="cat-dot" style="background:${cat.ac}"></span>${cat.label}</div>`;
    grouped[ck].forEach(d => {
      html += `<div class="disorder-block"><div class="disorder-header" id="dh-${d.id}" onclick="playD('${d.id}')"><div class="dh-bar" style="background:${cat.ac}"></div><div class="dh-info"><div class="dh-name" style="color:${cat.ac}">${d.name}</div><div class="dh-full">${d.full}</div><div class="dh-meta">⏱ ${d.dur} · ✓ ${d.cnt}</div></div><div class="dh-mn" style="color:${cat.ac}">${d.mn}</div></div>`;
      html += `<div class="progress-bar"><div class="progress-fill" id="pg-${d.id}" style="background:${cat.ac}"></div></div><div class="letter-items">`;
      d.ls.forEach((it, i) => {
        html += `<div class="letter-item" id="li-${d.id}-${i}" onclick="playL('${d.id}',${i})"><span class="li-letter" style="color:${cat.ac}">${it.l}</span><span class="li-meaning">${it.display}</span></div>`;
      });
      html += '</div>';
      if (d.note) html += `<div class="note-block" id="nt-${d.id}" style="background:${cat.bg};color:${cat.ac};border:1px solid ${cat.bd}" onclick="playN('${d.id}')">📌 ${d.note}</div>`;
      html += '</div>';
    });
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;
}

// Play single letter
async function playL(did, li) {
  stopAll(); isPlaying = true;
  const d = DISORDERS.find(x => x.id === did), it = d.ls[li];
  const el = document.getElementById(`li-${did}-${li}`);
  if (el) { el.classList.add('playing'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
  setStatus(`${d.name} — ${it.l}`);
  await say(letterForTTS(it.l));
  if (!isPlaying) return;
  await wait(300);
  await sayPhrases(it.tts);
  if (isPlaying) { clearHL(); setStatus('就绪'); isPlaying = false; }
}

// Play note
async function playN(did) {
  stopAll(); isPlaying = true;
  const d = DISORDERS.find(x => x.id === did);
  const el = document.getElementById(`nt-${did}`);
  if (el) { el.classList.add('playing'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
  setStatus(`${d.name} — Note`);
  if (d.noteTTS) await sayPhrases(d.noteTTS);
  if (isPlaying) { clearHL(); setStatus('就绪'); isPlaying = false; }
}

// Play whole disorder
async function playD(did) {
  stopAll(); isPlaying = true;
  const d = DISORDERS.find(x => x.id === did);
  const hd = document.getElementById(`dh-${d.id}`);
  if (hd) { hd.classList.add('playing'); hd.scrollIntoView({behavior:'smooth',block:'center'}); }
  setStatus(`${d.name} — ${d.mn}`);
  await say(d.full);
  if (!isPlaying) return;
  await wait(1000);
  await say(d.mnTTS);
  if (!isPlaying) return;
  await wait(500);
  clearHL();
  for (let i = 0; i < d.ls.length; i++) {
    if (!isPlaying) break;
    const it = d.ls[i];
    const el = document.getElementById(`li-${d.id}-${i}`);
    if (el) { el.classList.add('playing'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
    const pg = document.getElementById(`pg-${d.id}`);
    if (pg) pg.style.width = `${((i+1)/d.ls.length)*100}%`;
    setStatus(`${d.name} — ${it.l}`);
    await say(letterForTTS(it.l));
    if (!isPlaying) break;
    await wait(300);
    await sayPhrases(it.tts);
    if (!isPlaying) break;
    await wait(500);
    clearHL();
  }
  if (isPlaying) { clearHL(); setStatus('就绪'); isPlaying = false; }
}

// Play all
async function playAll(mode) {
  stopAll(); isPlaying = true;
  const ds = filtered();
  document.getElementById(mode==='letters'?'playLettersBtn':'playAllBtn').classList.add('active');
  for (let di = 0; di < ds.length; di++) {
    if (!isPlaying) break;
    const d = ds[di];
    const hd = document.getElementById(`dh-${d.id}`);
    if (hd) { hd.classList.add('playing'); hd.scrollIntoView({behavior:'smooth',block:'center'}); }
    setStatus(`[${di+1}/${ds.length}] ${d.name}`);
    if (mode !== 'letters') {
      await say(d.full);
      if (!isPlaying) break;
      await wait(1000);
      await say(d.mnTTS);
      if (!isPlaying) break;
      await wait(500);
    }
    clearHL();
    for (let i = 0; i < d.ls.length; i++) {
      if (!isPlaying) break;
      const it = d.ls[i];
      const el = document.getElementById(`li-${d.id}-${i}`);
      if (el) { el.classList.add('playing'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
      const pg = document.getElementById(`pg-${d.id}`);
      if (pg) pg.style.width = `${((i+1)/d.ls.length)*100}%`;
      setStatus(`[${di+1}/${ds.length}] ${d.name} — ${it.l}`);
      await say(letterForTTS(it.l));
      if (!isPlaying) break;
      await wait(300);
      await sayPhrases(it.tts);
      if (!isPlaying) break;
      await wait(500);
      clearHL();
    }
    if (!isPlaying) break;
    await wait(800);
    clearHL();
  }
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  if (isPlaying) setStatus('全部朗读完毕 ✓');
  isPlaying = false;
}

function stopAll() { isPlaying = false; synth.cancel(); clearHL(); document.querySelectorAll('.btn').forEach(b => b.classList.remove('active')); setStatus('已停止'); }

renderContent();
</script>
