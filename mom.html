<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>停车动图</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
:root{--bg:#f7f1e8;--card:#fdf9f4;--soft:#f2e7d9;--red:#e03b3b;--green:#2a9d5c;--text:#2b2b2b;--muted:#888;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);max-width:400px;margin:0 auto;padding-bottom:40px;}
.hdr{background:#2b2b2b;color:#fff;text-align:center;padding:16px;}
.hdr h1{font-size:1.35rem;font-weight:900;}
.hdr p{font-size:0.82rem;color:#ccc;margin-top:3px;}
.tabs{display:flex;background:var(--soft);border-bottom:2px solid #ddd;}
.tab{flex:1;padding:9px 2px;text-align:center;font-size:0.78rem;font-weight:700;cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--muted);}
.tab.on{color:var(--text);border-bottom:3px solid #2b2b2b;background:var(--card);}
.sec{display:none;padding:12px;}
.sec.on{display:block;}
.sbar{background:#2b2b2b;color:#fff;border-radius:10px;padding:9px 13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.sbar .n{font-size:0.76rem;color:#aaa;}
.sbar .t{font-size:0.9rem;font-weight:900;}
.dots{display:flex;gap:5px;justify-content:center;margin-bottom:8px;}
.dot{width:8px;height:8px;border-radius:50%;background:#ddd;transition:background .3s;}
.dot.on{background:#2b2b2b;}
canvas{display:block;width:100%;border-radius:10px;margin-bottom:10px;}
.brow{display:flex;gap:10px;margin-bottom:10px;}
.wbox{background:var(--card);border-radius:10px;padding:9px 7px;display:flex;flex-direction:column;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.08);min-width:96px;}
.wlabel{font-size:0.76rem;font-weight:700;margin-top:4px;text-align:center;}
.gb{display:inline-flex;width:28px;height:28px;border-radius:50%;align-items:center;justify-content:center;font-size:0.88rem;font-weight:900;color:#fff;margin-top:4px;}
.gR{background:var(--red);}
.gD{background:var(--green);}
.gP{background:#555;}
.dbox{flex:1;background:var(--card);border-radius:10px;padding:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:0.88rem;line-height:1.7;}
.tip{font-size:0.78rem;color:var(--muted);margin-top:4px;}
.btns{display:flex;gap:8px;}
.btn{flex:1;padding:11px 4px;border:2px solid #ddd;border-radius:10px;background:var(--card);font-size:0.88rem;font-weight:700;font-family:inherit;cursor:pointer;color:var(--text);}
.btn.play{background:#2b2b2b;color:#fff;border-color:#2b2b2b;}
</style>
</head>
<body>
<div class="hdr"><h1>🚗 停车动图教学</h1><p>看图学习，一步一步来</p></div>
<div class="tabs">
  <button class="tab on" onclick="sw('p')">🅿️ 平行停车</button>
  <button class="tab" onclick="sw('c')">← 靠边调整</button>
  <button class="tab" onclick="sw('o')">→ 靠外调整</button>
</div>

<!-- T-shape steering wheel SVG template (reused 3×) -->
<!-- T: horizontal bar at top + single spoke down; red dot fixed at top shows rotation -->

<div id="sp" class="sec on">
  <div class="sbar"><span class="n" id="pn">步骤 1/4</span><span class="t" id="pt">准备：对齐前车</span></div>
  <div class="dots" id="pd"></div>
  <canvas id="pc" width="340" height="200"></canvas>
  <div class="brow">
    <div class="wbox">
      <svg width="82" height="82" viewBox="0 0 100 100">
        <g transform="translate(50,50)">
          <g id="pwg" style="transform-origin:0 0;transform:rotate(0deg);transition:transform .65s ease">
            <circle r="40" fill="none" stroke="#333" stroke-width="6"/>
            <circle r="7" fill="#333"/>
            <line x1="-28" y1="-20" x2="28" y2="-20" stroke="#333" stroke-width="5" stroke-linecap="round"/>
            <line x1="0" y1="-20" x2="0" y2="32" stroke="#333" stroke-width="5" stroke-linecap="round"/>
          </g>
          <circle cy="-40" r="5" fill="#e03b3b"/>
        </g>
      </svg>
      <div class="wlabel" id="pwl">回正</div>
      <div class="gb gD" id="pg">D</div>
    </div>
    <div class="dbox" id="pd2">把车开到前车旁边。<br>你的车头对齐前车的车尾。<div class="tip">💡 D档，慢慢停好</div></div>
  </div>
  <div class="btns">
    <button class="btn" onclick="pm(-1)">◀ 上一步</button>
    <button class="btn play" id="ppb" onclick="ptog()">▶ 自动</button>
    <button class="btn" onclick="pm(1)">下一步 ▶</button>
  </div>
</div>

<div id="sc" class="sec">
  <div class="sbar"><span class="n" id="cn">步骤 1/6</span><span class="t" id="ct">问题：太远路边</span></div>
  <div class="dots" id="cd"></div>
  <canvas id="cc" width="340" height="200"></canvas>
  <div class="brow">
    <div class="wbox">
      <svg width="82" height="82" viewBox="0 0 100 100">
        <g transform="translate(50,50)">
          <g id="cwg" style="transform-origin:0 0;transform:rotate(0deg);transition:transform .65s ease">
            <circle r="40" fill="none" stroke="#333" stroke-width="6"/>
            <circle r="7" fill="#333"/>
            <line x1="-28" y1="-20" x2="28" y2="-20" stroke="#333" stroke-width="5" stroke-linecap="round"/>
            <line x1="0" y1="-20" x2="0" y2="32" stroke="#333" stroke-width="5" stroke-linecap="round"/>
          </g>
          <circle cy="-40" r="5" fill="#e03b3b"/>
        </g>
      </svg>
      <div class="wlabel" id="cwl">回正</div>
      <div class="gb gP" id="cg">P</div>
    </div>
    <div class="dbox" id="cd2">车停得离路边太远了。<br>需要往里靠近一点。<div class="tip">💡 P档先停住</div></div>
  </div>
  <div class="btns">
    <button class="btn" onclick="cm(-1)">◀ 上一步</button>
    <button class="btn play" id="cpb" onclick="ctog()">▶ 自动</button>
    <button class="btn" onclick="cm(1)">下一步 ▶</button>
  </div>
</div>

<div id="so" class="sec">
  <div class="sbar"><span class="n" id="on2">步骤 1/6</span><span class="t" id="ot">问题：太靠路边</span></div>
  <div class="dots" id="od"></div>
  <canvas id="oc" width="340" height="200"></canvas>
  <div class="brow">
    <div class="wbox">
      <svg width="82" height="82" viewBox="0 0 100 100">
        <g transform="translate(50,50)">
          <g id="owg" style="transform-origin:0 0;transform:rotate(0deg);transition:transform .65s ease">
            <circle r="40" fill="none" stroke="#333" stroke-width="6"/>
            <circle r="7" fill="#333"/>
            <line x1="-28" y1="-20" x2="28" y2="-20" stroke="#333" stroke-width="5" stroke-linecap="round"/>
            <line x1="0" y1="-20" x2="0" y2="32" stroke="#333" stroke-width="5" stroke-linecap="round"/>
          </g>
          <circle cy="-40" r="5" fill="#e03b3b"/>
        </g>
      </svg>
      <div class="wlabel" id="owl">回正</div>
      <div class="gb gP" id="og">P</div>
    </div>
    <div class="dbox" id="od2">车停得离路边太近了。<br>需要往外移开一点。<div class="tip">💡 P档先停住</div></div>
  </div>
  <div class="btns">
    <button class="btn" onclick="om(-1)">◀ 上一步</button>
    <button class="btn play" id="opb" onclick="otog()">▶ 自动</button>
    <button class="btn" onclick="om(1)">下一步 ▶</button>
  </div>
</div>

<script>
const PA=[{x:251,y:50,l:58,w:22},{x:251,y:166,l:58,w:22}];
const OL=56,OW=20;

const PS=[
  {title:"准备：对齐前车",desc:"D档，开到前车旁边。<br>你的车头 对齐 前车车尾。",tip:"D档，慢慢停好",gear:"D",x:165,y:51,a:0,w:0,wl:"回正",align:true},
  {title:"R档＋往右打死，慢慢倒",desc:"换R档。<br>方向盘往右打死（约1.5圈）。<br>慢慢往后倒，车尾向右方走。",tip:"车尾往路边进",gear:"R",x:206,y:88,a:-40,w:135,wl:"→ 右打死"},
  {title:"往左打死，继续倒",desc:"车尾已入位。<br>方向盘往左打死（约1.5圈）。<br>继续慢慢往后倒。",tip:"车身开始变直",gear:"R",x:248,y:107,a:-3,w:-135,wl:"← 左打死"},
  {title:"方向盘回正，D档往前",desc:"车身平行路边了。<br>方向盘回正。<br>D档往前一点点，停在中间。",tip:"P档，停好了！",gear:"D",x:251,y:108,a:0,w:0,wl:"回正"}
];

// 靠近：太远路边→往里移（向-x移动，即靠近x=220路边）
const CS=[
  {title:"问题：太远路边",desc:"车停得离路边太远，需要往里靠近。",tip:"P档先停住",gear:"P",x:262,y:108,a:0,w:0,wl:"回正"},
  {title:"D档＋往左打死，往前动一下",desc:"换D档。<br>方向盘往左打死（约1.5圈）。<br>前进一点点，停住。",tip:"车头往里偏",gear:"D",x:254,y:100,a:-13,w:-135,wl:"← 左打死"},
  {title:"往右打死，继续往前动一下",desc:"方向盘往右打死（约1.5圈）。<br>前进一点点，停住。",tip:"车身开始调整",gear:"D",x:247,y:93,a:7,w:135,wl:"→ 右打死"},
  {title:"R档＋往左打死，往后倒一下",desc:"换R档。<br>方向盘往左打死（约1.5圈）。<br>往后倒一点点，停住。",tip:"车往里移动",gear:"R",x:250,y:100,a:-4,w:-135,wl:"← 左打死"},
  {title:"往右打死，继续往后倒一下",desc:"方向盘往右打死（约1.5圈）。<br>继续往后倒一点点，停住。",tip:"车身在回正",gear:"R",x:257,y:107,a:3,w:135,wl:"→ 右打死"},
  {title:"D档，方向盘回正",desc:"方向盘回正。<br>D档往前进一点，停好。<br>离路边距离正好！",tip:"P档，完成！",gear:"D",x:251,y:108,a:0,w:0,wl:"回正"}
];

// 靠外：太靠路边→往外移（向+x移动，镜像CS）
const OS=[
  {title:"问题：太靠路边",desc:"车停得离路边太近，需要往外移开一点。",tip:"P档先停住",gear:"P",x:240,y:108,a:0,w:0,wl:"回正"},
  {title:"D档＋往右打死，往前动一下",desc:"换D档。<br>方向盘往右打死（约1.5圈）。<br>前进一点点，停住。",tip:"车头往外偏",gear:"D",x:248,y:100,a:13,w:135,wl:"→ 右打死"},
  {title:"往左打死，继续往前动一下",desc:"方向盘往左打死（约1.5圈）。<br>前进一点点，停住。",tip:"车身开始调整",gear:"D",x:255,y:93,a:-7,w:-135,wl:"← 左打死"},
  {title:"R档＋往右打死，往后倒一下",desc:"换R档。<br>方向盘往右打死（约1.5圈）。<br>往后倒一点点，停住。",tip:"车往外移动",gear:"R",x:252,y:100,a:4,w:135,wl:"→ 右打死"},
  {title:"往左打死，继续往后倒一下",desc:"方向盘往左打死（约1.5圈）。<br>继续往后倒一点点，停住。",tip:"车身在回正",gear:"R",x:245,y:107,a:-3,w:-135,wl:"← 左打死"},
  {title:"D档，方向盘回正",desc:"方向盘回正。<br>D档往前进一点，停好。<br>离路边距离正好！",tip:"P档，完成！",gear:"D",x:251,y:108,a:0,w:0,wl:"回正"}
];

// ── DRAWING ──────────────────────────────────────────────────────
function drawRoad(ctx){
  const W=ctx.canvas.width,H=ctx.canvas.height;
  ctx.fillStyle='#b0b0b0'; ctx.fillRect(0,0,220,H);
  ctx.fillStyle='#999'; ctx.fillRect(220,0,62,H);
  ctx.fillStyle='#c4af90'; ctx.fillRect(282,0,W-282,H);
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.setLineDash([18,11]); ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(110,0); ctx.lineTo(110,H); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  ctx.strokeStyle='#f5c520'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(220,0); ctx.lineTo(220,H); ctx.stroke();
  ctx.fillStyle='#a89070'; ctx.fillRect(282,0,4,H);
  ctx.strokeStyle='rgba(255,255,255,.75)'; ctx.setLineDash([6,5]); ctx.lineWidth=1.5;
  ctx.strokeRect(220,79,62,58); ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('空位',251,112);
}
function drawParkedCar(ctx,c,label){
  ctx.save(); ctx.translate(c.x,c.y);
  ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(-c.w/2+2,-c.l/2+2,c.w,c.l);
  ctx.fillStyle='#595959'; ctx.fillRect(-c.w/2,-c.l/2,c.w,c.l);
  ctx.fillStyle='rgba(150,210,235,.6)'; ctx.fillRect(-c.w/2+2,c.l/2-13,c.w-4,10);
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
  ctx.fillText(label,0,3); ctx.restore();
}
function drawOurCar(ctx,x,y,a,gear){
  ctx.save(); ctx.translate(x,y); ctx.rotate(a*Math.PI/180);
  const L=OL,W=OW;
  ctx.fillStyle='rgba(0,0,0,.15)'; ctx.fillRect(-W/2+2,-L/2+2,W,L);
  ctx.fillStyle='#d63333'; ctx.fillRect(-W/2,-L/2,W,L);
  ctx.fillStyle='rgba(170,225,255,.85)'; ctx.fillRect(-W/2+2,L/2-13,W-4,10);
  ctx.fillStyle='rgba(255,80,80,.7)'; ctx.fillRect(-W/2+3,-L/2+1,W-6,5);
  if(gear==='R'){ctx.fillStyle='rgba(255,255,255,.95)';ctx.beginPath();ctx.moveTo(0,-L/2-6);ctx.lineTo(5,-L/2);ctx.lineTo(-5,-L/2);ctx.closePath();ctx.fill();}
  else if(gear==='D'){ctx.fillStyle='rgba(255,255,255,.95)';ctx.beginPath();ctx.moveTo(0,L/2+6);ctx.lineTo(5,L/2);ctx.lineTo(-5,L/2);ctx.closePath();ctx.fill();}
  ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('我的车',0,3); ctx.restore();
}
function drawAlignGuide(ctx,carX,carY){
  const ay=PA[0].y+PA[0].l/2;
  ctx.save();
  ctx.strokeStyle='rgba(255,215,0,.9)'; ctx.setLineDash([5,4]); ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(105,ay); ctx.lineTo(278,ay); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#f5c520';
  ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('对齐这里',175,ay-7);
  ctx.fillStyle='#f5c520';
  ctx.beginPath(); ctx.arc(PA[0].x,ay,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(carX,carY+OL/2,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawScene(ctx,car,opts){
  drawRoad(ctx);
  drawParkedCar(ctx,PA[0],'前车');
  drawParkedCar(ctx,PA[1],'后车');
  if(opts&&opts.align) drawAlignGuide(ctx,car.x,car.y);
  drawOurCar(ctx,car.x,car.y,car.a,opts&&opts.gear||'D');
}

// ── ANIMATION ────────────────────────────────────────────────────
let animId=null;
function lerp(a,b,t){return a+(b-a)*t;}
function lerpA(a,b,t){let d=b-a;while(d>180)d-=360;while(d<-180)d+=360;return a+d*t;}
function ez(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
function anim(ctx,from,to,opts,done){
  if(animId)cancelAnimationFrame(animId);
  const t0=performance.now(),dur=900;
  function fr(ts){
    const t=ez(Math.min((ts-t0)/dur,1));
    drawScene(ctx,{x:lerp(from.x,to.x,t),y:lerp(from.y,to.y,t),a:lerpA(from.a,to.a,t)},opts);
    if(t<1)animId=requestAnimationFrame(fr);
    else{drawScene(ctx,to,opts);done&&done();}
  }
  animId=requestAnimationFrame(fr);
}

// ── GENERIC RENDER ────────────────────────────────────────────────
function render(cfg){
  const s=cfg.steps[cfg.i];
  document.getElementById(cfg.nId).textContent='步骤 '+(cfg.i+1)+'/'+cfg.steps.length;
  document.getElementById(cfg.tId).textContent=s.title;
  document.getElementById(cfg.d2Id).innerHTML=s.desc+'<div class="tip">💡 '+s.tip+'</div>';
  document.getElementById(cfg.wlId).textContent=s.wl;
  const g=document.getElementById(cfg.gId);g.textContent=s.gear;g.className='gb g'+s.gear;
  document.getElementById(cfg.wgId).style.transform='rotate('+s.w+'deg)';
  dots(cfg.dotsId,cfg.i,cfg.steps.length);
  const to={x:s.x,y:s.y,a:s.a};
  const opts={align:!!s.align,gear:s.gear};
  if(cfg.animate)anim(cfg.ctx,cfg.cur,to,opts,()=>{cfg.cur={...to};});
  else{cfg.cur={...to};drawScene(cfg.ctx,cfg.cur,opts);}
}

// ── PARK ──────────────────────────────────────────────────────────
const PC=document.getElementById('pc').getContext('2d');
const pcfg={steps:PS,i:0,playing:false,timer:null,cur:{x:PS[0].x,y:PS[0].y,a:PS[0].a},ctx:PC,
  nId:'pn',tId:'pt',d2Id:'pd2',wlId:'pwl',gId:'pg',wgId:'pwg',dotsId:'pd',animate:false};
function pm(d){const n=pcfg.i+d;if(n<0||n>=PS.length)return;pcfg.i=n;pcfg.animate=d>0;render(pcfg);}
function ptog(){pcfg.playing=!pcfg.playing;document.getElementById('ppb').textContent=pcfg.playing?'⏸ 暂停':'▶ 自动';if(pcfg.playing)pa();else clearTimeout(pcfg.timer);}
function pa(){if(!pcfg.playing)return;pcfg.i=(pcfg.i+1)%PS.length;pcfg.animate=true;render(pcfg);pcfg.timer=setTimeout(pa,2700);}

// ── CURB IN ───────────────────────────────────────────────────────
const CC=document.getElementById('cc').getContext('2d');
const ccfg={steps:CS,i:0,playing:false,timer:null,cur:{x:CS[0].x,y:CS[0].y,a:CS[0].a},ctx:CC,
  nId:'cn',tId:'ct',d2Id:'cd2',wlId:'cwl',gId:'cg',wgId:'cwg',dotsId:'cd',animate:false};
function cm(d){const n=ccfg.i+d;if(n<0||n>=CS.length)return;ccfg.i=n;ccfg.animate=d>0;render(ccfg);}
function ctog(){ccfg.playing=!ccfg.playing;document.getElementById('cpb').textContent=ccfg.playing?'⏸ 暂停':'▶ 自动';if(ccfg.playing)ca();else clearTimeout(ccfg.timer);}
function ca(){if(!ccfg.playing)return;ccfg.i=(ccfg.i+1)%CS.length;ccfg.animate=true;render(ccfg);ccfg.timer=setTimeout(ca,2700);}

// ── CURB OUT ──────────────────────────────────────────────────────
const OC=document.getElementById('oc').getContext('2d');
const ocfg={steps:OS,i:0,playing:false,timer:null,cur:{x:OS[0].x,y:OS[0].y,a:OS[0].a},ctx:OC,
  nId:'on2',tId:'ot',d2Id:'od2',wlId:'owl',gId:'og',wgId:'owg',dotsId:'od',animate:false};
function om(d){const n=ocfg.i+d;if(n<0||n>=OS.length)return;ocfg.i=n;ocfg.animate=d>0;render(ocfg);}
function otog(){ocfg.playing=!ocfg.playing;document.getElementById('opb').textContent=ocfg.playing?'⏸ 暂停':'▶ 自动';if(ocfg.playing)oa();else clearTimeout(ocfg.timer);}
function oa(){if(!ocfg.playing)return;ocfg.i=(ocfg.i+1)%OS.length;ocfg.animate=true;render(ocfg);ocfg.timer=setTimeout(oa,2700);}

// ── UTILS ─────────────────────────────────────────────────────────
function dots(id,cur,total){
  const el=document.getElementById(id);
  while(el.children.length<total){const d=document.createElement('div');d.className='dot';el.appendChild(d);}
  Array.from(el.children).forEach((d,i)=>d.className='dot'+(i===cur?' on':''));
}
function sw(t){
  const keys=['p','c','o'];
  document.querySelectorAll('.tab').forEach((el,i)=>el.className='tab'+(keys[i]===t?' on':''));
  document.getElementById('sp').className='sec'+(t==='p'?' on':'');
  document.getElementById('sc').className='sec'+(t==='c'?' on':'');
  document.getElementById('so').className='sec'+(t==='o'?' on':'');
}

// ── INIT ──────────────────────────────────────────────────────────
render(pcfg); render(ccfg); render(ocfg);
</script>
</body>
